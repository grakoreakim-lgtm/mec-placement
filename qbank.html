    </div>
  `;
  document.body.appendChild(modal);
  document.getElementById('bpCancel').addEventListener('click', () => {
    if(confirm('Cancel audio generation? Progress is saved.')) {
      _bulkCancel = true;
      document.getElementById('bpCancel').textContent = 'Stopping...';
    }
  });
  // Clear errors button
  const clearBtn = document.getElementById('bpClearErr');
  if(clearBtn) clearBtn.addEventListener('click', () => {
    _bulkErrorList = [];
    document.getElementById('bpErrorBox').style.display = 'none';
    document.getElementById('bpErrorList').innerHTML = '';
  });
}

function updateBulkProgress(state) {
  const pct = state.turnTotal > 0 ? (state.turnDone / state.turnTotal * 100).toFixed(1) : 0;
  const setTxt = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
  const setW = (id, w) => { const el = document.getElementById(id); if(el) el.style.width = w; };

  setTxt('bpOverallLabel', `Script ${state.scriptIdx+1} / ${state.totalScripts}`);
  setTxt('bpOverallCount', `${state.turnDone} / ${state.turnTotal} turns`);
  setW('bpOverallBar', pct + '%');
  setTxt('bpScript', state.scriptTitle);
  setTxt('bpPair', state.pairLabel);
  setTxt('bpDone', state.turnDone);
  setTxt('bpSkipped', state.skipped || 0);
  setTxt('bpFailed', state.failed);

  const elapsed = Math.round((Date.now() - state.startTime) / 1000);
  const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');
  setTxt('bpElapsed', `${mm}:${ss}`);

  if(state.turnDone > 0) {
    const perTurn = elapsed / state.turnDone;
    const remaining = Math.round(perTurn * (state.turnTotal - state.turnDone));
    const rm = String(Math.floor(remaining/60)).padStart(2,'0');
    const rs = String(remaining%60).padStart(2,'0');
    setTxt('bpEta', `${rm}:${rs}`);
  }
}

function closeBulkProgress() {
  const m = document.getElementById('bulkProgressModal');
  if(m) m.remove();
}

// Count how many scripts have all audio generated
function audioGenStats() {
  const scripts = QB.listening || [];
  let fullyDone = 0, partial = 0, notStarted = 0, totalTurns = 0, doneTurns = 0;
  scripts.forEach(s => {
    const turns = s.turns || [];
    const haveCount = turns.filter(t => t.audioUrl).length;
    totalTurns += turns.length;
    doneTurns += haveCount;
    if(haveCount === turns.length && turns.length > 0) fullyDone++;
    else if(haveCount > 0) partial++;
    else notStarted++;
  });
  return { total:scripts.length, fullyDone, partial, notStarted, totalTurns, doneTurns };
}

async function previewAudioGenStats() {
  // Helper to refresh stats display without full re-render
  if(typeof currentPage !== 'undefined' && currentPage === 'settings') {
    render();
  }
}

function clearAudioForScript(scriptId) {
  const t = QB.listening.find(x => x.id === scriptId);
  if(!t) return;
  t.turns.forEach(turn => { delete turn.audioB64; delete turn.audioVoice; });
  render();
  toast('Audio cleared', 'warn');
}

function saveElSettings() {
  EL_API_KEY = ($('el_api_key')?.value || '').trim();
  EL_VOICE_A = $('el_voice_a')?.value || '21m00Tcm4TlvDq8ikWAM';
  EL_VOICE_B = $('el_voice_b')?.value || 'pNInz6obpgDQGcFmaJgB';
  EL_MODEL   = $('el_model')?.value   || 'eleven_multilingual_v2';

  // Persist across sessions
  try {
    localStorage.setItem('mec_el_settings', JSON.stringify({
      apiKey: EL_API_KEY,
      voiceA: EL_VOICE_A,
      voiceB: EL_VOICE_B,
      model:  EL_MODEL,
      ts: Date.now()
    }));
    toast('ElevenLabs settings saved ✓ (persists across sessions)', 'ok');
  } catch(e) {
    console.error('localStorage save failed:', e);
    toast('Settings saved (localStorage failed: ' + e.message + ')', 'warn');
  }
}

function previewVoice(voiceId) {
  if(!EL_API_KEY) { toast('Enter API key first', 'err'); return; }
  const text = 'Hello, this is a voice preview for the MEC Academy placement test.';
  const btn = document.querySelector('[onclick*="previewVoice"]');
  toast('Loading preview...', '');
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'xi-api-key': EL_API_KEY },
    body: JSON.stringify({ text, model_id: EL_MODEL, voice_settings: { stability:0.5, similarity_boost:0.75 } })
  }).then(r => r.blob()).then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.play();
    toast('Playing preview...', 'ok');
  }).catch(e => toast('Preview failed: ' + e.message, 'err'));
}

document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-fn]'); if(!btn) return;
  const fn=btn.dataset.fn, id=btn.dataset.id;
  switch(fn){
    case 'openGV': openGV(id); break;
    case 'delGV':  delGV(id);  break;
    case 'openRD': openRD(id); break;
    case 'delRD':  delRD(id);  break;
    case 'openLS': openLS(id); break;
    case 'delLS':  delLS(id);  break;
    case 'openWR': openWR(id); break;
    case 'delWR':  delWR(id);  break;
    case 'openSP': openSP(id); break;
    case 'delSP':      delSP(id);                    break;
    case 'genAudio':   generateAudioForScript(id);   break;
    case 'clearAudio': clearAudioForScript(id);       break;
  }
});

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',()=>navTo(el.dataset.page));
  });
  navTo('dashboard');
});
