,{"id":"RD-NEW-B1-005","level":"B1","title":"Urban Farming","context":"Read this article about a growing trend in cities.","text":"On the rooftop of a former factory in Berlin, tomatoes, courgettes and herbs grow in long rows of soil-filled containers. This is not a traditional farm — it sits eight floors above street level, surrounded by office buildings. Urban farming, once considered a novelty, is rapidly becoming a serious part of how some cities approach food production. The Berlin rooftop project supplies produce to three nearby restaurants and sells the rest directly to local residents. Its founders argue that growing food in cities reduces the distance it travels, cutting carbon emissions and improving freshness. Critics point out that rooftop farms are expensive to set up and can only produce a small fraction of what a city needs. However, supporters believe the real value lies not just in food production but in community building and education. 'When people grow food themselves, they think differently about what they eat,' says project coordinator Marta Hofmann. Several major supermarket chains have begun to invest in the concept, suggesting that urban farming may soon move from the margins to the mainstream.","questions":[{"id":"Q1","type":"detail","question":"Where does the Berlin rooftop farm send its produce?","options":["Only to supermarkets","To nearby restaurants and local residents","To schools and hospitals","Exclusively to overseas markets"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What environmental benefit does the article mention?","options":["Urban farms use rainwater instead of tap water","Food travels shorter distances, reducing carbon emissions","Rooftop plants help to cool the city","Urban farms eliminate the need for pesticides"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What does Marta Hofmann suggest is an important benefit beyond food production?","options":["Urban farming creates full-time employment for city workers","Growing food changes people's relationship with what they eat","Rooftop farms are more profitable than traditional agriculture","Urban farming reduces the cost of food for low-income families"],"correctIndex":1},{"id":"Q4","type":"inference","question":"What does the involvement of supermarket chains suggest about urban farming?","options":["Supermarkets are trying to put urban farmers out of business","Urban farming is likely to become more widespread and commercially significant","The concept is too expensive for individual consumers to support","Urban farms will soon replace all traditional forms of agriculture"],"correctIndex":1}]},{"id":"RD-NEW-B2-001","level":"B2","title":"The Gig Economy and Worker Rights","context":"Read this extract from a business and society magazine.","text":"The proliferation of gig economy platforms — from food delivery apps to freelance marketplaces — has fundamentally altered the relationship between labour and capital. Proponents argue that such platforms democratise opportunity: anyone with a vehicle, a skill, or a spare room can generate income. Yet critics contend that the flexibility prized by platforms often masks a precariousness that traditional employment protections were designed to prevent. Workers classified as 'independent contractors' typically receive no sick pay, no pension contributions, and no guaranteed minimum income. Several European courts have begun reclassifying gig workers as employees, reasoning that the degree of control platforms exercise over their workers — dictating prices, assigning tasks algorithmically, and penalising poor ratings — is incompatible with genuine self-employment. Platform companies respond that reclassification would destroy the flexibility that both workers and consumers value, and that many gig workers actively prefer autonomy over security. The debate reflects a deeper tension: economies built on flexibility may generate growth and convenience, but may simultaneously erode the social contracts that post-war welfare states were constructed to protect.","questions":[{"id":"Q1","type":"main_idea","question":"What is the central tension described in this article?","options":["The conflict between technology companies and government regulators","The balance between economic flexibility and worker protection","The difference between skilled and unskilled gig economy workers","The competition between domestic and international gig platforms"],"correctIndex":1},{"id":"Q2","type":"vocab","question":"What does the word 'precariousness' most nearly mean in this context?","options":["Unpredictability and financial insecurity","A high level of physical danger","The quality of being temporary","Complexity and legal ambiguity"],"correctIndex":0},{"id":"Q3","type":"detail","question":"On what basis have some courts reclassified gig workers as employees?","options":["Because gig workers earn less than the national minimum wage","Because platforms exert a level of control inconsistent with independent work","Because gig platforms have failed to pay taxes correctly","Because gig workers have formally applied for employee status"],"correctIndex":1},{"id":"Q4","type":"inference","question":"What does the phrase 'social contracts that post-war welfare states were constructed to protect' refer to?","options":["International trade agreements signed after World War II","Legal contracts between employers and unions","The implicit societal guarantees of security, healthcare, and fair pay","The constitutional rights of workers in democratic nations"],"correctIndex":2}]},{"id":"RD-NEW-B2-002","level":"B2","title":"Rewilding: Restoring What Was Lost","context":"Read this article from an environmental science publication.","text":"Rewilding — the large-scale restoration of ecosystems to a more natural state — has moved from the fringes of conservation biology to a prominent position in global biodiversity policy. Its most celebrated projects have involved the reintroduction of apex predators: wolves in Yellowstone, lynx in several European nations, and, most controversially, plans to return bears to parts of the Scottish Highlands. Proponents argue that the absence of large predators creates 'trophic cascades' — chain reactions that degrade entire ecosystems. When wolves were reintroduced to Yellowstone in 1995, deer populations were redistributed, allowing vegetation to recover along riverbanks, which in turn stabilised soils and altered the course of rivers. Critics, however, question whether ecosystems degraded over centuries can simply be restored, and raise legitimate concerns about the safety of rural communities and livestock. The deeper philosophical question is whether rewilding represents a return to a more authentic natural state, or an act of human hubris — attempting to reverse consequences that may themselves have become 'natural' through the passage of time.","questions":[{"id":"Q1","type":"vocab","question":"What does 'trophic cascades' mean as described in the article?","options":["Rapid population growth in apex predator species","Chain reactions through an ecosystem triggered by changes at the top of the food chain","The migration of predators across national boundaries","A technique for measuring biodiversity in restored habitats"],"correctIndex":1},{"id":"Q2","type":"detail","question":"Which specific effect did wolf reintroduction have at Yellowstone?","options":["It reduced the wolf population in neighbouring states","It caused deer populations to decline significantly","It allowed riverbank vegetation to recover, stabilising soils","It attracted significant numbers of tourists to the park"],"correctIndex":2},{"id":"Q3","type":"inference","question":"What concern do critics of rewilding raise beyond the philosophical question?","options":["Rewilding projects are too expensive to be sustainable","Reintroduced species may spread disease to native wildlife","Rural communities and their livestock may face risks from large predators","Rewilding may damage the tourism industry"],"correctIndex":2},{"id":"Q4","type":"inference","question":"The phrase 'act of human hubris' suggests that some critics view rewilding as what?","options":["An arrogant overestimation of humanity's ability to control nature","A politically motivated attempt to undermine farming communities","An impractical idea supported only by urban environmentalists","A misuse of scientific research for commercial purposes"],"correctIndex":0}]},{"id":"RD-NEW-B2-003","level":"B2","title":"Third Culture Kids","context":"Read this article about identity and upbringing.","text":"Sociologist Ruth Hill Useem coined the term 'Third Culture Kids' (TCKs) in the 1950s to describe children who spend significant portions of their developmental years outside their parents' home culture. The 'third culture' refers not to any specific nationality, but to the hybrid identity that forms when elements of the home culture and the host culture are synthesised. Today, the global mobility of corporations, diplomatic services, and international organisations means that the TCK population is larger and more diverse than ever. Research consistently finds that TCKs tend to develop strong intercultural communication skills and demonstrate high levels of adaptability. However, they also face particular challenges: a sense of not fully belonging to any single culture, difficulty maintaining long-term friendships, and what some psychologists describe as a 'hidden grief' — the repeated loss of community with each relocation. As adults, many TCKs find that their most natural social environment is international or multicultural spaces, where their fluid sense of identity is an asset rather than an anomaly.","questions":[{"id":"Q1","type":"detail","question":"According to the article, what does the 'third culture' describe?","options":["A specific culture formed in a third country","A blend of home and host cultures that creates a new hybrid identity","The culture of international organisations like the United Nations","The experience of being a third-generation immigrant"],"correctIndex":1},{"id":"Q2","type":"detail","question":"Which challenge specific to TCKs does the article describe as a 'hidden grief'?","options":["Struggling to learn new languages in each new country","Losing community and friendships repeatedly with each move","Feeling pressure to perform academically in multiple school systems","Experiencing discrimination as a foreigner in the host country"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why might TCKs find multicultural spaces more comfortable as adults?","options":["Because they are more likely to be employed by international organisations","Because their mixed identity is normal and valued rather than unusual","Because they prefer speaking foreign languages to their mother tongue","Because multicultural cities offer better career opportunities"],"correctIndex":1},{"id":"Q4","type":"vocab","question":"What does 'fluid' mean in the phrase 'fluid sense of identity'?","options":["Uncertain and confused","Flexible and not fixed to a single definition","Related to international travel","Shaped by water and geography"],"correctIndex":1}]},{"id":"RD-NEW-B2-004","level":"B2","title":"The Science of Sleep Debt","context":"Read this extract from a popular science magazine.","text":"The idea that lost sleep can simply be recovered at the weekend — 'sleep banking' — has gained widespread currency, particularly among students and shift workers. Recent research, however, suggests this folk remedy may be dangerously misleading. A 2019 study published in Current Biology found that while weekend recovery sleep does reduce feelings of sleepiness, it does not fully restore metabolic function, attention, or reaction times. Participants who slept for six hours on weekdays and recovered at weekends still showed significantly impaired performance on cognitive tasks compared to those who maintained consistent sleep schedules. More concerning still, chronic sleep restriction appears to alter brain physiology in ways that are not reversed by short-term recovery. 'Sleep debt is not like financial debt,' explains neuroscientist Dr Aarav Singh. 'You cannot simply pay it back with interest on a Saturday morning.' The practical implications extend beyond personal wellbeing: industries with high rates of sleep-deprived workers — transport, medicine, emergency services — face elevated safety risks that weekend recovery sleep cannot adequately mitigate.","questions":[{"id":"Q1","type":"main_idea","question":"What is the main argument of this article?","options":["People should sleep earlier in the evening to avoid sleep debt","Weekend recovery sleep does not fully compensate for weekday sleep deprivation","Shift workers are the main victims of sleep-related health problems","Six hours of sleep per night is sufficient for most adults"],"correctIndex":1},{"id":"Q2","type":"detail","question":"According to the 2019 study, what remained impaired after weekend recovery sleep?","options":["Emotional regulation and mood","Metabolic function, attention, and reaction times","Long-term memory and language processing","Appetite control and physical coordination"],"correctIndex":1},{"id":"Q3","type":"vocab","question":"What does 'mitigate' mean in the final sentence?","options":["Eliminate completely","Measure accurately","Reduce or lessen the severity of","Explain in scientific terms"],"correctIndex":2},{"id":"Q4","type":"inference","question":"What does Dr Singh's analogy about financial debt imply?","options":["Sleep should be treated as a form of economic investment","Sleeping more at weekends makes the problem worse, not better","It is impossible to recover from chronic sleep deprivation at all","Short-term recovery sleep does not undo the accumulated physiological damage"],"correctIndex":3}]},{"id":"RD-NEW-B2-005","level":"B2","title":"Attention and Architecture","context":"Read this article about the design of learning environments.","text":"Researchers at the University of Salford published a landmark study in 2015 examining the relationship between classroom design and student attainment. Over the course of a year, they tracked 3,766 pupils across 153 classrooms and found that physical environment accounted for up to 16 percent of the variation in academic progress. Key factors included natural light, air quality, temperature, and the flexibility of the learning space. Schools with large windows, controllable ventilation, and adaptable furniture layouts produced measurably better outcomes than those with fixed rows of desks under artificial lighting. The findings have since influenced the design briefs of educational authorities in several countries. Yet the implementation of these principles faces a structural obstacle: the majority of school buildings in the developed world were constructed during a period — typically the mid-twentieth century — when such considerations were either unknown or considered a luxury. Retrofitting existing buildings is expensive, and with education budgets under pressure globally, the gap between what research recommends and what policy can fund remains stubbornly wide.","questions":[{"id":"Q1","type":"detail","question":"What percentage of variation in academic progress was linked to classroom design?","options":["Up to 8 percent","Up to 12 percent","Up to 16 percent","Up to 22 percent"],"correctIndex":2},{"id":"Q2","type":"detail","question":"Which physical features were associated with better outcomes?","options":["New technology, including interactive whiteboards and tablets","Natural light, air quality, temperature, and flexible furniture","Small class sizes and colourful wall displays","Proximity to green spaces and outdoor learning areas"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does the article say implementation faces a 'structural obstacle'?","options":["Teachers resist changes to their working environment","School construction rules prevent alterations to existing buildings","Most school buildings predate the research and are expensive to modify","The research findings have not yet been replicated in other countries"],"correctIndex":2},{"id":"Q4","type":"vocab","question":"What does 'stubbornly' suggest about the gap between research and policy?","options":["The gap is narrowing but slowly","The gap has remained difficult to close despite awareness of the problem","The gap is caused by deliberate political decisions","The gap is primarily a problem in developing countries"],"correctIndex":1}]},{"id":"RD-NEW-C1-001","level":"C1","title":"The Paradox of Choice","context":"Read this extract from a behavioural economics essay.","text":"Conventional economic theory holds that more choice is invariably preferable — a greater number of options expands individual autonomy and increases the probability of finding an optimal match for one's preferences. Psychologist Barry Schwartz challenged this orthodoxy systematically in his 2004 work, arguing that beyond a certain threshold, the proliferation of options produces not satisfaction but paralysis and regret. The mechanism is twofold. First, evaluating a larger number of alternatives generates greater cognitive load, increasing the likelihood of decision avoidance or arbitrary choice. Second, the selection of one option necessitates the rejection of others, and the more appealing those rejected alternatives, the greater the 'opportunity cost' experienced as post-decision regret. Schwartz distinguishes between 'maximisers' — those who seek the objectively best option — and 'satisficers', who seek a 'good enough' solution. Counterintuitively, his research suggests that satisficers report higher levels of subjective wellbeing, precisely because they are insulated from the relentless comparative logic that maximising entails. The practical implications for product design, public policy, and education are considerable: simplifying choice architectures, rather than expanding them, may better serve human flourishing.","questions":[{"id":"Q1","type":"main_idea","question":"Which statement best summarises Schwartz's central argument?","options":["Consumer choice should be regulated by governments to prevent exploitation","Economic theory underestimates the importance of individual preferences","An excess of options can reduce wellbeing rather than enhance it","Satisficers are less intelligent than maximisers in their decision-making"],"correctIndex":2},{"id":"Q2","type":"vocab","question":"In this context, what does 'opportunity cost' refer to?","options":["The financial cost of changing one's decision after the fact","The psychological pain of forgoing attractive alternatives when making a choice","The time wasted in evaluating too many options","The commercial value of an item that was not purchased"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does Schwartz find it 'counterintuitive' that satisficers report higher wellbeing?","options":["Because satisficers earn less money than maximisers on average","Because conventional wisdom assumes that seeking the best outcome leads to greater happiness","Because satisficers make decisions more quickly and with less information","Because the research was conducted before behavioural economics was established"],"correctIndex":1},{"id":"Q4","type":"inference","question":"What does the phrase 'relentless comparative logic' describe?","options":["The formal methods used in economic modelling","The habit of continuously measuring one's choices against all available alternatives","A philosophical tradition in European thought","The psychological tendency to prefer familiar options"],"correctIndex":1}]},{"id":"RD-NEW-C1-002","level":"C1","title":"Linguistic Relativity Revisited","context":"Read this extract from a cognitive science journal.","text":"The Sapir-Whorf hypothesis — or the principle of linguistic relativity — proposes that the language one speaks shapes, to some degree, the cognitive categories available for perceiving and organising experience. In its strong form, largely discredited by mid-twentieth century linguistics, language was held to determine thought entirely. The weak form, however, has received renewed empirical support in recent decades. Studies of spatial reasoning have found that speakers of languages using absolute directions (north, south) rather than relative ones (left, right) demonstrate superior navigational performance, suggesting that habitual linguistic practice cultivates corresponding cognitive capacities. Similarly, research on colour perception indicates that language communities with distinct lexical terms for shades that other languages group together show faster discrimination of those shades under time pressure. Critics caution against overstating these effects: the influence of language on thought appears to be probabilistic and domain-specific rather than deterministic. Nevertheless, these findings carry significant implications for second language acquisition, translation theory, and the emerging field of computational linguistics, where the assumption that all languages encode the same conceptual universe has been called increasingly into question.","questions":[{"id":"Q1","type":"detail","question":"What distinguishes the 'strong form' from the 'weak form' of the Sapir-Whorf hypothesis?","options":["The strong form applies only to non-European languages","The strong form claims language determines thought entirely; the weak form claims partial influence","The weak form was proposed by Sapir and the strong form by Whorf","The strong form has been confirmed by recent neuroscience research"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What do studies of spatial reasoning suggest about speakers of absolute-direction languages?","options":["They struggle with abstract reasoning tasks","They show better navigational abilities","They are more likely to become professional geographers","They learn foreign languages more easily"],"correctIndex":1},{"id":"Q3","type":"vocab","question":"What does 'probabilistic and domain-specific' imply about language's influence on thought?","options":["The effect is mathematically predictable and applies universally","The effect is likely in certain areas but not absolute or universal","The effect has only been observed in laboratory conditions","The effect is a statistical error caused by cultural bias"],"correctIndex":1},{"id":"Q4","type":"inference","question":"Why might the article's findings challenge assumptions in computational linguistics?","options":["They suggest that machine translation is inherently impossible","They imply that languages do not map onto a single shared conceptual system, complicating translation between them","They demonstrate that computers cannot learn language the way humans do","They show that linguistic relativity is more significant than grammatical structure"],"correctIndex":1}]},{"id":"RD-NEW-C1-003","level":"C1","title":"The Attention Economy","context":"Read this extract from an essay on digital media and society.","text":"The metaphor that best captures contemporary digital capitalism is not the factory but the theatre — a space engineered not to produce goods but to capture and hold the gaze. The concept of the attention economy, developed most fully by psychologist and Nobel laureate Herbert Simon and later popularised by economist Michael Goldhaber, rests on a deceptively simple inversion of traditional scarcity logic: in an age of information abundance, it is not information but the human capacity to attend to it that constitutes the scarce resource. Platforms designed under this logic are not passive conduits for content but active architects of engagement, deploying variable reward mechanisms borrowed from behavioural psychology to maintain compulsive use. The consequences extend well beyond individual screen time: when attention becomes the currency through which platforms generate revenue, the incentives structurally favour content that provokes strong emotional responses — outrage, anxiety, envy — over content that informs, edifies, or promotes deliberation. Some theorists argue that this architecture represents not merely a market inefficiency but a threat to the epistemic conditions necessary for democratic governance, which depends on citizens capable of sustained, reflective attention.","questions":[{"id":"Q1","type":"main_idea","question":"What is the central claim of the attention economy model as described here?","options":["Digital platforms earn revenue primarily through advertising to wealthy consumers","In an information-rich environment, human attention — not information — becomes the scarce commodity","Social media companies deliberately create addictive products to harm users","The decline of traditional manufacturing has been replaced by digital services"],"correctIndex":1},{"id":"Q2","type":"inference","question":"What does the writer mean by 'variable reward mechanisms borrowed from behavioural psychology'?","options":["Loyalty programmes that offer discounts for frequent platform use","Techniques that trigger compulsive engagement by providing unpredictable rewards","Personalised content recommendations based on user data","Psychological tests used in platform design research"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does the attention economy structurally favour emotionally provocative content?","options":["Users prefer emotional content to factual reporting","Emotional content is cheaper to produce than investigative journalism","Emotional content holds attention more effectively, which is what generates platform revenue","Advertisers specifically request emotional content for their campaigns"],"correctIndex":2},{"id":"Q4","type":"vocab","question":"What does 'epistemic conditions' refer to in the final sentence?","options":["The physical infrastructure necessary for internet access","The political institutions through which laws are made","The conditions related to how people form knowledge and reasoned beliefs","The economic circumstances that influence media ownership"],"correctIndex":2}]},{"id":"RD-NEW-C1-004","level":"C1","title":"Automation and the Future of Work","context":"Read this extract from an economic policy report.","text":"Forecasts of technological unemployment have periodically gripped public imagination since the Luddite movement of the early nineteenth century, and have been periodically confounded by subsequent waves of labour absorption into new industries. The current moment is distinguished, however, by several features that give pause even to historically minded optimists. First, the pace of automation is unprecedented: tasks that economists had long assumed required distinctively human capacities — nuanced language processing, pattern recognition in complex data, legal and medical reasoning — have proved tractable to machine learning at a speed few anticipated. Second, and more critically, the benefits of automation appear to accrue disproportionately to capital holders and to a narrow class of highly skilled workers, while the costs — in the form of labour market disruption — fall on workers who lack the time, resources, or institutional support necessary to retrain. The distributional asymmetry this creates is not merely an economic problem; it is a political one, as it risks generating populations whose material circumstances render them susceptible to authoritarian mobilisation. The question facing policymakers is therefore not whether automation will transform labour markets — it already is — but how societies might be constituted to distribute its benefits equitably.","questions":[{"id":"Q1","type":"inference","question":"Why does the author say 'historically minded optimists' have reason to 'pause' now?","options":["Because previous predictions about automation proved completely wrong","Because current automation is faster and affects a broader range of skills than before","Because the Luddite movement was ultimately successful in halting industrialisation","Because historical evidence suggests automation always leads to unemployment"],"correctIndex":1},{"id":"Q2","type":"vocab","question":"What does 'distributional asymmetry' mean in this context?","options":["An unequal geographic spread of automation across different countries","The uneven distribution of automation's benefits and costs across society","The technical imbalance between human and machine capabilities","A statistical discrepancy in labour market data"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What political risk does the author associate with automation-driven inequality?","options":["Trade unions may gain excessive power in affected industries","Economically displaced populations may become susceptible to authoritarian political movements","Governments may lose tax revenue needed to fund retraining programmes","International competition for technology workers may destabilise economies"],"correctIndex":1},{"id":"Q4","type":"detail","question":"What does the author identify as the key question for policymakers?","options":["Whether to invest in automation or to protect traditional jobs","How to retrain workers who have been displaced by specific technologies","How societies can be structured to distribute the benefits of automation fairly","Whether artificial intelligence will eventually surpass human intelligence"],"correctIndex":2}]},{"id":"RD-NEW-C1-005","level":"C1","title":"Ethical Dimensions of Algorithmic Decision-Making","context":"Read this extract from a technology ethics paper.","text":"The delegation of consequential decisions to algorithmic systems — in areas ranging from credit scoring and judicial risk assessment to medical diagnosis and university admissions — raises ethical questions that neither computer science nor law has yet satisfactorily resolved. At the centre of these questions is the problem of opacity: many high-performing machine learning models operate as 'black boxes', producing outputs that cannot be explained even by their designers in terms that would satisfy the transparency requirements of natural justice. A loan applicant denied credit, or a defendant assigned a high recidivism risk score, may have a legitimate interest in understanding why — an interest that serves not only their individual rights but the broader social function of accountability. A second problem concerns the replication of historical bias: models trained on historical data will, absent deliberate intervention, reproduce the patterns embedded in that data, including patterns that reflect past discrimination. Correcting for this bias is technically possible but involves value judgements about which forms of equality to prioritise — procedural, substantive, or demographic — that are irreducibly political rather than technical. The governance challenge, then, is to develop institutional frameworks capable of holding algorithmic systems to standards of accountability that their opacity makes it genuinely difficult to enforce.","questions":[{"id":"Q1","type":"vocab","question":"What does 'opacity' mean in the context of algorithmic systems?","options":["The tendency of algorithms to produce inconsistent results","The inability to explain how a system arrives at its decisions","The deliberate concealment of data by technology companies","The commercial secrecy that surrounds proprietary systems"],"correctIndex":1},{"id":"Q2","type":"detail","question":"Why might an individual have a legitimate interest in understanding an algorithmic decision?","options":["To enable them to appeal the decision and influence future algorithms","Because transparency serves both individual rights and broader social accountability","Because complex decisions should always be made by human professionals","Because algorithms cannot legally make decisions about individuals"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does correcting algorithmic bias involve 'irreducibly political' judgements?","options":["Because governments must approve any changes to commercially used algorithms","Because different definitions of equality reflect competing social values that cannot be resolved technically","Because the political history of discrimination cannot be accurately encoded in data","Because algorithmic bias is a result of deliberate political interference in technology"],"correctIndex":1},{"id":"Q4","type":"inference","question":"What paradox does the final sentence identify?","options":["Algorithmic systems are simultaneously too simple and too expensive to regulate","Society needs accountability from systems that are inherently difficult to hold accountable due to their opacity","Technology companies are too powerful to be regulated effectively by democratic governments","The most accurate algorithms are always the least transparent to their developers"],"correctIndex":1}]}],"listening":[{"id":"LS-001","level":"A1","format":"monologue","title":"My Favourite Season","taskContext":"Listen to a child talking about their favourite time of year.","turns":[{"speakerIndex":0,"text":"My favourite season is summer."},{"speakerIndex":0,"text":"In summer, the weather is warm and sunny."},{"speakerIndex":0,"text":"I go swimming with my friends."},{"speakerIndex":0,"text":"We eat ice cream in the park."},{"speakerIndex":0,"text":"Sometimes we go to the beach."},{"speakerIndex":0,"text":"I don't like winter because it's cold."},{"speakerIndex":0,"text":"Summer is the best season for me."}],"questions":[{"type":"detail","question":"What does the speaker do with friends in summer?","options":["Play football","Go swimming","Have a picnic","Go shopping"],"correctIndex":1},{"type":"detail","question":"Where do the friends eat ice cream?","options":["At the beach","At home","In the park","At school"],"correctIndex":2},{"type":"detail","question":"Why doesn't the speaker like winter?","options":["It rains too much","It's cold","It's too dark","School is difficult"],"correctIndex":1},{"type":"detail","question":"What activity does the child mention doing in this season?","options":["Swimming","Building snowmen","Reading books","Playing football"],"correctIndex":1},{"type":"inference","question":"What season is the child talking about?","options":["Spring","Summer","Autumn","Winter"],"correctIndex":3}],"speed":0.75,"characters":[{"name":"Narrator","role":"","side":"left","emoji":"🎙"}]},{"id":"LS-002","level":"A2","format":"dialogue","title":"Booking a Hotel Room","taskContext":"Listen to a phone conversation between a hotel receptionist and a customer.","turns":[{"speakerIndex":0,"text":"Good afternoon. Grand Hotel. How can I help you?"},{"speakerIndex":1,"text":"Hello. I'd like to book a room, please."},{"speakerIndex":0,"text":"Of course. What dates would you like?"},{"speakerIndex":1,"text":"I'd like to arrive on the fifteenth of March and leave on the eighteenth."},{"speakerIndex":0,"text":"That's three nights. Would you like a single or double room?"},{"speakerIndex":1,"text":"A double room, please. Does it have a sea view?"},{"speakerIndex":0,"text":"Yes, our sea-view rooms are available. Breakfast is included in the price."},{"speakerIndex":1,"text":"That sounds perfect. How much is it per night?"},{"speakerIndex":0,"text":"It's eighty-five euros per night."},{"speakerIndex":1,"text":"I'll take it. Can I pay when I arrive?"},{"speakerIndex":0,"text":"Certainly. May I take your name, please?"},{"speakerIndex":1,"text":"It's Kim. Kim Sunhee."}],"questions":[{"type":"detail","question":"How many nights is the customer staying?","options":["Two","Three","Four","Five"],"correctIndex":1},{"type":"detail","question":"What type of room does the customer want?","options":["A single room","A twin room","A suite","A double room"],"correctIndex":3},{"type":"detail","question":"What extra service does the customer ask for?","options":["Airport transfer","Breakfast included","Late checkout","Car hire"],"correctIndex":1}],"speed":0.82,"characters":[{"name":"Agent","role":"Reception","side":"left","emoji":"👩‍💼"},{"name":"Client","role":"Guest","side":"right","emoji":"🧔"}]},{"id":"LS-003","level":"B1","format":"dialogue","title":"A Job Interview Extract","taskContext":"Listen to part of a job interview between an interviewer and a candidate.","turns":[{"speakerIndex":0,"text":"So, tell me a little about your experience with customer service."},{"speakerIndex":1,"text":"Well, I worked at a retail store for two years during university. I dealt with customer complaints and processed returns."},{"speakerIndex":0,"text":"I see. And how did you handle difficult customers?"},{"speakerIndex":1,"text":"I always tried to stay calm and listen carefully to what they needed. In most cases, just listening properly solved the problem."},{"speakerIndex":0,"text":"That's a good approach. Now, this role involves a lot of teamwork. Would you say you work better individually or as part of a team?"},{"speakerIndex":1,"text":"Honestly, I enjoy both. I like having independent responsibility, but I also find that collaboration often leads to better results."},{"speakerIndex":0,"text":"Can you give me an example of a time you worked successfully in a team?"},{"speakerIndex":1,"text":"Yes, actually. During my final year at university, I worked with four others on a research project. We divided the tasks according to our strengths, and we finished ahead of schedule."}],"questions":[{"type":"detail","question":"How long did the candidate work in retail?","options":["One year","Two years","Three years","Four years"],"correctIndex":1},{"type":"detail","question":"What tasks did they perform in their retail role?","options":["Stock management","Customer complaints and processing returns","Sales and marketing","Training new staff"],"correctIndex":1},{"type":"detail","question":"What does the candidate say about customer service?","options":["It was very easy","It taught them communication and problem solving","It was not challenging","They did not enjoy it"],"correctIndex":1}],"speed":0.88,"characters":[{"name":"Speaker A","role":"","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}]},{"id":"LS-004","level":"B2","format":"dialogue","title":"A Performance Review","taskContext":"Listen to a performance review conversation between a manager and an employee.","turns":[{"speakerIndex":0,"text":"I appreciate you making time for this, David."},{"speakerIndex":1,"text":"Of course. I wanted to discuss how the last quarter has gone."},{"speakerIndex":0,"text":"Overall your work has been strong. The client reports have been consistently well-received, and you've shown real initiative on the Henderson project."},{"speakerIndex":1,"text":"Thank you. I did put a lot of effort into that one."},{"speakerIndex":0,"text":"It showed. That said, there are a couple of areas I'd like us to focus on. Time management has been flagged a few times — particularly around the project scheduling system."},{"speakerIndex":1,"text":"I know. I've found it difficult to adapt to the new software, honestly."},{"speakerIndex":0,"text":"That's fair. We should have provided better onboarding for the tool. I'll arrange some additional training."},{"speakerIndex":1,"text":"I'd really appreciate that."},{"speakerIndex":0,"text":"The other thing — and this is more about perception than performance — is visibility in team meetings. You have good ideas, David, but you tend to hold back."},{"speakerIndex":1,"text":"I suppose I do. I find it hard to break into the conversation when it moves quickly."},{"speakerIndex":0,"text":"Would it help if I sent you the agenda in advance so you can prepare contributions?"},{"speakerIndex":1,"text":"Yes, that would make a real difference."},{"speakerIndex":0,"text":"Good. Let's review again in six weeks."}],"questions":[{"type":"detail","question":"What aspect of David's work was specifically praised?","options":["His time management","His leadership skills","The quality of the client reports","His communication style"],"correctIndex":2},{"type":"detail","question":"What opportunity is David being offered?","options":["A salary increase","A promotion to senior manager","Leading the new product division","A transfer to another office"],"correctIndex":2},{"type":"detail","question":"What does David ask about the new role?","options":["The salary","Whether he can work remotely","The scope of responsibility and team size","The start date"],"correctIndex":2}],"speed":0.95,"characters":[{"name":"Manager","role":"","side":"left","emoji":"👔"},{"name":"Employee","role":"","side":"right","emoji":"👩"}]},{"id":"LS-005","level":"B2","format":"dialogue","title":"Choosing a Graduate Programme","taskContext":"Listen to a conversation between a university advisor and a prospective student.","turns":[{"speakerIndex":0,"text":"Hello, come in. You're enquiring about the Master's programmes in the Faculty of Social Sciences?"},{"speakerIndex":1,"text":"Yes, that's right. I've narrowed it down to either the International Development programme or the Public Policy one, but I'm struggling to decide."},{"speakerIndex":0,"text":"They do have significant overlap, but there are some key differences worth thinking through. What's your background in?"},{"speakerIndex":1,"text":"I did my undergraduate in Politics and Economics. And I've spent the last two years working for an NGO in Kenya."},{"speakerIndex":0,"text":"That's a strong foundation for either path, honestly. But with your field experience, the International Development programme might be the more natural fit. It has a strong practitioner focus — a lot of the case studies are drawn from Africa and South Asia."},{"speakerIndex":1,"text":"That sounds appealing. What about research opportunities?"},{"speakerIndex":0,"text":"Both programmes require a dissertation. But International Development also has an option to do a field placement in your second semester — it's competitive, but given your background you'd be well-placed to apply."},{"speakerIndex":1,"text":"That's very helpful. What about employment outcomes?"},{"speakerIndex":0,"text":"International Development graduates tend to move into the development sector, multilaterals — UN agencies, that kind of thing. Public Policy is more oriented towards government and the civil service."},{"speakerIndex":1,"text":"I think that confirms it for me. The development sector is where I see my career going."},{"speakerIndex":0,"text":"In that case, I'd recommend getting your application in early — places fill up faster than you'd expect."}],"questions":[{"type":"detail","question":"What subject did the student study as an undergraduate?","options":["Politics","Sociology","International Relations","Economics"],"correctIndex":2},{"type":"detail","question":"Which two programmes is the student choosing between?","options":["Economics and Politics","Development Studies and International Relations","Sociology and Law","Finance and Policy"],"correctIndex":1},{"type":"detail","question":"What does the advisor recommend the student consider?","options":["Career prospects only","The research specialisms of the faculty alongside career goals","The university ranking","The cost of the programme"],"correctIndex":1}],"speed":0.95,"characters":[{"name":"Advisor","role":"","side":"left","emoji":"🎓"},{"name":"Student","role":"","side":"right","emoji":"📚"}]},{"id":"LS-006","level":"B2","format":"monologue","title":"A Radio Commentary on Hybrid Working","taskContext":"Listen to a radio commentary about changes in working patterns.","turns":[{"speakerIndex":0,"text":"What we're seeing now isn't simply a trend — it's a fundamental restructuring of how knowledge work gets done."},{"speakerIndex":0,"text":"For the past three years, organisations have been running a largely unplanned experiment in hybrid working, and the data is starting to come in."},{"speakerIndex":0,"text":"The results are mixed, but a few things are becoming clear."},{"speakerIndex":0,"text":"First, productivity in roles that require deep, independent concentration has generally held up well — in some cases, improved."},{"speakerIndex":0,"text":"But collaboration, creativity, and the informal mentoring of junior staff all suffer when people aren't physically present together."},{"speakerIndex":0,"text":"There's also the question of equity. Hybrid policies that sound neutral on paper can entrench existing inequalities."},{"speakerIndex":0,"text":"Workers with cramped home environments, caring responsibilities, or less reliable technology are at a structural disadvantage."},{"speakerIndex":0,"text":"Meanwhile, those who can work from comfortable home offices accumulate the intangible benefits of being out of commute and having greater schedule flexibility."},{"speakerIndex":0,"text":"The real challenge for organisations isn't figuring out how many days people should come in."},{"speakerIndex":0,"text":"It's building the intentionality to make the days they're together genuinely productive — and making sure that flexibility doesn't become a mechanism that quietly widens the gap between those who have it and those who don't."}],"questions":[{"type":"detail","question":"Which types of work held up well in remote settings?","options":["Creative and collaborative work","Individual focused tasks","Team meetings","Client presentations"],"correctIndex":1},{"type":"detail","question":"What does the speaker say is the real question organisations face?","options":["How to monitor staff from home","How to design work environments for different task types","Whether to return to the office full-time","How to reduce office costs"],"correctIndex":1},{"type":"detail","question":"What does the speaker say about hybrid working?","options":["It is a temporary trend","It is a permanent fundamental restructuring of knowledge work","It only works for large companies","It reduces productivity"],"correctIndex":1}],"speed":0.95,"characters":[{"name":"Narrator","role":"","side":"left","emoji":"🎙"}]},{"id":"LS-007","level":"C1","format":"dialogue","title":"A Research Ethics Committee Discussion","taskContext":"Listen to a discussion at a university research ethics committee.","turns":[{"speakerIndex":0,"text":"So we have three proposals to consider today. I'd like to start with the Johnson study — the one on decision-making under financial stress."},{"speakerIndex":1,"text":"Yes. My concern is with the deception element. Participants are told they're in a study about general problem-solving, when in fact the researchers are observing responses to simulated financial loss."},{"speakerIndex":0,"text":"That's a legitimate concern, but deception in this context has substantial precedent. The key question is whether the deception is proportionate to the research value — and whether a full debrief is in place."},{"speakerIndex":1,"text":"The protocol does include a debrief, yes. But I remain uneasy. Some participants may be in genuine financial distress. Simulating further loss, even experimentally, could cause harm."},{"speakerIndex":0,"text":"That's precisely why the screening questionnaire matters. The protocol excludes anyone currently facing serious financial difficulty."},{"speakerIndex":1,"text":"Does it? I thought the exclusion criterion was bankruptcy within the previous two years, which is a fairly narrow band."},{"speakerIndex":0,"text":"That's a fair reading. I think we need the researchers to tighten that criterion before we can approve this."},{"speakerIndex":1,"text":"Agreed. What about the consent forms? Are they plain language?"},{"speakerIndex":0,"text":"They've been revised. The readability score is now at a level appropriate for the general public."},{"speakerIndex":1,"text":"Good. Can we move to conditional approval, subject to the exclusion criteria revision?"},{"speakerIndex":0,"text":"I'm comfortable with that, with a request for resubmission within thirty days."}],"questions":[{"type":"detail","question":"What is the primary ethical concern raised about the Johnson study?","options":["The budget is too high","The deception element may compromise informed consent","The sample size is too small","The research question is not important"],"correctIndex":1},{"type":"detail","question":"Why might participants find deception distressing?","options":["They do not like research studies","They may feel their autonomy and dignity were violated","They are not well-informed","The study is poorly designed"],"correctIndex":1},{"type":"detail","question":"What does the student propose as a solution?","options":["Cancel the study entirely","Redesign with post-study debriefing and informed consent protocol","Use a different sample group","Get a second opinion from another committee"],"correctIndex":1}],"speed":1,"characters":[{"name":"Advisor","role":"","side":"left","emoji":"🎓"},{"name":"Student","role":"","side":"right","emoji":"📚"}]},{"id":"LS-008","level":"C1","format":"dialogue","title":"Negotiating a Commercial Lease","taskContext":"Listen to a negotiation between a property agent and a prospective tenant.","turns":[{"speakerIndex":0,"text":"I've reviewed the heads of terms and there are a few points I'd like to revisit before we proceed."},{"speakerIndex":1,"text":"Of course. What are your concerns?"},{"speakerIndex":0,"text":"The break clause, firstly. Five years to a break feels very long for a business in our stage of growth. We'd be looking for a break at three years."},{"speakerIndex":1,"text":"That's going to be a difficult sell to the landlord. The whole attraction of this tenancy for them is the longer-term security. But I'll put it to them."},{"speakerIndex":0,"text":"Secondly, the rent review. Open market review every three years — we'd want a cap. Ideally RPI-linked."},{"speakerIndex":1,"text":"Again, I hear you, but the current market makes the landlord reluctant to cap reviews. What I might be able to get you is a collar-and-cap structure — so the review couldn't go below RPI either."},{"speakerIndex":0,"text":"That could work. It gives both sides some protection."},{"speakerIndex":1,"text":"The third issue is the service charge. The estimates feel very high relative to comparable buildings in this area."},{"speakerIndex":0,"text":"What comparable buildings are you referencing? We can provide a detailed breakdown if that would help."},{"speakerIndex":1,"text":"Yes, please do. And finally, we'd want a rent-free period at the start — three months minimum given the fit-out works."},{"speakerIndex":0,"text":"That I can almost certainly get approved — the landlord has been flexible on this in the past. I'd say six to eight weeks is more realistic, but we can try for ten."},{"speakerIndex":1,"text":"Let's push for twelve and see where we land."}],"questions":[{"type":"detail","question":"How long a break clause is the tenant requesting?","options":["Two years","Three years","Four years","Five years"],"correctIndex":1},{"type":"detail","question":"What issue does the agent raise about the service charge cap?","options":["It is too high","The three percent cap is unviable given recent inflation","It should be removed entirely","It applies to the wrong costs"],"correctIndex":1},{"type":"detail","question":"What does the agent say about dilapidations?","options":["The tenant is fully responsible for all repairs","The liability should be proportional to the tenant's actual use","Dilapidations are not relevant","The landlord should pay everything"],"correctIndex":1}],"speed":1,"characters":[{"name":"Agent","role":"Reception","side":"left","emoji":"👩‍💼"},{"name":"Client","role":"Guest","side":"right","emoji":"🧔"}]},{"id":"LS-009","level":"C1","format":"monologue","title":"A Lecture Extract: Behavioural Economics","taskContext":"Listen to an extract from a university lecture on behavioural economics.","turns":[{"speakerIndex":0,"text":"I want to spend the remaining time today on one of the most counterintuitive findings in all of behavioural economics — what Thaler and Sunstein termed the default effect."},{"speakerIndex":0,"text":"The insight is deceptively simple: people tend to accept whatever option is presented to them as the default, not because they've considered it carefully and found it optimal, but because changing course requires effort, and most of us are cognitively disposed to avoid effort when we can."},{"speakerIndex":0,"text":"The classic demonstration involves organ donation consent rates across countries."},{"speakerIndex":0,"text":"In countries that use an opt-in system — where citizens must actively register to donate — consent rates cluster around 15 to 30 percent."},{"speakerIndex":0,"text":"In countries with opt-out systems — where you are presumed to consent unless you actively withdraw — rates reach 85 to 95 percent."},{"speakerIndex":0,"text":"The decision being made is identical. The population is comparable. The only variable is which option requires action."},{"speakerIndex":0,"text":"Now, some critics argue this is manipulation — that governments are essentially exploiting cognitive laziness to achieve a policy outcome."},{"speakerIndex":0,"text":"Proponents — and Thaler and Sunstein coined the term \"libertarian paternalism\" for this approach — argue that defaults are unavoidable."},{"speakerIndex":0,"text":"Every system has a default, even if it's inaction."},{"speakerIndex":0,"text":"The question isn't whether to have a default, but whose interests it should serve."},{"speakerIndex":0,"text":"And I'd invite you to hold that question in mind as we move on to examine nudge policy in public health."}],"questions":[{"type":"detail","question":"What organ donation consent rate does the speaker cite as an example of the default effect?","options":["Around forty percent","Around sixty percent","Around eighty percent","Over ninety percent"],"correctIndex":3},{"type":"detail","question":"What is the 'default effect'?","options":["People always choose the most popular option","People tend to go with the pre-set option rather than actively choosing","People make irrational financial decisions","People prefer simple choices"],"correctIndex":1},{"type":"detail","question":"What policy implication does the speaker draw from the default effect?","options":["People should be forced to make active choices","Policymakers can guide behaviour through choice architecture without removing freedom","Financial incentives are the best policy tool","Education campaigns are more effective than defaults"],"correctIndex":1}],"speed":1,"characters":[{"name":"Narrator","role":"","side":"left","emoji":"🎙"}]},{"id":"LS-010","level":"A1","format":"dialogue","title":"At the Bakery","taskContext":"Listen to a child and a shopkeeper talking at a bakery.","speed":0.75,"characters":[{"name":"Shopkeeper","role":"","side":"left","emoji":"👩‍🍳"},{"name":"Child","role":"","side":"right","emoji":"👦"}],"turns":[{"speakerIndex":0,"text":"Good morning! Can I help you?"},{"speakerIndex":1,"text":"Yes please. I would like some bread."},{"speakerIndex":0,"text":"Of course. How many pieces would you like?"},{"speakerIndex":1,"text":"Four pieces please. And a chocolate cake."},{"speakerIndex":0,"text":"Certainly. That is three pounds fifty."},{"speakerIndex":1,"text":"Here you are. Thank you very much!"},{"speakerIndex":0,"text":"Thank you. Have a lovely day. Goodbye!"}],"questions":[{"type":"detail","question":"What does the child ask for first?","options":["A chocolate cake","Bread","Biscuits","Juice"],"correctIndex":1},{"type":"detail","question":"How many pieces of bread does the child want?","options":["Two","Three","Four","Five"],"correctIndex":2},{"type":"detail","question":"What else does the child want besides bread?","options":["A strawberry cake","A chocolate cake","A cheese sandwich","A lemon tart"],"correctIndex":1},{"type":"detail","question":"How much does the child pay?","options":["Two pounds fifty","Three pounds","Three pounds fifty","Four pounds"],"correctIndex":2},{"type":"inference","question":"When does this conversation take place?","options":["In the evening","At night","In the morning","In the afternoon"],"correctIndex":2}]},{"id":"LS-011","level":"A1","format":"dialogue","title":"After School Plans","taskContext":"Listen to two children talking after school.","speed":0.75,"characters":[{"name":"Tom","role":"","side":"left","emoji":"👦"},{"name":"Emma","role":"","side":"right","emoji":"👧"}],"turns":[{"speakerIndex":0,"text":"Hi Emma! Are you going home now?"},{"speakerIndex":1,"text":"No, I am going to the library. I need to return a book. What about you?"},{"speakerIndex":0,"text":"I have football practice first. Is the library open today?"},{"speakerIndex":1,"text":"Yes, it is open until five o clock. Do you want to come after practice?"},{"speakerIndex":0,"text":"Yes please! I need to find a book about space for my project."},{"speakerIndex":1,"text":"That sounds interesting! See you there then."},{"speakerIndex":0,"text":"Great! See you later, Emma."}],"questions":[{"type":"detail","question":"Where is Emma going after school?","options":["To the park","To the library","To football practice","To a friend's house"],"correctIndex":1},{"type":"detail","question":"Why is Emma going there?","options":["To borrow a book","To return a book","To do her homework","To meet a friend"],"correctIndex":1},{"type":"detail","question":"What time does the library close?","options":["Three o'clock","Four o'clock","Five o'clock","Six o'clock"],"correctIndex":2},{"type":"detail","question":"What is Tom's school project about?","options":["Animals","History","Space","The ocean"],"correctIndex":2},{"type":"inference","question":"What do Tom and Emma decide to do?","options":["Go home together","Meet at the library","Have football practice together","Borrow the same book"],"correctIndex":1}]},{"id":"LS-012","level":"A2","format":"dialogue","title":"Planning a Summer Holiday","taskContext":"Listen to a family discussing their holiday plans.","speed":0.82,"characters":[{"name":"Mum","role":"","side":"left","emoji":"👩"},{"name":"Dad","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"So, where do you think we should go this summer?"},{"speakerIndex":1,"text":"I was thinking about Spain. The children love the beach."},{"speakerIndex":0,"text":"That sounds nice. How long would we go for?"},{"speakerIndex":1,"text":"Maybe two weeks. We could fly from Manchester airport."},{"speakerIndex":0,"text":"I will check the prices online. What dates are you thinking?"},{"speakerIndex":1,"text":"The last two weeks of July. The children are off school then."},{"speakerIndex":0,"text":"Perfect. I will look at hotels near the beach. We need at least two bedrooms."},{"speakerIndex":1,"text":"Good idea. And not too far from a supermarket, please!"}],"questions":[{"type":"detail","question":"Where does Dad suggest going?","options":["France","Italy","Portugal","Spain"],"correctIndex":3},{"type":"detail","question":"How long does Dad suggest going for?","options":["One week","Two weeks","Three weeks","A month"],"correctIndex":1},{"type":"detail","question":"What is Mum's main concern?","options":["The weather","The cost","The distance","The food"],"correctIndex":1}]},{"id":"LS-013","level":"B1","format":"dialogue","title":"A Customer Service Call","taskContext":"Listen to a customer calling a delivery company about a missing parcel.","speed":0.88,"characters":[{"name":"Agent","role":"Customer Service","side":"left","emoji":"🎧"},{"name":"Customer","role":"","side":"right","emoji":"🧑"}],"turns":[{"speakerIndex":0,"text":"Good afternoon, FastDeliver customer service. How can I help you today?"},{"speakerIndex":1,"text":"Hello. I am calling because I ordered a laptop last week and it still has not arrived."},{"speakerIndex":0,"text":"I am sorry to hear that. Could I take your order number, please?"},{"speakerIndex":1,"text":"Yes, it is FD dash four five seven nine two."},{"speakerIndex":0,"text":"Thank you. I can see your order here. It shows as dispatched on Tuesday and should have arrived on Thursday."},{"speakerIndex":1,"text":"Yes, exactly. Today is Monday and there is still nothing."},{"speakerIndex":0,"text":"I do apologise. It looks like the parcel may be delayed at our sorting centre. I will escalate this to our tracking team immediately."},{"speakerIndex":1,"text":"How long will that take?"},{"speakerIndex":0,"text":"You should receive an update by email within twenty-four hours. If we cannot locate the parcel, we will arrange a replacement free of charge."},{"speakerIndex":1,"text":"Alright, thank you. I hope it is resolved quickly."}],"questions":[{"type":"detail","question":"What item did the customer order?","options":["A phone","A tablet","A printer","A laptop"],"correctIndex":3},{"type":"detail","question":"What does the agent offer as a solution?","options":["A refund","A replacement","Express delivery","A discount"],"correctIndex":1},{"type":"detail","question":"What information does the agent ask for?","options":["The customer's address","The order number","A payment reference","The delivery date"],"correctIndex":1}]},{"id":"LS-014","level":"B1","format":"dialogue","title":"Discussing a Film","taskContext":"Listen to two friends discussing a film they watched.","speed":0.88,"characters":[{"name":"Priya","role":"","side":"left","emoji":"👩"},{"name":"James","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"So, what did you think of the film last night?"},{"speakerIndex":1,"text":"Honestly, I was a bit disappointed. The story started really well but I thought the ending was too rushed."},{"speakerIndex":0,"text":"Really? I actually liked the ending. It left things open for the audience to decide."},{"speakerIndex":1,"text":"I suppose. But I wanted more answers. What about the acting?"},{"speakerIndex":0,"text":"The lead actress was brilliant. She completely changed my opinion of her after this film."},{"speakerIndex":1,"text":"I agree with that. She was definitely the best thing in it. And the soundtrack was amazing too."},{"speakerIndex":0,"text":"Exactly. I would definitely watch it again just for those two things."},{"speakerIndex":1,"text":"Maybe. I might give it a second chance. Do you know if they are making a sequel?"},{"speakerIndex":0,"text":"I read that they are still deciding. It depends on how well it does at the box office."}],"questions":[{"type":"detail","question":"What does James think about the ending of the film?","options":["It was too long","It was too rushed","It was confusing","It was very good"],"correctIndex":1},{"type":"detail","question":"What did Priya think of the film?","options":["She was disappointed","She thought it was average","She loved it","She fell asleep"],"correctIndex":2},{"type":"detail","question":"What do they agree about the film?","options":["The acting was excellent","The story was original","The ending was poor","The photography was beautiful"],"correctIndex":0}]},{"id":"LS-MO3MHW3S-IUK","level":"Pre-A1","format":"dialogue","title":"At the Park","taskContext":"Listen to two children talking at the park.","speed":0.8,"characters":[{"name":"Tom","role":"child","side":"left","emoji":"👩"},{"name":"Anna","role":"child","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Hello! Do you want to play?"},{"speakerIndex":1,"text":"Yes! What game do you want to play?"},{"speakerIndex":0,"text":"Let's play football."},{"speakerIndex":1,"text":"OK! I love football."},{"speakerIndex":0,"text":"Great! Let's go!"}],"questions":[{"type":"detail","question":"What do Tom and Anna want to play?","options":["Football","Basketball","Tennis","Swimming"],"correctIndex":0}]},{"id":"LS-MO3MHW3S-M12","level":"Pre-A1","format":"dialogue","title":"Buying Food","taskContext":"Listen to a boy at a shop.","speed":0.8,"characters":[{"name":"Boy","role":"customer","side":"left","emoji":"👩"},{"name":"Shopkeeper","role":"staff","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Hello. I want an apple, please."},{"speakerIndex":1,"text":"Here you are. Anything else?"},{"speakerIndex":0,"text":"No, thank you. How much is it?"},{"speakerIndex":1,"text":"It's fifty cents."},{"speakerIndex":0,"text":"Thank you. Goodbye."}],"questions":[{"type":"detail","question":"What does the boy buy?","options":["A banana","An apple","An orange","A mango"],"correctIndex":1},{"type":"detail","question":"How much does the apple cost?","options":["One dollar","Twenty cents","Fifty cents","Free"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-TM1","level":"Pre-A1","format":"dialogue","title":"In the Classroom","taskContext":"Listen to a teacher and a student.","speed":0.8,"characters":[{"name":"Teacher","role":"teacher","side":"left","emoji":"👩"},{"name":"Student","role":"student","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Good morning, class! Open your books to page ten."},{"speakerIndex":1,"text":"Teacher, I don't have my book."},{"speakerIndex":0,"text":"That's OK. You can share with Anna."},{"speakerIndex":1,"text":"Thank you, teacher."},{"speakerIndex":0,"text":"Everyone ready? Let's begin."}],"questions":[{"type":"detail","question":"Who does the student share a book with?","options":["The teacher","Tom","Anna","Sam"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-KUC","level":"Pre-A1","format":"monologue","title":"My Pet","taskContext":"Listen to a child talking about their pet.","speed":0.8,"characters":[{"name":"Child","role":"speaker","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I have a pet cat. Her name is Lily. She is white and small. She likes to sleep all day. I love her very much."},{"speakerIndex":0,"text":"What animal is the pet?"},{"speakerIndex":0,"text":"a fish"}],"questions":[{"type":"detail","question":"What kind of pet does the child have?","options":["A dog","A fish","A bird","A cat"],"correctIndex":3},{"type":"detail","question":"What is the pet's name?","options":["Lucy","Luna","Lisa","Lily"],"correctIndex":3},{"type":"detail","question":"What colour is the pet?","options":["Orange","Grey","Black","White"],"correctIndex":3}]},{"id":"LS-MO3MHW3S-ODD","level":"Pre-A1","format":"dialogue","title":"The Weather","taskContext":"Listen to two friends talking about the weather.","speed":0.8,"characters":[{"name":"Friend A","role":"friend","side":"left","emoji":"👩"},{"name":"Friend B","role":"friend","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"It's very hot today!"},{"speakerIndex":1,"text":"Yes! Do you want to go swimming?"},{"speakerIndex":0,"text":"Good idea. Let's go to the pool."},{"speakerIndex":1,"text":"OK! I'll get my bag."},{"speakerIndex":0,"text":"See you in five minutes!"}],"questions":[{"type":"detail","question":"Where do they decide to go?","options":["The beach","The park","The pool","Home"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-G9G","level":"A1","format":"dialogue","title":"Making Plans","taskContext":"Listen to two friends making plans for the weekend.","speed":0.75,"characters":[{"name":"Sam","role":"student","side":"left","emoji":"👩"},{"name":"Lisa","role":"student","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Hey Lisa, are you free on Saturday?"},{"speakerIndex":1,"text":"Yes, I am! What do you want to do?"},{"speakerIndex":0,"text":"There's a new film at the cinema. Do you want to go?"},{"speakerIndex":1,"text":"That sounds great! What time does it start?"},{"speakerIndex":0,"text":"At three o'clock. We can meet at two thirty."},{"speakerIndex":1,"text":"Perfect! See you then."}],"questions":[{"type":"detail","question":"What do Sam and Lisa plan to do on Saturday?","options":["Go to the park","Go shopping","Have a picnic","Go to the cinema"],"correctIndex":3},{"type":"detail","question":"What time does the film start?","options":["Two o'clock","Two thirty","Three thirty","Three o'clock"],"correctIndex":3},{"type":"detail","question":"What time do they agree to meet?","options":["Two o'clock","Two thirty","Three o'clock","Three thirty"],"correctIndex":1}]},{"id":"LS-MO3MHW3S-MQG","level":"A1","format":"dialogue","title":"At the Library","taskContext":"Listen to a conversation in a school library.","speed":0.75,"characters":[{"name":"Student","role":"student","side":"left","emoji":"👩"},{"name":"Librarian","role":"librarian","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Excuse me. I'm looking for a book about animals."},{"speakerIndex":1,"text":"Of course. What kind of animals are you interested in?"},{"speakerIndex":0,"text":"I like wild animals. Lions and tigers."},{"speakerIndex":1,"text":"Go to section B. There are many books about African wildlife."},{"speakerIndex":0,"text":"Thank you. Can I borrow three books?"},{"speakerIndex":1,"text":"You can borrow up to five books for two weeks."}],"questions":[{"type":"detail","question":"What kind of books does the student want?","options":["Books about pets","Books about history","Books about wild animals","Books about space"],"correctIndex":2},{"type":"detail","question":"How many books can the student borrow?","options":["Two","Three","Four","Five"],"correctIndex":3},{"type":"detail","question":"How long can the student keep the books?","options":["One week","Two weeks","Three weeks","One month"],"correctIndex":1}]},{"id":"LS-MO3MHW3S-HQD","level":"A2","format":"dialogue","title":"Changing Plans","taskContext":"Two friends are changing their plans for a school project.","speed":0.82,"characters":[{"name":"Maya","role":"student","side":"left","emoji":"👩"},{"name":"Jake","role":"student","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Jake, I'm sorry but I can't meet on Thursday to work on the project."},{"speakerIndex":1,"text":"That's OK. Is Friday better for you?"},{"speakerIndex":0,"text":"Friday works. But I have a class until four, so can we meet after that?"},{"speakerIndex":1,"text":"Sure. My house or the library?"},{"speakerIndex":0,"text":"The library would be better. It's quieter."},{"speakerIndex":1,"text":"Agreed. I'll bring my notes."}],"questions":[{"type":"detail","question":"Why can't Maya meet on Thursday?","options":["She forgot","She is ill","She has a class","She has another appointment"],"correctIndex":3},{"type":"detail","question":"What time can they meet on Friday?","options":["After two","After three","After four","After five"],"correctIndex":2},{"type":"detail","question":"Where will they meet?","options":["Jake's house","The library","The school hall","The café"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-WVY","level":"A2","format":"dialogue","title":"Holiday Advice","taskContext":"A man is asking for travel advice at a tourist office.","speed":0.82,"characters":[{"name":"Visitor","role":"tourist","side":"left","emoji":"👩"},{"name":"Officer","role":"staff","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I'm visiting Johor Bahru for three days. What do you recommend?"},{"speakerIndex":1,"text":"I'd recommend visiting the waterfront and trying some local food."},{"speakerIndex":0,"text":"Is there anything for children?"},{"speakerIndex":1,"text":"Yes, Legoland and Hello Kitty Town are very popular with families."},{"speakerIndex":0,"text":"Great! Are they expensive?"},{"speakerIndex":1,"text":"Legoland costs around 60 ringgit for adults and less for children."}],"questions":[{"type":"detail","question":"How many days is the visitor staying?","options":["Two days","Three days","Four days","Five days"],"correctIndex":1},{"type":"detail","question":"What does the officer recommend for children?","options":["A museum","A shopping mall","A theme park","A zoo"],"correctIndex":2},{"type":"detail","question":"What is one cost the officer mentions?","options":["Hotel costs","Food prices","Transport fees","The theme park entry fee"],"correctIndex":3}]},{"id":"LS-MO3MHW3S-SGU","level":"A2","format":"monologue","title":"My Neighbourhood","taskContext":"Listen to someone describing where they live.","speed":0.82,"characters":[{"name":"Speaker","role":"narrator","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I live in a small town called Hillside. There's a market on Fridays where people sell vegetables and handmade crafts. My favourite place is the old library which has been there for over a hundred years. Although it's small, it's very friendly."},{"speakerIndex":0,"text":"When is the market held?"},{"speakerIndex":0,"text":"Wednesday"}],"questions":[{"type":"detail","question":"When is the market in Hillside?","options":["Mondays","Wednesdays","Fridays","Sundays"],"correctIndex":2},{"type":"detail","question":"What do people sell at the market?","options":["Books and toys","Food and medicine","Vegetables and handmade crafts","Clothes and shoes"],"correctIndex":2},{"type":"detail","question":"What is the speaker's favourite place?","options":["The market","The park","The old library","The town hall"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-0HS","level":"B1","format":"dialogue","title":"A Job Interview","taskContext":"Listen to a job interview at a hotel.","speed":0.88,"characters":[{"name":"Manager","role":"hotel manager","side":"left","emoji":"👩"},{"name":"Applicant","role":"job applicant","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Thank you for coming in today. Can you tell me about your previous work experience?"},{"speakerIndex":1,"text":"Yes, I worked as a receptionist at a small hotel for two years. I dealt with customer inquiries and managed bookings."},{"speakerIndex":0,"text":"Excellent. What do you consider your main strength?"},{"speakerIndex":1,"text":"I'd say communication skills. I enjoy working with people from different backgrounds."},{"speakerIndex":0,"text":"And what about weaknesses?"},{"speakerIndex":1,"text":"I sometimes focus too much on detail, but I'm working on being more flexible."}],"questions":[{"type":"detail","question":"Where did the applicant previously work?","options":["A hospital","An office","A school","A hotel"],"correctIndex":3},{"type":"detail","question":"What does the applicant consider their main strength?","options":["Technical skills","Communication and attention to detail","Leadership","Time management"],"correctIndex":1},{"type":"detail","question":"What weakness does the applicant mention?","options":["Being disorganised","Lack of experience","Focusing too much on detail","Poor communication"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-V5W","level":"B1","format":"dialogue","title":"Environmental Discussion","taskContext":"Two students discuss recycling at school.","speed":0.88,"characters":[{"name":"Student A","role":"student","side":"left","emoji":"👩"},{"name":"Student B","role":"student","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Did you know our school only recycles about thirty per cent of its waste?"},{"speakerIndex":1,"text":"That's disappointing. What could we do to improve it?"},{"speakerIndex":0,"text":"We could start by having clearly labelled bins in every classroom."},{"speakerIndex":1,"text":"Good idea. We should also talk to students about what can and can't be recycled."},{"speakerIndex":0,"text":"Maybe we could organise a presentation during assembly?"},{"speakerIndex":1,"text":"Brilliant. I'll speak to the head teacher tomorrow."}],"questions":[{"type":"detail","question":"What percentage of school waste is currently recycled?","options":["Ten percent","Twenty percent","Thirty percent","Forty percent"],"correctIndex":2},{"type":"detail","question":"What is the first suggestion to improve recycling?","options":["Write a report","Make a presentation","Have clearly labelled bins","Talk to teachers"],"correctIndex":2},{"type":"detail","question":"What will Student B do after the discussion?","options":["Write a report","Make a poster","Speak to the head teacher","Set up new bins"],"correctIndex":2}]},{"id":"LS-MO3MHW3S-QMX","level":"B2","format":"dialogue","title":"Investment Decision","taskContext":"Listen to two business partners discussing an investment.","speed":0.95,"characters":[{"name":"Partner A","role":"investor","side":"left","emoji":"👩"},{"name":"Partner B","role":"investor","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The quarterly figures show a seven per cent increase in revenue, but our profit margins are still under pressure."},{"speakerIndex":1,"text":"I've been looking at the analysis. The core issue seems to be rising operational costs, particularly in logistics."},{"speakerIndex":0,"text":"Exactly. Should we consider outsourcing that division?"},{"speakerIndex":1,"text":"It would reduce costs short-term, but we'd lose direct control over quality."},{"speakerIndex":0,"text":"What about renegotiating contracts with our current suppliers?"},{"speakerIndex":1,"text":"That's worth exploring. I'll set up a meeting with procurement this week."}],"questions":[{"type":"detail","question":"What has increased by 7 per cent?","options":["Costs","Employees","Profit margins","Revenue"],"correctIndex":3},{"type":"detail","question":"What does Partner B identify as the core problem?","options":["Falling sales","Poor quality products","High operational costs","Staff shortages"],"correctIndex":2},{"type":"detail","question":"What does Partner B agree to do?","options":["Hire more staff","Meet with procurement about supply chain costs","Outsource logistics","Reduce staff numbers"],"correctIndex":1}]},{"id":"LS-MO3MHW3S-MDJ","level":"B2","format":"monologue","title":"Artificial Intelligence in Healthcare","taskContext":"Listen to a short lecture extract.","speed":0.95,"characters":[{"name":"Lecturer","role":"academic","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Artificial intelligence is increasingly being applied in diagnostic medicine. Algorithms trained on millions of patient records can now identify patterns in medical imaging that human doctors sometimes miss. However, concerns remain about data privacy, algorithmic bias, and the ethical implications of machines making decisions that affect human lives."},{"speakerIndex":0,"text":"What is AI being used for in the lecture?"},{"speakerIndex":0,"text":"diagnostic medicine"}],"questions":[{"type":"detail","question":"In which area of medicine is AI most prominently used according to the lecture?","options":["Drug development","Hospital management","Surgical procedures","Diagnostic medicine"],"correctIndex":3},{"type":"detail","question":"What major concern does the lecturer raise about AI in medicine?","options":["It is too expensive","It requires specialist training","Algorithmic bias in training data","It is unreliable"],"correctIndex":2},{"type":"detail","question":"What can AI algorithms analyse that humans struggle with?","options":["Patient symptoms","Patterns in medical imaging","Drug interactions","Hospital errors"],"correctIndex":1}]},{"id":"LS-MO3MHW3S-6H2","level":"C1","format":"dialogue","title":"Academic Research Discussion","taskContext":"A professor and student discuss research methodology.","speed":1,"characters":[{"name":"Professor","role":"academic","side":"left","emoji":"👩"},{"name":"Student","role":"postgraduate","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Your literature review is solid, but I'm concerned the methodology lacks rigour. The sample size for the qualitative component is too small to draw generalisable conclusions."},{"speakerIndex":1,"text":"I considered increasing it, but access to participants in that demographic proved challenging."},{"speakerIndex":0,"text":"That's understandable. Have you thou
