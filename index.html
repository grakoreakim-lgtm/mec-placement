ght about triangulating with secondary data sources?"},{"speakerIndex":1,"text":"Not extensively. Do you mean using existing datasets alongside the primary research?"},{"speakerIndex":0,"text":"Precisely. It would strengthen the validity of your findings considerably."},{"speakerIndex":1,"text":"I see. I'll revise the methodology chapter accordingly."}],"questions":[{"type":"detail","question":"What concern does the professor raise about the methodology?","options":["The writing style is poor","The literature review is incomplete","The sample size is too small for generalisable conclusions","The research question is unclear"],"correctIndex":2},{"type":"detail","question":"Why was the qualitative sample size small?","options":["The student was lazy","Time constraints limited recruitment","The topic was too sensitive","Funding was insufficient"],"correctIndex":1},{"type":"detail","question":"What does 'triangulating data sources' mean in this context?","options":["Checking data three times","Using three different research methods to validate findings","Having three researchers review the data","Organising data into three categories"],"correctIndex":1}]},{"id":"LS-MO3MHW3S-UYJ","level":"C1","format":"monologue","title":"The Ethics of Genetic Editing","taskContext":"Listen to a conference talk.","speed":1,"characters":[{"name":"Speaker","role":"researcher","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"CRISPR technology has opened extraordinary possibilities in genetic medicine, from eliminating hereditary diseases to enhancing crop resilience. Yet the ethical landscape is complex. The prospect of germline editing — altering genes in embryos — raises profound questions about consent, equity, and what it means to be human. While therapeutic applications enjoy broad scientific consensus, enhancement uses remain deeply controversial, threatening to exacerbate existing social inequalities."},{"speaker rs":[{"name":"Passenger","role":"Traveller","side":"left","emoji":"👩"},{"name":"Agent","role":"Airline Staff","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Hello. I'm checking in for the flight to Barcelona."},{"speakerIndex":1,"text":"Can I see your passport, please?"},{"speakerIndex":0,"text":"Here you are. I have one suitcase to check in."},{"speakerIndex":1,"text":"Would you like a window or aisle seat?"},{"speakerIndex":0,"text":"Window, please."},{"speakerIndex":1,"text":"Here's your boarding pass. Gate twenty-two."}],"questions":[{"type":"detail","question":"Where is the passenger flying to?","options":["Madrid","Paris","Barcelona","London"],"correctIndex":2},{"type":"detail","question":"How many bags does the passenger check in?","options":["None","One","Two","Three"],"correctIndex":1},{"type":"detail","question":"Which seat does the passenger prefer?","options":["Middle","Aisle","Back","Window"],"correctIndex":3}]},{"id":"LS-MO3RGJTN-92B","level":"A2","format":"dialogue","title":"Choosing a Holiday","taskContext":"A couple discuss holiday options.","speed":0.82,"characters":[{"name":"Sarah","role":"Partner","side":"left","emoji":"👩"},{"name":"Mike","role":"Partner","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I've been looking at holidays. What about a beach in Thailand?"},{"speakerIndex":1,"text":"That sounds expensive. How about somewhere in Europe?"},{"speakerIndex":0,"text":"I was thinking of Greece — beautiful scenery and not too far."},{"speakerIndex":1,"text":"How much would it cost for two weeks?"},{"speakerIndex":0,"text":"Around fifteen hundred each, including flights and hotel."},{"speakerIndex":1,"text":"That's reasonable. Let's go to Greece then!"}],"questions":[{"type":"detail","question":"What destination does Sarah suggest first?","options":["Spain","Italy","Greece","Thailand"],"correctIndex":3},{"type":"detail","question":"What is Mike's concern about Sarah's suggestion?","options":["The distance","The food","The weather","The cost"],"correctIndex":3},{"type":"detail","question":"Which destination do they agree on?","options":["Spain","Italy","Thailand","Greece"],"correctIndex":3}]},{"id":"LS-MO3RGJTN-QAK","level":"A2","format":"dialogue","title":"The Complaint","taskContext":"A customer complains about a product.","speed":0.82,"characters":[{"name":"Customer","role":"","side":"left","emoji":"👩"},{"name":"Manager","role":"Retail Manager","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Excuse me. I bought this laptop last week and it's already stopped working."},{"speakerIndex":1,"text":"I'm sorry to hear that. Do you have your receipt?"},{"speakerIndex":0,"text":"Yes, here it is. It was fine and then just switched off."},{"speakerIndex":1,"text":"We can offer you a replacement or a full refund."},{"speakerIndex":0,"text":"I'd prefer a replacement, please."},{"speakerIndex":1,"text":"Of course. I'll arrange that straight away."}],"questions":[{"type":"detail","question":"What is the customer's problem?","options":["Wrong item delivered","Laptop stopped working","Late delivery","Broken screen"],"correctIndex":1},{"type":"detail","question":"What does the manager offer first?","options":["A refund","A discount","A replacement","A repair"],"correctIndex":3},{"type":"detail","question":"What does the customer choose?","options":["A refund","A repair","A store credit","A replacement"],"correctIndex":0}]},{"id":"LS-MO3RGJTN-LVH","level":"A2","format":"monologue","title":"Living Abroad","taskContext":"A woman talks about living in Japan.","speed":0.82,"characters":[{"name":"Julia","role":"Expat","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I moved to Japan two years ago for work."},{"speakerIndex":0,"text":"At first, the language barrier was very challenging."},{"speakerIndex":0,"text":"I enrolled in Japanese classes straight away."},{"speakerIndex":0,"text":"The culture is very different — people are extremely polite and punctual."},{"speakerIndex":0,"text":"I've made great friends and I love the food."},{"speakerIndex":0,"text":"I don't think I'll be coming back to my home country any time soon."}],"questions":[{"type":"detail","question":"How long has Julia lived in Japan?","options":["One year","Two years","Three years","Four years"],"correctIndex":1},{"type":"detail","question":"What did she do to overcome the language barrier?","options":["Hired a translator","Enrolled in Japanese classes","Ignored the problem","Used translation apps"],"correctIndex":1},{"type":"detail","question":"How does she describe Japanese culture?","options":["Very similar to hers","Very different but fascinating","People are impolite","Very difficult to understand"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-7X4","level":"A2","format":"dialogue","title":"University Application","taskContext":"A student talks to a counsellor.","speed":0.82,"characters":[{"name":"Student","role":"","side":"left","emoji":"👩"},{"name":"Teacher","role":"Counsellor","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I'm thinking of applying to study medicine. Do you think I have a good chance?"},{"speakerIndex":1,"text":"Your grades are excellent. The main challenge is getting work experience."},{"speakerIndex":0,"text":"I've already volunteered at the local hospital for three months."},{"speakerIndex":1,"text":"That's brilliant. You should also prepare for the entrance exam."},{"speakerIndex":0,"text":"I've been doing practice papers. Is there anything else?"},{"speakerIndex":1,"text":"Make your personal statement strong. Explain why medicine is your passion."}],"questions":[{"type":"detail","question":"What does the student want to study?","options":["Law","Engineering","Medicine","Science"],"correctIndex":2},{"type":"detail","question":"What has the student already done to prepare?","options":["Passed an entrance exam","Completed extra courses","Volunteered at a hospital","Studied abroad"],"correctIndex":2},{"type":"detail","question":"What is the teacher's advice?","options":["Work harder on grades","Take more exams","Improve the personal statement","Apply to more universities"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-0V6","level":"A2","format":"dialogue","title":"The New Neighbours","taskContext":"Two neighbours meet for the first time.","speed":0.82,"characters":[{"name":"Maria","role":"Resident","side":"left","emoji":"👩"},{"name":"Tom","role":"New Resident","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Hi! You must be our new neighbours."},{"speakerIndex":1,"text":"Yes, that's right. We moved in last weekend. I'm Tom."},{"speakerIndex":0,"text":"I'm Maria. Welcome to the street. How are you finding it?"},{"speakerIndex":1,"text":"Lovely, thank you. Everyone seems very friendly."},{"speakerIndex":0,"text":"We're having a small get-together on Friday. You're welcome to join us."},{"speakerIndex":1,"text":"That's very kind. We'd love to come."}],"questions":[{"type":"detail","question":"When did Tom move in?","options":["Last month","Last week","Two weeks ago","A few days ago"],"correctIndex":1},{"type":"detail","question":"How does Tom find the neighbourhood?","options":["Noisy","Unfriendly","Very quiet and lovely","Very busy"],"correctIndex":2},{"type":"detail","question":"What is happening on Friday?","options":["A street party","A small get-together","A neighbourhood meeting","A barbecue"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-FP6","level":"A2","format":"monologue","title":"Working as a Chef","taskContext":"A chef talks about their career.","speed":0.82,"characters":[{"name":"Carlos","role":"Chef","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I've been a professional chef for twelve years."},{"speakerIndex":0,"text":"I started as a kitchen assistant and worked my way up."},{"speakerIndex":0,"text":"The hours are long and the work is physically demanding."},{"speakerIndex":0,"text":"But when customers love your food, there is nothing more rewarding."},{"speakerIndex":0,"text":"I run my own restaurant now, which I opened three years ago."},{"speakerIndex":0,"text":"My specialty is modern European cuisine with Asian influences."}],"questions":[{"type":"detail","question":"How long has Carlos been a professional chef?","options":["Five years","Ten years","Twelve years","Fifteen years"],"correctIndex":2},{"type":"detail","question":"What was his first job in the kitchen?","options":["Head chef","Waiter","Sous chef","Kitchen assistant"],"correctIndex":3},{"type":"detail","question":"What type of food does he specialise in?","options":["Asian fusion","Italian cuisine","Modern European with Asian influences","Traditional French"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-6A4","level":"A2","format":"interview","title":"A Health Podcast","taskContext":"A presenter interviews a nutritionist.","speed":0.82,"characters":[{"name":"Presenter","role":"Host","side":"left","emoji":"👩"},{"name":"Nutritionist","role":"Health Expert","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Welcome back. Today we're talking about healthy eating with Dr Kane."},{"speakerIndex":1,"text":"Thank you for having me."},{"speakerIndex":0,"text":"What's the most common mistake people make with their diet?"},{"speakerIndex":1,"text":"Skipping breakfast. It reduces concentration and leads to overeating later."},{"speakerIndex":0,"text":"What would you recommend for a healthy breakfast?"},{"speakerIndex":1,"text":"Oats, eggs or whole grain bread with protein. Avoid sugary cereals."}],"questions":[{"type":"detail","question":"Who is the guest on the podcast?","options":["A chef","A pharmacist","A nutritionist","A fitness coach"],"correctIndex":2},{"type":"detail","question":"What is the most common dietary mistake Dr Kane mentions?","options":["Eating too late","Skipping lunch","Not drinking enough water","Skipping breakfast"],"correctIndex":3},{"type":"detail","question":"What does Dr Kane recommend for breakfast?","options":["Sugary cereals","Fruit juice only","Oats, eggs or whole grain bread","Coffee and toast"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-T4O","level":"B1","format":"dialogue","title":"The Performance Review","taskContext":"An employee meets their manager.","speed":0.88,"characters":[{"name":"Manager","role":"Line Manager","side":"left","emoji":"👩"},{"name":"Employee","role":"Staff Member","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Thank you for coming in. Overall, it's been a strong year for you."},{"speakerIndex":1,"text":"Thank you. I've been working hard on the new client accounts."},{"speakerIndex":0,"text":"That's been noticed. We'd like to offer you a promotion to senior analyst."},{"speakerIndex":1,"text":"That's wonderful news. Are there any areas you'd like me to improve?"},{"speakerIndex":0,"text":"Your presentation skills are good, but more data analysis training would be beneficial."},{"speakerIndex":1,"text":"I'd welcome that. I've actually been looking at online courses."}],"questions":[{"type":"detail","question":"How does the manager describe the year overall?","options":["Very mixed","Disappointing","Strong","Average"],"correctIndex":2},{"type":"detail","question":"What new role is being offered to the employee?","options":["Team leader","Senior analyst","Director","Manager"],"correctIndex":0},{"type":"detail","question":"What development area is suggested?","options":["Communication","Presentation skills","Leadership","Time management"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-GCU","level":"B1","format":"dialogue","title":"Renting a Flat","taskContext":"A person enquires about renting an apartment.","speed":0.88,"characters":[{"name":"Agent","role":"Estate Agent","side":"left","emoji":"👩"},{"name":"Tenant","role":"Prospective Tenant","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The flat is available from the first of next month."},{"speakerIndex":1,"text":"What is the monthly rent?"},{"speakerIndex":0,"text":"One thousand two hundred per month, including water and council tax."},{"speakerIndex":1,"text":"Is parking included?"},{"speakerIndex":0,"text":"There's one allocated space in the underground car park."},{"speakerIndex":1,"text":"That sounds suitable. Could I arrange a viewing this week?"}],"questions":[{"type":"detail","question":"When is the flat available?","options":["This week","Next month","From the first of next month","In two months"],"correctIndex":2},{"type":"detail","question":"What is included in the rent?","options":["All bills","Water and council tax","Electricity only","Nothing extra"],"correctIndex":1},{"type":"detail","question":"What does the tenant ask to arrange?","options":["A meeting with the landlord","A contract signing","A viewing","A payment plan"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-DLS","level":"B1","format":"monologue","title":"A Talk on Failure","taskContext":"A speaker addresses an audience.","speed":0.88,"characters":[{"name":"Speaker","role":"Entrepreneur","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I want to talk about failure — specifically, why we need to embrace it."},{"speakerIndex":0,"text":"My first business failed within six months. I lost everything."},{"speakerIndex":0,"text":"But that failure taught me more than any success ever could."},{"speakerIndex":0,"text":"The most successful people in history failed repeatedly before they succeeded."},{"speakerIndex":0,"text":"The question isn't whether you will fail — it's how quickly you get back up."},{"speakerIndex":0,"text":"Reframe failure as feedback, and it becomes the greatest teacher."}],"questions":[{"type":"detail","question":"What is the main theme of the talk?","options":["How to succeed in business","Why we should embrace failure","How to avoid mistakes","The importance of planning"],"correctIndex":1},{"type":"detail","question":"What happened to the speaker's first business?","options":["It was very successful","It was sold","It failed within six months","It was taken over"],"correctIndex":2},{"type":"detail","question":"How should failure be reframed according to the speaker?","options":["As a setback","As a learning opportunity and feedback","As something to hide","As a personal weakness"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-0O5","level":"B1","format":"dialogue","title":"The Ethics Discussion","taskContext":"Two students debate.","speed":0.88,"characters":[{"name":"Student A","role":"University Student","side":"left","emoji":"👩"},{"name":"Student B","role":"University Student","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Do you think it's ever acceptable to lie to protect someone's feelings?"},{"speakerIndex":1,"text":"In some cases, yes. If the truth would cause unnecessary pain, a white lie can be kinder."},{"speakerIndex":0,"text":"But doesn't that undermine trust? What if they find out?"},{"speakerIndex":1,"text":"That's true. Honesty is generally better. But context matters."},{"speakerIndex":0,"text":"I agree. There's no single rule that applies to every situation."},{"speakerIndex":1,"text":"Exactly. Ethics is rarely black and white."}],"questions":[{"type":"detail","question":"What is the topic of their discussion?","options":["Academic honesty","Telling lies to protect feelings","Cheating in exams","Breaking rules"],"correctIndex":1},{"type":"detail","question":"What does Student B initially argue?","options":["Lying is always wrong","A white lie can sometimes be kinder","Honesty is always the best policy","People should never lie"],"correctIndex":1},{"type":"detail","question":"What do both students agree on at the end?","options":["Lying is always wrong","Ethics is rarely black and white","Honesty is always best","White lies are acceptable"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-6X7","level":"B1","format":"interview","title":"Working in Hospitality","taskContext":"A hotel manager is interviewed.","speed":0.88,"characters":[{"name":"Interviewer","role":"Journalist","side":"left","emoji":"👩"},{"name":"Manager","role":"Hotel Manager","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"You've worked in hospitality for over twenty years. What's changed most?"},{"speakerIndex":1,"text":"Technology has transformed everything — online reviews have made customer satisfaction more visible than ever."},{"speakerIndex":0,"text":"How do you handle negative reviews?"},{"speakerIndex":1,"text":"We respond professionally and use them as opportunities to improve."},{"speakerIndex":0,"text":"What's the most important quality for hotel staff?"},{"speakerIndex":1,"text":"Empathy. Guests come with different needs and expectations."}],"questions":[{"type":"detail","question":"How long has the manager worked in hospitality?","options":["Ten years","Twenty years","Over twenty years","Thirty years"],"correctIndex":2},{"type":"detail","question":"What has transformed hospitality the most according to the manager?","options":["Staff training","New hotel designs","Technology and online reviews","Lower prices"],"correctIndex":2},{"type":"detail","question":"What is the most important quality for hospitality staff?","options":["Efficiency","Speed","Empathy","Technical knowledge"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-OHD","level":"B1","format":"dialogue","title":"Career Change","taskContext":"Two friends discuss changing careers.","speed":0.88,"characters":[{"name":"Friend A","role":"","side":"left","emoji":"👩"},{"name":"Friend B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"I'm thinking of leaving my job in finance to become a teacher."},{"speakerIndex":1,"text":"That's a big change. What's made you consider it?"},{"speakerIndex":0,"text":"I feel like my work has no meaning. I want to make a difference."},{"speakerIndex":1,"text":"Teaching is rewarding but the salary cut would be significant."},{"speakerIndex":0,"text":"I know. But I've found there are grants available for career changers."},{"speakerIndex":1,"text":"If it's what you're passionate about, it might be worth it."}],"questions":[{"type":"detail","question":"What is Friend A's current job?","options":["Engineering","Medicine","Teaching","Finance"],"correctIndex":3},{"type":"detail","question":"What is Friend A's main reason for wanting to change?","options":["Better pay","Wanting more holidays","Wanting meaningful work","Job security concerns"],"correctIndex":2},{"type":"detail","question":"What financial support has Friend A found?","options":["A loan","A scholarship","A grant","A bonus"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-3JS","level":"B1","format":"monologue","title":"Climate Change and Young People","taskContext":"A student gives a speech.","speed":0.88,"characters":[{"name":"Speaker","role":"Student Activist","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"My generation didn't cause climate change, but we'll bear the consequences."},{"speakerIndex":0,"text":"Every year, we see more extreme weather events — floods, wildfires, droughts."},{"speakerIndex":0,"text":"Governments have made promises but action has been too slow."},{"speakerIndex":0,"text":"That's why young people around the world are taking to the streets."},{"speakerIndex":0,"text":"Change doesn't come from waiting — it comes from demanding it."},{"speakerIndex":0,"text":"We owe it to future generations to act now."}],"questions":[{"type":"detail","question":"What events does the speaker mention as evidence of climate change?","options":["Snow, ice and frost","Rain, wind and cold","Floods, wildfires and droughts","Earthquakes and tsunamis"],"correctIndex":2},{"type":"detail","question":"Why are young people protesting?","options":["To raise money for charities","To get a day off school","Because governments are not acting fast enough","To show they care about the environment"],"correctIndex":2},{"type":"detail","question":"What message does the speaker end with?","options":["Young people should give up","We owe it to future generations to act now","Governments will fix the problem","Technology will solve climate change"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-MA8","level":"B2","format":"interview","title":"AI in Education","taskContext":"A podcast about technology in schools.","speed":0.95,"characters":[{"name":"Host","role":"Podcast Presenter","side":"left","emoji":"👩"},{"name":"Expert","role":"Ed-Tech Researcher","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Professor Walsh, you've been studying AI in classrooms for a decade. Are you optimistic?"},{"speakerIndex":1,"text":"Cautiously. AI can personalise learning in ways that were impossible before. But we risk undermining critical thinking if we're not careful."},{"speakerIndex":0,"text":"Can you give an example?"},{"speakerIndex":1,"text":"When students use AI to generate essays, they may gain efficiency but lose the cognitive struggle that builds understanding."},{"speakerIndex":0,"text":"So the issue isn't the tool itself?"},{"speakerIndex":1,"text":"Exactly. It's about pedagogical design — how teachers integrate AI, not whether they use it."}],"questions":[{"type":"detail","question":"How long has Professor Walsh been studying AI in classrooms?","options":["Five years","A decade","Fifteen years","Twenty years"],"correctIndex":1},{"type":"detail","question":"What risk does the professor identify?","options":["Higher costs for schools","Students becoming over-reliant on devices","Undermining critical thinking skills","Teachers losing their jobs"],"correctIndex":2},{"type":"detail","question":"What does the professor say is the real issue?","options":["The technology itself","Student motivation","Pedagogical design — how teachers integrate AI","School funding"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-FJX","level":"B2","format":"dialogue","title":"The Business Negotiation","taskContext":"Two executives negotiate a deal.","speed":0.95,"characters":[{"name":"Director A","role":"Company Director","side":"left","emoji":"👩"},{"name":"Director B","role":"Potential Partner","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"We're prepared to offer a fifteen percent equity stake in exchange for the capital investment."},{"speakerIndex":1,"text":"That's lower than we'd anticipated. Our analysts projected at least twenty percent."},{"speakerIndex":0,"text":"We can look at performance bonuses if key milestones are met within eighteen months."},{"speakerIndex":1,"text":"That could work, depending on how the milestones are defined."},{"speakerIndex":0,"text":"We'll ensure they reflect genuine business growth rather than vanity metrics."},{"speakerIndex":1,"text":"If you can put that in writing, I think we're getting closer to an agreement."}],"questions":[{"type":"detail","question":"What equity stake does Director A initially offer?","options":["Ten percent","Fifteen percent","Twenty percent","Twenty-five percent"],"correctIndex":1},{"type":"detail","question":"What return do Director B's analysts project?","options":["Ten percent","Twenty percent","Twenty-five percent","Thirty percent"],"correctIndex":2},{"type":"detail","question":"What does Director A propose as an alternative to a higher stake?","options":["A longer payment period","More regular reporting","A higher initial payment","Performance bonuses for milestones"],"correctIndex":3}]},{"id":"LS-MO3RGJTN-AER","level":"B2","format":"panel","title":"Urban Housing Crisis","taskContext":"A panel discussion.","speed":0.95,"characters":[{"name":"Panellist A","role":"Housing Economist","side":"left","emoji":"👩"},{"name":"Panellist B","role":"Urban Planner","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The fundamental problem is that supply has never kept pace with demand in major cities."},{"speakerIndex":1,"text":"I'd agree, but supply alone won't solve it. We need to address speculative investment in residential property."},{"speakerIndex":0,"text":"That's contentious. Property investment has also financed a great deal of new development."},{"speakerIndex":1,"text":"At the cost of pricing out an entire generation. We need stronger rent controls and more social housing."},{"speakerIndex":0,"text":"The evidence on rent controls is mixed. Some studies show they reduce supply in the long run."},{"speakerIndex":1,"text":"Which is why we need a comprehensive strategy, not a single-policy fix."}],"questions":[{"type":"detail","question":"What does Panellist A identify as the fundamental problem?","options":["High interest rates","Supply has never kept pace with demand","Lack of government funding","Too many foreign buyers"],"correctIndex":1},{"type":"detail","question":"What does Panellist B argue for alongside rent controls?","options":["Tax incentives for developers","More social housing","Stricter planning laws","Reducing immigration"],"correctIndex":1},{"type":"detail","question":"What does Panellist A say about rent controls?","options":["They always work","They are the best solution","They can reduce supply if not carefully designed","They should be abolished"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-TAQ","level":"B2","format":"interview","title":"A Global Health Crisis","taskContext":"A doctor discusses pandemic preparedness.","speed":0.95,"characters":[{"name":"Journalist","role":"","side":"left","emoji":"👩"},{"name":"Doctor","role":"Public Health Expert","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Looking back at recent pandemics, were we prepared?"},{"speakerIndex":1,"text":"Frankly, no. We had years of warnings but failed to invest adequately in surveillance systems and vaccine infrastructure."},{"speakerIndex":0,"text":"What should change?"},{"speakerIndex":1,"text":"Sustained international funding for the WHO, binding agreements on sharing pathogen data, and national stockpiles of PPE."},{"speakerIndex":0,"text":"Is there political will?"},{"speakerIndex":1,"text":"Short-term political cycles make long-term health investment very difficult. That's the structural problem."}],"questions":[{"type":"detail","question":"Were countries prepared for the pandemic according to the doctor?","options":["Yes, most were ready","Partially prepared","Frankly, no","Most high-income countries were"],"correctIndex":2},{"type":"detail","question":"What investment did countries fail to make?","options":["In more hospitals","In surveillance systems and vaccine infrastructure","In training more doctors","In research funding"],"correctIndex":1},{"type":"detail","question":"What structural problem does the doctor identify?","options":["Lack of qualified doctors","Short-term political cycles making long-term investment difficult","Inadequate hospital buildings","Poor communication between countries"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-E99","level":"B2","format":"dialogue","title":"The Work-Life Balance Dilemma","taskContext":"Two colleagues discuss workload.","speed":0.95,"characters":[{"name":"Colleague A","role":"Employee","side":"left","emoji":"👩"},{"name":"Colleague B","role":"Employee","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Have you noticed how much we're expected to be available outside working hours?"},{"speakerIndex":1,"text":"Completely. I got three emails after midnight last week. It's becoming normalised."},{"speakerIndex":0,"text":"We need to push back. The evidence on burnout is clear — this isn't sustainable."},{"speakerIndex":1,"text":"But I'm worried about being seen as uncommitted if I set boundaries."},{"speakerIndex":0,"text":"That's exactly the culture we need to challenge. Productivity doesn't equal constant availability."},{"speakerIndex":1,"text":"You're right. I'm going to talk to HR about a clear after-hours communication policy."}],"questions":[{"type":"detail","question":"What problem do they discuss?","options":["Office conditions","Salary levels","Being expected to be available outside working hours","Lack of promotion"],"correctIndex":2},{"type":"detail","question":"Why is Colleague B reluctant to raise the issue?","options":["Fear of being fired","Worry about appearing uncommitted","They do not think it is a problem","Fear of upsetting colleagues"],"correctIndex":1},{"type":"detail","question":"What does Colleague B decide to do?","options":["Quit the job","Ask for a pay rise","Work fewer hours","Talk to HR about a communication policy"],"correctIndex":3}]},{"id":"LS-MO3RGJTN-GYN","level":"B2","format":"monologue","title":"The Future of Food","taskContext":"A food scientist gives a keynote.","speed":0.95,"characters":[{"name":"Speaker","role":"Food Scientist","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"By 2050, we'll need to feed ten billion people on a planet under severe climate stress."},{"speakerIndex":0,"text":"Conventional agriculture accounts for roughly a third of global greenhouse gas emissions."},{"speakerIndex":0,"text":"Alternatives like lab-grown meat, vertical farming and insect protein are no longer science fiction."},{"speakerIndex":0,"text":"Lab-grown meat produces up to ninety percent less greenhouse gas than conventional beef."},{"speakerIndex":0,"text":"The challenge isn't technological — it's cultural. Changing what people eat is profoundly difficult."},{"speakerIndex":0,"text":"Policy must incentivise the transition rather than simply hoping consumer behaviour will change."}],"questions":[{"type":"detail","question":"How many people will need feeding by 2050?","options":["Eight billion","Nine billion","Twelve billion","Ten billion"],"correctIndex":3},{"type":"detail","question":"How much do conventional farms contribute to greenhouse gas emissions?","options":["A tenth","A quarter","A half","A third"],"correctIndex":3},{"type":"detail","question":"What is the main challenge according to the speaker?","options":["Developing new agricultural technologies","Changing consumer food behaviour at scale","Reducing water use in farming","Convincing governments to act"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-V7E","level":"B2","format":"interview","title":"Mental Health in the Workplace","taskContext":"An HR director is interviewed.","speed":0.95,"characters":[{"name":"Journalist","role":"","side":"left","emoji":"👩"},{"name":"HR Director","role":"HR Professional","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Mental health has become a major workplace issue. How is your organisation responding?"},{"speakerIndex":1,"text":"We've introduced free counselling, mental health days, and training for line managers to spot early warning signs."},{"speakerIndex":0,"text":"Does stigma remain a problem?"},{"speakerIndex":1,"text":"Absolutely, despite progress. Employees are still reluctant to disclose conditions for fear of career consequences."},{"speakerIndex":0,"text":"What more needs to be done?"},{"speakerIndex":1,"text":"Sustained leadership commitment. Senior leaders have to model healthy behaviour themselves."}],"questions":[{"type":"detail","question":"What initiatives has the organisation introduced?","options":["Free gym memberships","Free counselling, mental health days, and manager training","Shorter working hours","Remote working options"],"correctIndex":1},{"type":"detail","question":"Why are employees reluctant to disclose mental health conditions?","options":["Privacy concerns","They do not think it is serious","Fear of career consequences","They do not trust HR"],"correctIndex":2},{"type":"detail","question":"What does the director say is most important for real change?","options":["New HR policies","Leadership role-modelling and open culture","Staff training","Better pay"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-CY1","level":"C1","format":"lecture","title":"The Philosophy of Language","taskContext":"An academic lecture extract.","speed":1,"characters":[{"name":"Professor","role":"Linguistics Professor","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"Wittgenstein's later philosophy represented a radical departure from his earlier, more formal work."},{"speakerIndex":0,"text":"In the Philosophical Investigations, he argued that meaning is not a matter of abstract reference but of use within specific language games."},{"speakerIndex":0,"text":"A word means what it does in a particular context — strip it of context and meaning dissolves."},{"speakerIndex":0,"text":"This has profound implications for translation, legal interpretation and cross-cultural communication."},{"speakerIndex":0,"text":"If meaning is context-dependent, then no translation can ever be fully faithful to the original."},{"speakerIndex":0,"text":"This isn't relativism — it's a recognition of the inherent complexity of human communication."}],"questions":[{"type":"detail","question":"What did Wittgenstein argue about meaning?","options":["Meaning is fixed and universal","Meaning is determined by logic alone","Meaning is determined by use within social contexts","Meaning is impossible to define"],"correctIndex":2},{"type":"detail","question":"What can translation never fully achieve according to the professor?","options":["Speed and accuracy","Preserving cultural and contextual nuance","Grammatical precision","Word-for-word equivalence"],"correctIndex":1},{"type":"detail","question":"What does the professor clarify Wittgenstein's view is NOT?","options":["Pragmatic","Philosophical","Relativism","Idealistic"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-7B5","level":"C1","format":"panel","title":"Post-Growth Economics","taskContext":"A panel discussion.","speed":1,"characters":[{"name":"Moderator","role":"Academic Moderator","side":"left","emoji":"👩"},{"name":"Economist","role":"Post-Growth Economist","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The growth imperative is embedded in every aspect of modern policy. Is there an alternative?"},{"speakerIndex":1,"text":"There has to be. We're on a collision course with planetary boundaries. Post-growth economics asks whether wellbeing can be decoupled from GDP growth."},{"speakerIndex":0,"text":"Critics say this would mean permanent recession."},{"speakerIndex":1,"text":"That conflates growth in GDP with growth in wellbeing. Scandinavia demonstrates you can have high wellbeing without perpetual expansion."},{"speakerIndex":0,"text":"How would such a system function politically?"},{"speakerIndex":1,"text":"It requires redistributive taxation, reduced working hours, and investment in care economies."}],"questions":[{"type":"detail","question":"What does the economist say we are heading towards?","options":["Population decline","A golden age of prosperity","A collision with planetary boundaries","Economic stagnation"],"correctIndex":2},{"type":"detail","question":"Which region is given as an example of high wellbeing without strong growth?","options":["Germany","Canada","Japan","Scandinavia"],"correctIndex":3},{"type":"detail","question":"What policies does the economist propose?","options":["Higher consumption and more investment","Restricting international trade","Redistributive taxation, reduced working hours, and investment in care economies","Technological innovation only"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-1II","level":"C1","format":"interview","title":"On Consciousness","taskContext":"A neuroscientist discusses consciousness.","speed":1,"characters":[{"name":"Host","role":"Science Journalist","side":"left","emoji":"👩"},{"name":"Neuroscientist","role":"Cognitive Neuroscientist","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The 'hard problem' of consciousness has resisted scientific explanation for decades. Are we any closer?"},{"speakerIndex":1,"text":"Honestly, no. We can map neural correlates of conscious experience with increasing precision, but the explanatory gap between brain states and subjective experience — qualia — remains unbridged."},{"speakerIndex":0,"text":"Some argue functionalism solves it — consciousness is just information processing."},{"speakerIndex":1,"text":"That's an elegant hypothesis, but it struggles to explain why any information processing should feel like anything at all."},{"speakerIndex":0,"text":"Does this have implications for AI?"},{"speakerIndex":1,"text":"Profoundly. If we can't define what makes biological systems conscious, how can we assess whether an AI has achieved it?"}],"questions":[{"type":"detail","question":"What is the 'hard problem' of consciousness?","options":["How the brain processes information","Why neural activity gives rise to subjective experience","How humans develop self-awareness","Why some people lack empathy"],"correctIndex":1},{"type":"detail","question":"What does the neuroscientist say about functionalism?","options":["It completely explains consciousness","It is widely accepted as correct","It captures information processing but may miss something essential","It has been disproven"],"correctIndex":2},{"type":"detail","question":"What AI implication is raised in the discussion?","options":["AI cannot process natural language","AI will never be useful in medicine","We cannot assess whether AI is conscious without first understanding consciousness","AI is already conscious"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-O7D","level":"C1","format":"debate","title":"Truth in Journalism","taskContext":"Two journalists debate media ethics.","speed":1,"characters":[{"name":"Journalist A","role":"Investigative Journalist","side":"left","emoji":"👩"},{"name":"Journalist B","role":"Media Ethics Expert","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The pursuit of truth sometimes requires methods that are technically illegal — phone hacking, undercover operations."},{"speakerIndex":1,"text":"That's a dangerous doctrine. Once you accept that ends justify means, you've abandoned the ethical foundations of the profession."},{"speakerIndex":0,"text":"But what if those foundations protect the powerful at the expense of the public interest?"},{"speakerIndex":1,"text":"The public interest test must be applied rigorously, not used as a post-hoc justification."},{"speakerIndex":0,"text":"You trust institutions that have their own conflicts of interest."},{"speakerIndex":1,"text":"I'd rather have flawed institutional oversight than no oversight at all. The alternative is editorial anarchy."}],"questions":[{"type":"detail","question":"What controversial methods does Journalist A defend?","options":["Fabricating quotes","Publishing unverified information","Phone hacking and undercover operations in pursuit of truth","Paying sources for information"],"correctIndex":2},{"type":"detail","question":"What does Journalist B warn against?","options":["Using the internet for research","Accepting that ends justify means","Publishing without editorial review","Sharing information with competitors"],"correctIndex":1},{"type":"detail","question":"What does Journalist B say about institutional oversight?","options":["It is perfect and should not be changed","It is too strict and limits good journalism","Flawed institutional oversight is preferable to no oversight at all","It should be abolished"],"correctIndex":2}]},{"id":"LS-MO3RGJTN-YOH","level":"C1","format":"lecture","title":"The Anthropocene","taskContext":"An environmental humanities lecture.","speed":1,"characters":[{"name":"Professor","role":"Environmental Humanities Scholar","side":"left","emoji":"👩"},{"name":"Speaker B","role":"","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The Anthropocene — the proposed geological epoch marked by dominant human influence on Earth systems — is as much a philosophical concept as a scientific one."},{"speakerIndex":0,"text":"It forces us to confront a profound paradox: we are the only species with the capacity to understand our destructive impact, yet we continue."},{"speakerIndex":0,"text":"Some scholars argue the term masks the particular culpability of industrial capitalism rather than humanity as a whole."},{"speakerIndex":0,"text":"The Capitalocene, proposed by Jason Moore, places economic relations at the centre of ecological crisis."},{"speakerIndex":0,"text":"Whatever we call it, the ethical imperative is clear: we must integrate ecological thinking into every sphere of human activity."}],"questions":[{"type":"detail","question":"What alternative concept to the Anthropocene is mentioned?","options":["The Technocene","The Urbanocene","The Capitalocene","The Industrialocene"],"correctIndex":2},{"type":"detail","question":"What is the core ethical imperative the professor identifies?","options":["Reducing population growth","Returning to pre-industrial life","Pursuing infinite economic growth","Accepting responsibility for our impact and limiting further harm"],"correctIndex":3},{"type":"detail","question":"What does the professor say the Anthropocene concept forces us to confront?","options":["The end of capitalism","Human responsibility as a geological and moral force","The limits of science","The failure of democracy"],"correctIndex":1}]},{"id":"LS-MO3RGJTN-EUG","level":"C1","format":"interview","title":"Decolonising the Curriculum","taskContext":"An academic discusses education reform.","speed":1,"characters":[{"name":"Journalist","role":"","side":"left","emoji":"👩"},{"name":"Professor","role":"Education Historian","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The decolonisation debate has been contentious. What's at stake?"},{"speakerIndex":1,"text":"The canon of knowledge was largely shaped during European colonial expansion. Decolonisation asks whose knowledge counts and who has been systematically excluded."},{"speakerIndex":0,"text":"Critics say this is ideological and undermines academic freedom."},{"speakerIndex":1,"text":"That's a mischaracterisation. Expanding what counts as authoritative knowledge isn't censorship — it's intellectual enrichment."},{"speakerIndex":0,"text":"What would a decolonised curriculum look like?"},{"speakerIndex":1,"text":"It would integrate non-Western intellectual traditions as central to each discipline, asking students to interrogate the assumptions underpinning their fields."}],"questions":[{"type":"detail","question":"What does decolonising the curriculum aim to do?","options":["Remove all Western knowledge","Teach only non-Western subjects","Critically examine whose knowledge is centred and why","Replace existing courses with new ones"],"correctIndex":2},{"type":"detail","question":"How does the professor respond to the 'ideological' criticism?","options":["By agreeing it is purely political","By saying all knowledge systems have historical and political contexts","By saying it undermines free speech","By avoiding the question"],"correctIndex":1},{"type":"detail","question":"What would a decolonised curriculum look like according to the professor?","options":["Focus only on non-Western thought","Remove all references to colonialism","Teach students to question their assumptions about knowledge","Integrate non-Western traditions as central alongside Western ones"],"correctIndex":3}]},{"id":"LS-MO3RGJTN-MD9","level":"C1","format":"panel","title":"The Future of Work","taskContext":"Experts discuss automation and labour.","speed":1,"characters":[{"name":"Moderator","role":"","side":"left","emoji":"👩"},{"name":"Expert","role":"Labour Economist","side":"right","emoji":"👨"}],"turns":[{"speakerIndex":0,"text":"The World Economic Forum predicts automation will displace millions of jobs within the next decade. Should we be worried?"},{"speakerIndex":1,"text":"Displacement is certain, but the nature of displacement matters. Previous technological revolutions created new categories of work. The question is whether this time is genuinely different."},{"speakerIndex":0,"text":"Is it different?"},{"speakerIndex":1,"text":"The pace is unprecedented. AI doesn't just automate routine tasks — it now threatens cognitive work thought immune to automation."},{"speakerIndex":0,"text":"What's the appropriate policy response?"},{"speakerIndex":1,"text":"Education systems must become far more adaptive. Universal basic income deserves serious consideration. And we must rethink the relationship between work and human identity."}],"questions":[{"type":"detail","question":"What does the expert say previous industrial revolutions did?","options":["Reduced working hours immediately","Created more jobs than they displaced in the long run","Were poorly managed by governments","Benefited only wealthy nations"],"correctIndex":1},{"type":"detail","question":"What makes this wave of automation different?","options":["Its global scale","Its impact on manufacturing","It affects cognitive and service work, not just manual tasks","Its speed of change"],"correctIndex":2},{"type":"detail","question":"What policy responses does the expert suggest?","options":["Restricting AI development","Taxing technology companies heavily","Universal basic income and more adaptive education systems","Reducing immigration"],"correctIndex":1}]},{"id":"LS-NEW-B1-001","level":"B1","title":"Changing Plans","context":"Two colleagues discuss a rescheduled work event.","script":[{"speaker":"Sarah","role":"COLLEAGUE","text":"Have you heard? The company conference has been moved to next Friday."},{"speaker":"Marcus","role":"COLLEAGUE","text":"That is a problem. I already booked a flight home that afternoon."},{"speaker":"Sarah","role":"COLLEAGUE","text":"Can you change it? The airline should allow it for work reasons."},{"speaker":"Marcus","role":"COLLEAGUE","text":"I can try. But I have my sister's birthday Saturday, so I cannot miss the flight."},{"speaker":"Sarah","role":"COLLEAGUE","text":"What about attending the morning session and leaving at lunchtime?"},{"speaker":"Marcus","role":"COLLEAGUE","text":"That might work. The opening session is the important one for my team anyway."},{"speaker":"Sarah","role":"COLLEAGUE","text":"Also, everyone needs to prepare a five-minute update on their project progress."},{"speaker":"Marcus","role":"COLLEAGUE","text":"I did not know that. I had better start preparing something."}],"questions":[{"id":"Q1","type":"detail","question":"Why is Marcus concerned about the rescheduled conference?","options":["He has an important client meeting that day","He has already booked travel that conflicts with the new date","He needs more preparation time","He will be on leave that week"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What does Sarah suggest as a solution?","options":["Attending remotely by video call","Attending the morning only and leaving at lunchtime","Asking a colleague to attend in his place","Cancelling his flight entirely"],"correctIndex":1},{"id":"Q3","type":"detail","question":"What must participants prepare for the conference?","options":["A written report submitted in advance","A five-minute progress update on their project","A slide deck on company strategy","A list of questions for the speaker"],"correctIndex":1}]},{"id":"LS-NEW-B1-002","level":"B1","title":"Moving Neighbourhood","context":"Two friends discuss a recent move.","script":[{"speaker":"Jen","role":"FRIEND","text":"So you finally moved! How is the new place?"},{"speaker":"Tom","role":"FRIEND","text":"It is great, actually. Much quieter and the neighbours have been very friendly."},{"speaker":"Jen","role":"FRIEND","text":"Is it far from the train station?"},{"speaker":"Tom","role":"FRIEND","text":"About fifteen minutes on foot. Fine in good weather but I will need the buses in winter."},{"speaker":"Jen","role":"FRIEND","text":"What about shops? You always complained the supermarket was too far."},{"speaker":"Tom","role":"FRIEND","text":"There is a small shop on the corner for everyday things. The nearest large supermarket is a ten-minute bus ride."},{"speaker":"Jen","role":"FRIEND","text":"And the rent? You said it was more expensive."},{"speaker":"Tom","role":"FRIEND","text":"Only slightly. But I no longer share with anyone, which makes a huge difference."}],"questions":[{"id":"Q1","type":"detail","question":"What concerns Tom about the walk to the train station?","options":["The route passes through an unsafe area","The walk may be difficult in bad weather","The station is too crowded at peak times","The route is not well lit at night"],"correctIndex":1},{"id":"Q2","type":"detail","question":"How far is the nearest large supermarket?","options":["Five minutes on foot","Around the corner","A ten-minute bus ride","Thirty minutes by train"],"correctIndex":2},{"id":"Q3","type":"inference","question":"Why does Tom say not sharing anymore makes a huge difference?","options":["He is saving much more money","He values having his own private space","His previous housemates were very noisy","He now has a dedicated workspace"],"correctIndex":1}]},{"id":"LS-NEW-B1-003","level":"B1","title":"The Photography Course","context":"A student enquires about an evening class.","script":[{"speaker":"Student","role":"STUDENT","text":"I am interested in the evening photography course. Could you tell me about it?"},{"speaker":"Admin","role":"ADMIN","text":"Of course. It runs for ten weeks on Tuesday evenings from seven to nine. It covers camera settings, lighting, composition, and developing your own creative style."},{"speaker":"Student","role":"STUDENT","text":"Do I need my own camera?"},{"speaker":"Admin","role":"ADMIN","text":"Yes. Any digital camera is fine, including a smartphone, though we recommend one with manual settings for technical sessions."},{"speaker":"Student","role":"STUDENT","text":"What about editing software?"},{"speaker":"Admin","role":"ADMIN","text":"We use free software, so you will not need to buy anything. We will send download instructions before the first class."},{"speaker":"Student","role":"STUDENT","text":"And the cost?"},{"speaker":"Admin","role":"ADMIN","text":"It is two hundred and forty pounds for the full ten weeks. Book before the end of this month for a twenty percent early-bird discount."}],"questions":[{"id":"Q1","type":"detail","question":"What does the course cover besides technical skills?","options":["The history of professional photography","How to sell photographs online","Developing a personal creative style","Advanced darkroom printing"],"correctIndex":2},{"id":"Q2","type":"detail","question":"What camera equipment is recommended for technical sessions?","options":["A professional DSLR with telephoto lens","A camera with manual settings","A camera with built-in flash","Any approved manufacturer model"],"correctIndex":1},{"id":"Q3","type":"detail","question":"How much does the course cost with the early-bird discount?","options":["192 pounds","200 pounds","216 pounds","240 pounds"],"correctIndex":0}]},{"id":"LS-NEW-B1-004","level":"B1","title":"Health Clinic Appointment","context":"A patient calls a health centre to book an appointment.","script":[{"speaker":"Receptionist","role":"RECEPTIONIST","text":"Good morning, Riverside Health Centre. How can I help?"},{"speaker":"Patient","role":"PATIENT","text":"I would like to make an appointment. It is not urgent, but I have had a persistent cough for about three weeks."},{"speaker":"Receptionist","role":"RECEPTIONIST","text":"Our next available appointment for a routine concern is Thursday at half past two, or Monday morning at ten."},{"speaker":"Patient","role":"PATIENT","text":"Thursday would be better for me, thank you."},{"speaker":"Receptionist","role":"RECEPTIONIST","text":"Could I take your name and date of birth?"},{"speaker":"Patient","role":"PATIENT","text":"Daniel Okonkwo. Twelfth of March, nineteen eighty-nine."},{"speaker":"Receptionist","role":"RECEPTIONIST","text":"Any other symptoms alongside the cough?"},{"speaker":"Patient","role":"PATIENT","text":"Sometimes a slight headache in the evenings, but nothing serious."},{"speaker":"Receptionist","role":"RECEPTIONIST","text":"If your symptoms worsen before Thursday, especially a high fever or difficulty breathing, please call back or go to the urgent care centre."}],"questions":[{"id":"Q1","type":"detail","question":"Why is Daniel calling the health centre?","options":["He needs a repeat prescription","He has had a cough for three weeks","He wants to register as a new patient","He is following up on test results"],"correctIndex":1},{"id":"Q2","type":"detail","question":"Which appointment does Daniel choose?","options":["Wednesday at two","Thursday at half past two","Friday at ten","Monday morning at ten"],"correctIndex":1},{"id":"Q3","type":"detail","question":"What does the receptionist advise if symptoms worsen?","options":["Take over-the-counter medication","Call back or go to the urgent care centre","Visit a pharmacist","Wait and inform the doctor Thursday"],"correctIndex":1}]},{"id":"LS-NEW-B1-005","level":"B1","title":"The Community Garden","context":"A local radio presenter interviews the founder of a community garden.","script":[{"speaker":"Presenter","role":"PRESENTER","text":"This morning we speak to Yuki Tanaka, who set up the Riverside Community Garden. Yuki, how did it begin?"},{"speaker":"Yuki","role":"GUEST","text":"It started about two years ago. There was a disused plot behind the library and a group of us asked the council if we could use it. They agreed."},{"speaker":"Presenter","role":"PRESENTER","text":"How many people are involved now?"},{"speaker":"Yuki","role":"GUEST","text":"About sixty regular members, from age seven to eighty-three. Some are experienced gardeners, some complete beginners. Everyone learns from everyone."},{"speaker":"Presenter","role":"PRESENTER","text":"What happens to the produce you grow?"},{"speaker":"Yuki","role":"GUEST","text":"Most is shared among members, but we donate surplus vegetables to a local food bank, which feels like an important connection to the wider community."},{"speaker":"Presenter","role":"PRESENTER","text":"Are you looking for new members?"},{"speaker":"Yuki","role":"GUEST","text":"Always. No experience needed, just enthusiasm. Our next open day is the first Saturday of next month."}],"questions":[{"id":"Q1","type":"detail","question":"How did the community garden begin?","options":["A charity donated funds to create it","Residents applied to use unused council land","The council created it as part of urban renewal","A retired gardener donated the land"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What happens to surplus vegetables?","options":["They are sold at a local market","They are composted to improve soil","They are donated to a local food bank","They go to local schools"],"correctIndex":2},{"id":"Q3","type":"inference","question":"What does Yuki mean when she says everyone learns from everyone?","options":["The garden runs formal classes for beginners","Members of all skill levels share knowledge with each other","Experienced members are paid to teach newcomers","The garden partners with local schools"],"correctIndex":1}]},{"id":"LS-NEW-B2-001","level":"B2","title":"A Conversation About Career Choices","context":"A careers researcher is interviewed on a podcast.","script":[{"speaker":"Host","role":"HOST","text":"Dr Priya Mehta, you argue that the way young people choose careers is fundamentally flawed. Why?"},{"speaker":"Priya","role":"GUEST","text":"Most career advice assumes a stable fit between personality and a particular job. But personality changes through adulthood, and most jobs change within a decade. Choosing a career at eighteen based on a personality test is like choosing a house based on one day's weather forecast."},{"speaker":"Host","role":"HOST","text":"So what would you recommend instead?"},{"speaker":"Priya","role":"GUEST","text":"Career experimentation — short exposure to different kinds of work before committing. And teaching transferable skills rather than specific vocational tracks. Communication, critical thinking, data literacy — these travel across industries."},{"speaker":"Host","role":"HOST","text":"Is that not just telling people to study everything and decide nothing?"},{"speaker":"Priya","role":"GUEST","text":"That is the caricature. But the evidence suggests people with broad foundations adapt more readily to economic disruption. The risk of specialising too early may exceed the risk of generalising too broadly."}],"questions":[{"id":"Q1","type":"detail","question":"What is the main flaw Priya identifies in conventional career advice?","options":["It relies too heavily on qualifications","It assumes a stable personality-job fit that does not account for change","It ignores the role of networking","It is designed for privileged students"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What does Priya call her alternative approach?","options":["Occupational flexibility","Career experimentation","Vocational transfer","Adaptive specialisation"],"correctIndex":1},{"id":"Q3","type":"inference","question":"How does Priya respond to the accusation of telling people to decide nothing?","options":["She agrees some specialisation is essential","She argues broad foundations help people adapt better to disruption","She concedes it works only for certain students","She accepts the criticism applies to manual occupations"],"correctIndex":1}]},{"id":"LS-NEW-B2-002","level":"B2","title":"Technology in the Classroom","context":"Two teachers discuss digital devices in schools.","script":[{"speaker":"Maria","role":"TEACHER","text":"I have been reading about schools banning smartphones. Some countries have also restricted laptops. What do you think?"},{"speaker":"David","role":"TEACHER","text":"Restricting smartphones during lessons makes sense — the research on distraction is clear. But banning laptops entirely seems like an overcorrection."},{"speaker":"Maria","role":"TEACHER","text":"The argument is that typing encourages transcription rather than active processing, unlike handwriting."},{"speaker":"David","role":"TEACHER","text":"That is one study from ten years ago. More recent evidence is mixed, especially when students are taught how to use devices effectively."},{"speaker":"Maria","role":"TEACHER","text":"So the problem is the pedagogy, not the technology?"},{"speaker":"David","role":"TEACHER","text":"Exactly. We have given students powerful research tools without teaching them to evaluate sources, manage their attention, or use technology creatively rather than passively. That is the real gap."},{"speaker":"Maria","role":"TEACHER","text":"Though I would argue we are still figuring out the pedagogy ourselves."},{"speaker":"David","role":"TEACHER","text":"Absolutely. That is why blanket bans feel like a shortcut rather than a solution."}],"questions":[{"id":"Q1","type":"detail","question":"What is David's view on restricting smartphones in lessons?","options":["He strongly opposes it","He supports it based on research on distraction","He thinks it depends on student age","He believes it will have no effect"],"correctIndex":1},{"id":"Q2","type":"inference","question":"What does David identify as the real gap in technology education?","options":["The gap in access between rich and poor students","The gap between student and employer digital skills","Students have technology but have not been taught to use it critically","The gap between teacher and student understanding of tools"],"correctIndex":2},{"id":"Q3","type":"inference","question":"Why does David describe blanket technology bans as a shortcut?","options":["They violate students' rights","They address symptoms without developing underlying skills","They are impossible to enforce","They damage student trust"],"correctIndex":1}]},{"id":"LS-NEW-B2-003","level":"B2","title":"Sustainable Fashion","context":"A radio presenter interviews the founder of a sustainable clothing brand.","script":[{"speaker":"Host","role":"HOST","text":"The fashion industry accounts for roughly ten percent of global carbon emissions — more than aviation and shipping combined. Amara Osei, founder of a sustainable clothing brand, joins us."},{"speaker":"Amara","role":"GUEST","text":"Thank you. The most important thing I would say to consumers is: buy less. That sounds obvious, but fast fashion is built entirely on the idea that clothing should be cheap, disposable, and constantly replaced."},{"speaker":"Host","role":"HOST","text":"But sustainable fashion is often much more expensive. Is that not a barrier?"},{"speaker":"Amara","role":"GUEST","text":"I would push back on that framing. If you buy one garment for a hundred pounds that you wear for ten years, versus ten garments for twenty pounds each that you replace annually, the total cost is identical. The difference is how we have been taught to think about clothing."},{"speaker":"Host","role":"HOST","text":"How should consumers identify genuinely sustainable products?"},{"speaker":"Amara","role":"GUEST","text":"Look for certifications like GOTS — the Global Organic Textile Standard — or Fairtrade. Be sceptical of vague terms like eco-friendly without substantiation. Greenwashing is rampant in this industry."}],"questions":[{"id":"Q1","type":"detail","question":"What does Amara identify as the most important consumer action?","options":["Switch to certified sustainable brands","Recycle old clothing","Buy less overall","Avoid international brands"],"correctIndex":2},{"id":"Q2","type":"inference","question":"What is Amara's argument about the cost of sustainable fashion?","options":["It is only affordable for wealthy consumers","Total cost may be similar if items last much longer","Sustainable brands offer regular discounts","Government should subsidise it"],"correctIndex":1},{"id":"Q3","type":"detail","question":"What does Amara mean by greenwashing?","options":["An eco-friendly fabric dyeing technique","Making products appear more sustainable than they are","Government regulations on manufacturing","A second-hand clothing movement"],"correctIndex":1}]},{"id":"LS-NEW-B2-004","level":"B2","title":"The Listening Survey","context":"A researcher presents findings at a conference.","script":[{"speaker":"Researcher","role":"SPEAKER","text":"Our study asked whether professionals believe they are effective listeners, and whether colleagues agree. Eighty-three percent of four hundred managers rated themselves above average. This is statistically impossible. When we asked their direct reports to rate the same managers, only thirty-one percent agreed. The managers who overestimated most showed the lowest trust and retention scores. Effective listeners were distinguished not by silence or note-taking but by asking questions that showed they had understood not just what was said but what was meant. We call this interpretive listening — a trainable skill, not an innate one."}],"questions":[{"id":"Q1","type":"detail","question":"What statistical problem does the researcher identify?","options":["The sample of four hundred is too small","It is impossible for eighty-three percent to be above average","Managers underestimate colleagues","The survey was misunderstood"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What distinguished effective listeners?","options":["They took detailed notes","They asked questions showing they understood both words and meaning","They spoke less frequently","They repeated back what they heard"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What is interpretive listening as described here?","options":["Listening through a professional interpreter","Understanding intended meaning, not just literal words","A formal management training method","The ability to take accurate notes"],"correctIndex":1}]},{"id":"LS-NEW-B2-005","level":"B2","title":"Urban Wildlife","context":"A narrator describes wildlife adapting to cities.","script":[{"speaker":"Narrator","role":"NARRATOR","text":"As cities expand, they encroach on habitats wildlife has occupied for millennia. Yet ecologists have observed something more nuanced than simple displacement. Urban environments are increasingly colonised by species that have proved capable of adapting to human-dominated landscapes. In London, peregrine falcons nest on skyscrapers. In Tokyo, raccoon dogs have established territories in suburban parks. In Berlin, wild boars root through residential gardens. What these examples share is not merely animals tolerating humans but actively exploiting the novel resources cities provide — artificial heat, food waste, and fewer large predators. This adaptation is not without cost. Urban animals show elevated stress hormones, disrupted sleep cycles from artificial light, and altered social behaviour. The city, it seems, is both refuge and trap."}],"questions":[{"id":"Q1","type":"main_idea","question":"What is the main point of this passage?","options":["Urban expansion causes extinction of many species","Some animals adapt to exploit urban environments rather than simply tolerate them","Cities should protect green spaces for wildlife","Urban animals pose danger to residents"],"correctIndex":1},{"id":"Q2","type":"detail","question":"Which animal is mentioned as nesting on buildings in London?","options":["Barn owl","Red kite","Peregrine falcon","Common swift"],"correctIndex":2},{"id":"Q3","type":"detail","question":"What costs does urban adaptation impose on animals?","options":["Competition with domestic pets","Elevated stress, disrupted sleep, and altered social behaviour","Reduced lifespan from pollution","Difficulty finding mates"],"correctIndex":1}]},{"id":"LS-NEW-C1-001","level":"C1","title":"The Neuroscience of Memory","context":"A university lecture on memory and cognition.","script":[{"speaker":"Professor","role":"LECTURER","text":"Memory has long been compared to a filing cabinet — a stable repository from which accurate records can be retrieved. This analogy is profoundly misleading. Memory is not stored but reconstructed. Every time we recall an event, we rebuild it from fragmented traces, and in doing so we inevitably modify it. This phenomenon — reconsolidation — means the act of remembering is simultaneously an act of rewriting. Elizabeth Loftus demonstrated that participants shown subtly altered photographs of events they witnessed would, within days, confidently assert the altered version was what they saw. The legal implications were substantial: eyewitness testimony, long the gold standard of courtroom evidence, is systematically unreliable in ways neither witnesses nor juries appreciate. The practical implication is more philosophical: the life narratives we construct are creative acts as much as historical ones, shaped by who we are now as much as by what actually occurred."}],"questions":[{"id":"Q1","type":"main_idea","question":"What is the central claim of this lecture?","options":["Neuroscience proves human memory is less reliable than believed","Memory functions as a stable archive","Memory is reconstructive, meaning recall modifies the memory itself","Loftus proved witnesses are motivated to distort memories"],"correctIndex":0},{"id":"Q2","type":"vocab","question":"What does reconsolidation mean in this context?","options":["Transferring short-term to long-term memory","The phenomenon by which memories are rewritten each time they are recalled","Consolidating multiple memories into one narrative","The gradual weakening of memories over time"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What philosophical implication does the professor draw?","options":["We should not trust our memories for decisions","Our life narratives are partly shaped by who we are now, not purely by past events","Therapy is the best way to recover accurate memories","Humans are unreliable narrators"],"correctIndex":1}]},{"id":"LS-NEW-C1-002","level":"C1","title":"Decolonising the Curriculum","context":"A professor explains decolonising education at an academic conference.","script":[{"speaker":"Moderator","role":"MODERATOR","text":"Professor Adeyemi, the term decolonising the curriculum has provoked sharply divergent responses. What does it mean in practice?"},{"speaker":"Professor","role":"SPEAKER","text":"At its most basic, it means examining who has historically been included in and excluded from educational canons — and why. It is not about removing texts, as critics assert, but about asking questions previously considered settled: whose knowledge counts, through whose lens has it been presented, and what has been systematically omitted. When a medical curriculum was designed around data from white male populations, that has real clinical consequences for diagnosing other groups. When a literature course presents European modernism as the apex of literary achievement, it positions non-Western traditions as peripheral. Decolonising means making those assumptions visible, questioning their legitimacy, and constructing syllabi that better reflect the global production of knowledge."},{"speaker":"Moderator","role":"MODERATOR","text":"Some argue this is politically motivated rather than academically driven."},{"speaker":"Professor","role":"SPEAKER","text":"The original curriculum was also politically motivated — it just was not perceived as such because it aligned with the assumptions of those who designed it. All knowledge systems are situated. The question is whether we are willing to acknowledge that."}],"questions":[{"id":"Q1","type":"detail","question":"How does Professor Adeyemi define decolonising the curriculum?","options":["Removing European texts from university reading lists","Examining whose knowledge has been included and excluded, questioning established assumptions","Replacing Western traditions with non-Western alternatives","Increasing diversity in student admissions"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What medical example illustrates the consequences of a limited curriculum?","options":["Underdiagnosis of mental health conditions in minorities","Medical training based primarily on white male data, affecting diagnosis of other groups","Overrepresentation of experimental treatments in research","Exclusion of traditional medicine"],"correctIndex":1},{"id":"Q3","type":"inference","question":"How does the professor respond to the accusation of political motivation?","options":["Academic knowledge is objective and therefore not political","There is a political dimension but benefits outweigh risks","The original curriculum was also politically motivated but not recognised as such","Students themselves are demanding these changes"],"correctIndex":2}]},{"id":"LS-NEW-C1-003","level":"C1","title":"The Philosophy of Expertise","context":"A philosopher discusses scepticism towards expert knowledge.","script":[{"speaker":"Host","role":"HOST","text":"We live in a period of deep scepticism towards expertise. Professor Crane, as a philosopher of knowledge, how do you make sense of this?"},{"speaker":"Professor","role":"SPEAKER","text":"We must distinguish two phenomena being conflated under the label anti-expertise. One is a legitimate concern: how do we know who to trust when experts disagree, findings are sometimes reversed, and institutional interests sometimes corrupt expert opinion? That is reasonable. The other is less defensible: blanket rejection of expert consensus on empirically settled questions — vaccine safety, climate science — based on intuition or social media exposure. The first is critical thinking; the second is something closer to epistemic nihilism."},{"speaker":"Host","role":"HOST","text":"Is there a way to cultivate the first without falling into the second?"},{"speaker":"Professor","role":"SPEAKER","text":"Yes. It involves teaching the difference between uncertainty at the research frontier, where disagreement is the norm, and uncertainty at the level of established consensus, where disagreement is the exception. Most public misunderstanding conflates these two. When a new study challenges a previous finding, it is headline news. When the underlying consensus is stable, it is not a story. So the public receives a distorted picture: endless revision, endless doubt."}],"questions":[{"id":"Q1","type":"detail","question":"What distinction does Professor Crane draw?","options":["Between scientific and political expertise","Between legitimate scepticism about who to trust versus rejecting established empirical consensus","Between academic and practising experts","Between theoretical and practical knowledge"],"correctIndex":1},{"id":"Q2","type":"vocab","question":"What does epistemic nihilism mean here?","options":["A school valuing practical over theoretical knowledge","The view that no knowledge or truth claims can be relied upon","A form of academic scepticism applied to research","Deliberate rejection of democratic institutions"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does the professor say the public receives a distorted picture of science?","options":["Scientists overstate their findings","Media focuses on challenging new studies while ignoring stable consensus","Universities publish too much unreviewed research","Social media promotes controversial claims"],"correctIndex":1}]},{"id":"LS-NEW-C1-004","level":"C1","title":"The Architecture of Cities","context":"A cultural critic discusses urban design as political expression.","script":[{"speaker":"Host","role":"HOST","text":"Your book argues that cities are ideological texts — that their physical form encodes political assumptions. Can you explain?"},{"speaker":"Critic","role":"GUEST","text":"It is most visible in planning decisions that are no longer visible — because they have been naturalised as simply how cities are. Take the twentieth-century prioritisation of the car. The expansion of road networks, the destruction of urban rail infrastructure in the United States in the nineteen fifties, the design of suburbs that make walking impossible — these were not neutral technical decisions. They reflected specific assumptions about who the city was for, about private property versus public space, and about which forms of freedom mattered."},{"speaker":"Host","role":"HOST","text":"And what alternative vision do you propose?"},{"speaker":"Critic","role":"GUEST","text":"What urban theorists call the fifteen-minute city — the idea that all essential needs should be accessible within a fifteen-minute walk or cycle from any residence. It sounds modest but the implications are radical: a fundamental redistribution of commercial, educational, and cultural infrastructure away from centralised hubs towards distributed neighbourhood provision. The fierce resistance it encounters tells you a great deal about whose interests are embedded in the existing urban form."}],"questions":[{"id":"Q1","type":"main_idea","question":"What is the critic's central argument about cities?","options":["Urban planning has become too focused on aesthetics","The physical design of cities reflects and embeds specific political values","Modern cities are poorly designed compared to historical ones","Car-centred design results primarily from corporate lobbying"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What does the fifteen-minute city concept propose?","options":["Reducing car journey times to fifteen minutes","Ensuring all essential services are within a fifteen-minute walk or cycle","Building new residential areas fifteen minutes from city centres","Limiting construction to districts near public transport"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What does the resistance to the fifteen-minute city reveal?","options":["Urban planners are too conservative","The existing urban form serves groups who benefit from the current arrangement","The concept is technically impractical in large cities","The public prefers car-based mobility"],"correctIndex":1}]},{"id":"LS-NEW-C1-005","level":"C1","title":"Global Health Inequity","context":"A public health expert addresses a conference.","script":[{"speaker":"Expert","role":"SPEAKER","text":"The COVID-19 pandemic exposed with uncomfortable clarity the degree to which global health outcomes are determined not primarily by biology but by geography, income, and political will. A child born in a high-income country has access to interventions — vaccination schedules, diagnostic infrastructure, specialist referral — that remain aspirational in much of the global south, not because the science is unknown but because the political economy of healthcare has never prioritised equitable delivery. The vaccine rollout of twenty twenty-one made this grotesquely visible: wealthy nations secured doses for multiples of their populations while healthcare workers in lower-income countries waited months. The intellectual property regime governing pharmaceutical innovation was designed to reward private investment. Whether it can be reformed to also serve public health goals — particularly given climate-related disease emergence — is one of the defining governance questions of the coming decades. What is not in question is whether the existing system is equitable. It is not, and we have the data to prove it."}],"questions":[{"id":"Q1","type":"main_idea","question":"What is the expert's central argument?","options":["Biological differences explain most variation in global health outcomes","Global health outcomes are primarily determined by socioeconomic and political factors","Pharmaceutical companies should be nationalised","Vaccination rates are the single most important determinant of population health"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What specific example illustrates global health inequity?","options":["Unequal distribution of hospital beds","Wealthy nations securing multiple doses per person while poore
