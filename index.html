do hope you'll come. There is something I've been meaning to say.\"\n\nMira set the card down and stared at it for a long moment. She had not attended a departmental event in twelve years, not since the acrimonious end of the collaboration that had defined — and effectively concluded — the most promising phase of her research career. She had told herself that she had simply moved on. But the handwriting at the bottom nagged at her.\n\nShe picked up the card again and held it at arm's length. The script was slightly cramped and tilted rightward. It was, she was now quite certain, the handwriting of Professor Tallis — the man who had published her research without attribution and then denied it in front of the entire faculty.\n\nShe wrote RSVP: YES on a slip of paper, placed it in an envelope, and went to find a stamp.","questions":[{"type":"detail","question":"Where was the reunion taking place?","options":["London","Oxford","Edinburgh","Cambridge"],"correctIndex":2},{"type":"inference","question":"Why had Mira not attended departmental events for twelve years?","options":["She had moved abroad for work","She had retired from research","A professional dispute had ended her research career badly","She had lost contact with the department"],"correctIndex":2},{"type":"inference","question":"What can we infer about Mira's state of mind when she accepts the invitation?","options":["She is eager to reconnect with old friends","She is driven by a need to resolve unfinished conflict","She hopes to resume her former research collaboration","She has forgiven Professor Tallis"],"correctIndex":1},{"type":"vocabulary-in-context","question":"The word \"acrimonious\" in paragraph 3 most closely means:","options":["Unexpected","Bitter and angry","Gradual","Well-publicised"],"correctIndex":1}]},{"id":"RD-010","level":"B2","textType":"informational","title":"Urban Heat Islands: A Growing Challenge","text":"As cities expand, they increasingly replace vegetation and natural terrain with concrete, asphalt, and glass — materials that absorb and radiate solar heat far more intensely than the surfaces they displace. The result is a well-documented meteorological phenomenon known as the urban heat island effect: cities consistently record higher temperatures than the rural areas surrounding them, sometimes by as much as 7°C at night.\n\nThe consequences are significant. Elevated urban temperatures increase energy consumption as residents rely on air conditioning, which in turn drives further heat generation. Heat-related illnesses and deaths are disproportionately concentrated in urban centres, with elderly populations and those in lower-income housing — which tends to lack adequate insulation — most acutely affected.\n\nPlanners and urban designers are exploring a range of interventions. Green roofs, which layer soil and vegetation over conventional roofing, have been shown to reduce surface temperatures by up to 30°C compared to standard rooftops. Tree canopy cover is equally important: research in Melbourne found that a 10% increase in urban tree cover was associated with a 3°C reduction in mean maximum temperature. Cool pavement technology, which uses reflective or permeable materials, is being trialled in cities from Los Angeles to Singapore.\n\nWhether these measures can keep pace with both expanding urbanisation and the warming trend attributable to climate change remains, at best, uncertain.","questions":[{"type":"global","question":"What is the main topic of the passage?","options":["Methods of measuring urban temperatures","The causes and potential solutions to the urban heat island effect","The role of air conditioning in increasing city temperatures","How climate change affects rural and urban environments differently"],"correctIndex":1},{"type":"detail","question":"According to the passage, how much cooler can green roofs make surfaces compared to standard rooftops?","options":["7°C","10°C","30°C","3°C"],"correctIndex":2},{"type":"vocabulary-in-context","question":"The word \"disproportionately\" in paragraph 2 most closely means:","options":["Temporarily","To an unusually large or unequal degree","Randomly","In a manner that affects all groups equally"],"correctIndex":1},{"type":"inference","question":"What does the final paragraph suggest about urban cooling efforts?","options":["They are fully effective if implemented correctly","Their success in the long term is far from guaranteed","Urbanisation will slow sufficiently for these solutions to work","Cool pavement technology is the most promising solution"],"correctIndex":1}]},{"id":"RD-011","level":"C1","textType":"argumentative","title":"The Paradox of Choice in Consumer Culture","text":"In 1956, the psychologist George Miller published what became one of the most cited papers in cognitive science, arguing that human working memory could hold only seven items, give or take two. Sixty years later, the implications of this observation have spread far beyond the laboratory and into every domain of modern consumer life.\n\nBarry Schwartz, in his influential 2004 book, popularised the term \"the paradox of choice\" to describe a counterintuitive phenomenon: that beyond a certain threshold, the proliferation of options does not increase consumer satisfaction but actively diminishes it. Drawing on research in psychology, economics, and behavioural science, Schwartz argued that an excess of alternatives generates what he called \"choice overload\" — a combination of decision fatigue, opportunity cost anxiety, and post-purchase regret.\n\nThe evidence from controlled studies is instructive. A now-famous experiment by Iyengar and Lepper placed either 6 or 24 varieties of jam on display in a supermarket. Customers were far more likely to stop at the larger display; but they were ten times more likely to purchase jam from the smaller one. The abundance of options, it appeared, was stimulating but paralysing.\n\nCritics of the paradox of choice thesis have noted that the phenomenon may be culturally bounded. Research conducted in cultures with collectivist values has yielded different results, with some studies finding that more choice correlates with higher satisfaction. Nevertheless, the broader point — that the equation of freedom with maximal consumer choice rests on shakier psychological grounds than mainstream economics has traditionally assumed — retains its force in Western contexts.","questions":[{"type":"global","question":"What is the author's primary purpose in writing this text?","options":["To advocate for reducing consumer choices in all markets","To critically examine the relationship between choice and satisfaction","To summarise the academic career of Barry Schwartz","To argue that Western consumer culture is inherently superior"],"correctIndex":1},{"type":"vocabulary-in-context","question":"The word \"counterintuitive\" in paragraph 2 most closely means:","options":["Well-established by research","Contrary to what one would naturally expect","Extremely complex","Culturally specific"],"correctIndex":1},{"type":"detail","question":"In the jam experiment, what was found about the larger display?","options":["Customers purchased more jam from the larger display","Fewer customers stopped at the larger display","More customers stopped but fewer made a purchase","Customers found both displays equally attractive"],"correctIndex":2},{"type":"inference","question":"Why does the author mention research from collectivist cultures in the final paragraph?","options":["To prove that choice is universally paralysing","To suggest that the paradox of choice may not apply equally across all cultures","To argue against the relevance of Western psychology","To provide evidence that consumer behaviour is entirely cultural"],"correctIndex":1}]},{"id":"RD-012","level":"C1","textType":"narrative","title":"The Cartographer's Dilemma","text":"Every map is a lie — or so the cartographer's adage goes. To flatten a sphere onto a plane, something must be sacrificed: area, shape, distance, or direction. Gerardus Mercator understood this better than anyone. When he produced his famous projection in 1569, his primary purpose was practical: to allow navigators to plot straight-line courses across the open ocean. To achieve this, he systematically enlarged the landmasses of the Northern Hemisphere, a distortion that rendered Greenland approximately the size of Africa on paper, despite the continent being fourteen times larger in reality.\n\nFor five centuries, this representational choice went largely unremarked in the West. But in 1974, the German historian Arno Peters introduced an alternative projection claiming to represent the relative areas of all landmasses with mathematical accuracy. Predictably, it stirred controversy. Peters was accused by cartographers of overstating his claims and understating the technical problems with his own projection. But his challenge to Mercator also surfaced an uncomfortable question: if a projection that enlarges Europe and North America at the expense of Africa, South America, and Asia had been the default map of the world for five centuries, what subliminal effect might this have had on how populations in the North perceived — and still perceive — the relative significance of the global South?\n\nThe cartographic debate, in this light, is not merely a technical matter. Maps do not merely represent the world; they help to constitute our understanding of it. And in choosing how to distort — because distortion is always inevitable — map-makers necessarily make choices that are never purely neutral.","questions":[{"type":"global","question":"What is the main argument the author is making?","options":["Mercator's projection is technically superior to Peters' projection","Maps are purely scientific instruments that should avoid distortion","Cartographic choices are inherently neutral if made by experts","Representational choices in maps carry cultural and political implications"],"correctIndex":3},{"type":"detail","question":"Why did Mercator design his projection as he did?","options":["To accurately show the relative sizes of all continents","To serve the navigational needs of seafarers","To represent Europe as the most important continent","To respond to criticism from other cartographers"],"correctIndex":1},{"type":"inference","question":"What does the author imply by asking what \"subliminal effect\" the Mercator projection might have had?","options":["That the map was deliberately designed to mislead people","That visual representations can shape perception in ways we may not consciously recognise","That people in the Northern Hemisphere are inherently more biased","That Peters' projection would have prevented colonial exploitation"],"correctIndex":1},{"type":"vocabulary-in-context","question":"The word \"constitute\" in the final paragraph most closely means:","options":["Challenge","Represent accurately","Help to form or create","Simplify"],"correctIndex":2}]},{"id":"RD-013","level":"C1","textType":"informational","title":"The Psychology of Conformity Revisited","text":"Solomon Asch's conformity experiments of the early 1950s remain among the most replicated and debated findings in all of social psychology. In the original study, participants were asked to judge which of three lines matched a standard line in length — a task so simple that errors in isolation were virtually non-existent. Yet when surrounded by confederates who unanimously gave the wrong answer, approximately 75% of participants conformed to the incorrect response on at least one occasion.\n\nThe findings have frequently been interpreted as demonstrating the disturbing ease with which social pressure can override even straightforward perceptual judgement. But more recent scholarship has complicated this reading. Neuro-imaging studies conducted since the 1990s suggest that for some participants, the experience of disagreeing with the group produced genuine distortions in perceptual processing — not merely compliance with group norms, but an actual change in what the participant perceived. The discomfort of dissent, it appears, can operate at a more fundamental cognitive level than was previously assumed.\n\nA second complication is cultural. Cross-cultural replications of Asch's paradigm have yielded significantly higher conformity rates in societies characterised by collectivist values, suggesting that the degree of social influence is modulated by cultural context. What Asch documented may have been a psychological mechanism that is universal in its existence but highly variable in its intensity.\n\nThese refinements do not diminish the importance of Asch's original insight — that humans are social animals whose judgements are patterned in ways that rational-choice models struggle to account for. They do, however, caution against overly deterministic conclusions about the human capacity for independent thought.","questions":[{"type":"global","question":"What is the main purpose of this text?","options":["To argue that Asch's experiments were methodologically flawed","To present Asch's findings and explore more recent refinements to them","To prove that all humans conform under social pressure","To compare different methods of studying social conformity"],"correctIndex":1},{"type":"detail","question":"In Asch's original experiment, what percentage of participants conformed to the wrong answer at least once?","options":["Approximately 25%","Approximately 50%","Approximately 75%","Approximately 95%"],"correctIndex":2},{"type":"inference","question":"What is the significance of the neuro-imaging findings mentioned in paragraph 2?","options":["They confirm that participants were simply pretending to agree with the group","They suggest conformity may involve genuine perceptual changes, not just social compliance","They prove that the brain cannot distinguish between right and wrong answers","They show that perceptual tasks should not be used in psychology experiments"],"correctIndex":1},{"type":"vocabulary-in-context","question":"The word \"modulated\" in paragraph 3 most closely means:","options":["Completely eliminated","Precisely measured","Influenced and varied","Reinforced"],"correctIndex":2}]},{"id":"RD-014","level":"C1","textType":"informational","title":"Rewilding: Promise and Provocation","text":"The concept of rewilding — the large-scale restoration of ecosystems by reintroducing species that once played a functional role within them — has moved from the margins of conservation biology to its mainstream with remarkable speed. Where once the field was preoccupied with preserving existing habitats and species in situ, a growing body of researchers now argues that passive conservation is insufficient in the face of what many describe as a sixth mass extinction event.\n\nThe ecological rationale for rewilding rests on the concept of trophic cascades — the way in which apex predators, by regulating prey populations, prevent overgrazing and thereby protect plant communities, soil stability, and downstream water quality. The reintroduction of wolves to Yellowstone National Park in 1995 became a frequently cited case study: within years, the altered behaviour of elk herds, which no longer grazed as heavily on riverbanks, allowed vegetation to recover, riverbanks to stabilise, and fish and beaver populations to increase. The rivers themselves, some researchers argued, began to change course.\n\nCritics of rewilding have raised legitimate concerns. In densely populated regions of Europe, the reintroduction of large predators provokes inevitable conflicts with livestock farming and rural livelihoods. There is also a scientific counterargument: that the ecosystems being \"restored\" are not static historical states but dynamic, evolving systems, and that selecting one historical baseline as a restoration target involves a degree of arbitrariness that the scientific community has yet to fully resolve.\n\nProponents counter that the alternative — continued fragmentation and species loss — is no alternative at all.","questions":[{"type":"global","question":"What is the main idea of the first paragraph?","options":["Rewilding is a controversial and unproven theory","Conservation biology has shifted towards more active ecosystem restoration strategies","Species extinction can be entirely prevented through rewilding","Passive conservation has always been the dominant approach in biology"],"correctIndex":1},{"type":"detail","question":"What happened to elk behaviour after wolves were reintroduced to Yellowstone?","options":["Elk populations increased significantly","Elk began migrating out of the park","Elk no longer grazed as heavily near riverbanks","Elk herds were reduced to near extinction"],"correctIndex":2},{"type":"vocabulary-in-context","question":"The word \"arbitrariness\" in paragraph 3 most closely means:","options":["Scientific rigour","The quality of being random or without principled justification","Historical accuracy","Environmental complexity"],"correctIndex":1},{"type":"inference","question":"Why does the author describe the Yellowstone wolf reintroduction as \"frequently cited\"?","options":["Because it is the only successful example of rewilding globally","Because it is disputed by most conservation scientists","Because it has become the standard evidence used to support trophic cascade theory","Because it occurred in an unusually simple ecosystem"],"correctIndex":2}]},{"id":"RD-015","level":"A1","textType":"narrative","title":"My Weekend","text":"My name is Anna. I am eight years old. On Saturday, I go to the park with my mum and dad. We play football and eat sandwiches. In the evening, we watch a film at home. On Sunday, I visit my grandma. She makes cookies for me. I love weekends!","questions":[{"type":"detail","question":"Who does Anna go to the park with?","options":["Her friends","Her mum and dad","Her grandma","Her teacher"],"correctIndex":1},{"type":"detail","question":"What do Anna and her family eat at the park?","options":["Cookies","Pizza","Sandwiches","Ice cream"],"correctIndex":2},{"type":"detail","question":"What does Anna do on Sunday?","options":["She visits her grandma","She plays football","She watches a film","She goes to school"],"correctIndex":0},{"type":"inference","question":"How does Anna feel about weekends?","options":["She is bored","She is nervous","She is happy","She is tired"],"correctIndex":2}]},{"id":"RD-016","level":"A1","textType":"informational","title":"Our Classroom","text":"Our classroom is big and bright. There are twenty desks for students and one desk for the teacher. On the wall, there is a big whiteboard. We have a computer in the corner. There are colourful books on the shelves. We love our classroom!","questions":[{"type":"detail","question":"How many student desks are in the classroom?","options":["Ten","Twenty","Thirty","Fifteen"],"correctIndex":1},{"type":"detail","question":"What is on the wall?","options":["A big whiteboard","A map","A clock","A picture"],"correctIndex":0},{"type":"detail","question":"Where is the computer?","options":["Near the door","On the teacher's desk","In the corner","On the shelf"],"correctIndex":2},{"type":"inference","question":"What word best describes the classroom?","options":["Dark and small","Bright and welcoming","Old and dirty","Quiet and empty"],"correctIndex":1}]},{"id":"RD-017","level":"A2","textType":"narrative","title":"The New Student","text":"On Monday morning, a new girl arrived in Class 5B. Her name was Sofia and she came from Spain. She spoke a little English but she was nervous. At break time, no one talked to her. Then Maya walked over and said hello. They sat together at lunch and Sofia started to feel better. By the end of the day, they were already friends. Maya showed Sofia around the school and helped her understand the timetable.","questions":[{"type":"detail","question":"Where did Sofia come from?","options":["France","Italy","Spain","Portugal"],"correctIndex":2},{"type":"detail","question":"How did Sofia feel when she arrived?","options":["Excited and happy","Nervous","Angry","Bored"],"correctIndex":1},{"type":"detail","question":"What did Maya do at break time?","options":["She ignored Sofia","She walked over and said hello","She told the teacher","She went home"],"correctIndex":1},{"type":"inference","question":"What can we understand about Maya from this story?","options":["She was very shy","She did not speak Spanish","She was kind and friendly","She was new to the school too"],"correctIndex":2}]},{"id":"RD-018","level":"A2","textType":"informational","title":"Why We Need Sleep","text":"Sleep is very important for our bodies and minds. When we sleep, our bodies repair themselves and our brains organise the information we learned during the day. Most children between the ages of 6 and 12 need between 9 and 11 hours of sleep each night. Teenagers need around 8 to 10 hours. Adults usually need 7 to 9 hours.\n\nWithout enough sleep, people find it hard to concentrate and remember things. They can also feel tired, unhappy, and even get ill more easily. Doctors say that going to bed at the same time every night helps us sleep better.","questions":[{"type":"detail","question":"How many hours of sleep do most children aged 6-12 need?","options":["7 to 8 hours","9 to 11 hours","6 to 8 hours","10 to 12 hours"],"correctIndex":1},{"type":"detail","question":"What does our brain do when we sleep?","options":["It stops working completely","It creates new memories","It organises information we learned","It prepares us for exercise"],"correctIndex":2},{"type":"detail","question":"What do doctors recommend to sleep better?","options":["Exercising just before bed","Going to bed at the same time every night","Sleeping less on weekdays","Drinking warm milk"],"correctIndex":1},{"type":"inference","question":"What is the main message of this text?","options":["Children sleep more than adults","Sleep is essential for health and learning","Teenagers are always tired","Exercise helps you sleep better"],"correctIndex":1}]},{"id":"RD-MO3MHW3R-PYG","level":"Pre-A1","textType":"narrative","title":"My Dog","text":"My dog is Rex. Rex is big and brown. Rex likes to run. I love Rex.","questions":[{"type":"detail","question":"What is the dog's name?","options":["Max","Rex","Bob","Sam"],"correctIndex":1},{"type":"detail","question":"What colour is Rex?","options":["black","white","brown","red"],"correctIndex":2},{"type":"inference","question":"Does the writer like Rex?","options":["No","Maybe","Yes","Not sure"],"correctIndex":2}]},{"id":"RD-MO3MHW3R-03H","level":"Pre-A1","textType":"informational","title":"Fruit","text":"I like fruit. I eat an apple every day. Oranges are orange. Bananas are yellow. My favourite is mango.","questions":[{"type":"detail","question":"What does the writer eat every day?","options":["a mango","an orange","an apple","a banana"],"correctIndex":2},{"type":"detail","question":"What colour are bananas?","options":["orange","green","red","yellow"],"correctIndex":3},{"type":"vocabulary","question":"What does \"favourite\" mean?","options":["best liked","most common","biggest","nearest"],"correctIndex":0}]},{"id":"RD-MO3MHW3R-94Z","level":"Pre-A1","textType":"informational","title":"My Classroom","text":"My classroom is big. There are 20 desks. There is a whiteboard. My teacher is kind.","questions":[{"type":"detail","question":"How many desks are there?","options":["10","15","20","25"],"correctIndex":2},{"type":"detail","question":"What is on the wall?","options":["a clock","a map","a whiteboard","a poster"],"correctIndex":2},{"type":"inference","question":"Does the writer like school?","options":["No","Probably yes","No information","Not happy"],"correctIndex":1}]},{"id":"RD-MO3MHW3R-XS9","level":"Pre-A1","textType":"narrative","title":"My Morning","text":"I wake up at 7. I eat breakfast. I drink milk. Then I go to school by bus.","questions":[{"type":"detail","question":"What time does the writer wake up?","options":["6 o'clock","7 o'clock","8 o'clock","9 o'clock"],"correctIndex":1},{"type":"detail","question":"How does the writer go to school?","options":["by car","on foot","by bicycle","by bus"],"correctIndex":3},{"type":"detail","question":"What does the writer drink?","options":["juice","tea","milk","water"],"correctIndex":2}]},{"id":"RD-MO3MHW3R-LOJ","level":"Pre-A1","textType":"informational","title":"Colours","text":"Red is the colour of fire. Blue is the colour of the sky. Green is the colour of grass. Yellow is the colour of the sun.","questions":[{"type":"detail","question":"What colour is fire?","options":["blue","green","red","yellow"],"correctIndex":2},{"type":"detail","question":"What colour is the sky?","options":["red","blue","green","yellow"],"correctIndex":1},{"type":"detail","question":"What colour is grass?","options":["yellow","red","blue","green"],"correctIndex":3}]},{"id":"RD-MO3MHW3R-KG9","level":"A1","textType":"narrative","title":"A New Friend","text":"Last week, a new student joined our class. Her name is Anna. She is from Poland. She speaks Polish and English. She is very friendly and funny.","questions":[{"type":"detail","question":"Where is Anna from?","options":["Poland","France","Spain","Germany"],"correctIndex":0},{"type":"detail","question":"How many languages does Anna speak?","options":["one","two","three","four"],"correctIndex":1},{"type":"inference","question":"Do the students like Anna?","options":["Yes, probably","No","Maybe not","Unsure"],"correctIndex":0}]},{"id":"RD-MO3MHW3R-OUH","level":"A2","textType":"informational","title":"Social Media","text":"Many young people use social media every day. They share photos and messages with friends. Some people think it is useful, but others say it wastes time.","questions":[{"type":"detail","question":"What do people share on social media?","options":["books and films","photos and messages","music and videos","food and recipes"],"correctIndex":1},{"type":"inference","question":"What is one negative view of social media?","options":["it is expensive","it is boring","it wastes time","it is dangerous"],"correctIndex":2},{"type":"vocabulary","question":"What does \"wastes\" mean in this context?","options":["uses well","loses unnecessarily","saves carefully","finds quickly"],"correctIndex":1}]},{"id":"RD-MO3MHW3R-15W","level":"A2","textType":"narrative","title":"A Holiday Memory","text":"Last summer, my family visited Thailand. We saw beautiful temples and tasted delicious food. The beach was amazing. I would love to go back.","questions":[{"type":"detail","question":"Where did the family go on holiday?","options":["Vietnam","Thailand","Indonesia","Malaysia"],"correctIndex":1},{"type":"detail","question":"What did they see there?","options":["castles","museums","temples","mountains"],"correctIndex":2},{"type":"inference","question":"Does the writer want to visit again?","options":["No","Yes","Maybe","Not mentioned"],"correctIndex":1},{"type":"vocabulary","question":"What does \"delicious\" mean?","options":["very tasty","very expensive","very beautiful","very popular"],"correctIndex":0}]},{"id":"RD-MO3MHW3R-0GX","level":"B1","textType":"informational","title":"The Benefits of Exercise","text":"Regular exercise has many health benefits. It strengthens the heart and improves circulation. Studies show that even thirty minutes of walking per day can reduce the risk of serious illness by twenty per cent.","questions":[{"type":"detail","question":"What does exercise do for the heart?","options":["weakens it","strengthens it","stops it working","has no effect"],"correctIndex":1},{"type":"inference","question":"What can we conclude from the studies?","options":["Exercise is dangerous","Walking helps health","Thirty minutes is too little","Only running is useful"],"correctIndex":1},{"type":"vocabulary","question":"What does \"circulation\" mean?","options":["breathing","blood flow","digestion","exercise"],"correctIndex":1},{"type":"detail","question":"How much can walking reduce illness risk?","options":["10%","15%","20%","25%"],"correctIndex":2}]},{"id":"RD-MO3MHW3R-ZZ5","level":"B1","textType":"narrative","title":"A Difficult Decision","text":"After finishing university, Maya had to choose between two job offers. One paid more, but required long hours. The other was closer to home with better work-life balance. She chose the second one.","questions":[{"type":"detail","question":"How many job offers did Maya have?","options":["one","two","three","four"],"correctIndex":1},{"type":"inference","question":"Why might Maya have chosen the second job?","options":["It paid more","It had better balance","It was more interesting","It had travel opportunities"],"correctIndex":1},{"type":"vocabulary","question":"What does \"work-life balance\" mean?","options":["Working overtime","A good mix of work and personal time","Only working part-time","Taking many holidays"],"correctIndex":1},{"type":"inference","question":"What can we infer about Maya's priorities?","options":["Money is most important","Personal life matters to her","Career is her only focus","She dislikes working"],"correctIndex":1}]},{"id":"RD-MO3MHW3R-8QN","level":"B1","textType":"informational","title":"Urban Farming","text":"Urban farming is the practice of growing food in cities. Rooftop gardens and vertical farms are becoming increasingly popular. Supporters claim it reduces food miles and helps communities.","questions":[{"type":"detail","question":"What is urban farming?","options":["Farming in rural areas","Growing food in cities","Buying local produce","Organic farming methods"],"correctIndex":1},{"type":"vocabulary","question":"What are \"food miles\"?","options":["The cost of food","Distance food travels from farm to consumer","The weight of food","The calories in food"],"correctIndex":1},{"type":"inference","question":"What benefit does urban farming have for cities?","options":["It creates jobs","It reduces pollution","It brings communities together and reduces transport","It makes food cheaper"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-B1A","level":"Pre-A1","textType":"narrative","title":"My Pet","text":"I have a pet. My pet is a cat. Her name is Mia. She is white and small. I love Mia.","questions":[{"type":"detail","question":"What is the pet?","options":["A dog","A fish","A cat","A bird"],"correctIndex":2},{"type":"detail","question":"What colour is Mia?","options":["Black","Orange","White","Brown"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-1XW","level":"Pre-A1","textType":"descriptive","title":"The Park","text":"The park is near my house. It is green and big. There are trees and flowers. Children play there. I go to the park every Sunday.","questions":[{"type":"detail","question":"Where is the park?","options":["Near the shops","Near a river","Near the house","Near the school"],"correctIndex":2},{"type":"detail","question":"When does the child go to the park?","options":["Saturday","Sunday","Monday","Friday"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-HOJ","level":"Pre-A1","textType":"informational","title":"My Family","text":"I have a small family. My mum, my dad, my sister and me. My sister is five. I am eight. My dad works at a shop.","questions":[{"type":"detail","question":"How many people are in the family?","options":["Two","Three","Four","Five"],"correctIndex":2},{"type":"detail","question":"How old is the sister?","options":["Four","Five","Six","Eight"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-KV3","level":"Pre-A1","textType":"descriptive","title":"My Room","text":"My room is small. I have a bed and a desk. My books are on the desk. My toys are under the bed. I like my room.","questions":[{"type":"detail","question":"Where are the books?","options":["Under the bed","On the bed","On the desk","On the floor"],"correctIndex":2},{"type":"detail","question":"Where are the toys?","options":["On the desk","Under the bed","On the shelf","In the bag"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-3XJ","level":"Pre-A1","textType":"narrative","title":"A Rainy Day","text":"Today it is raining. I cannot go out. I am at home. I read a book and drink hot milk. I like rainy days.","questions":[{"type":"detail","question":"Why can't the child go out?","options":["It is cold","It is raining","It is hot","It is dark"],"correctIndex":1},{"type":"detail","question":"What does the child do at home?","options":["Watches TV","Reads a book","Plays games","Sings songs"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-X50","level":"Pre-A1","textType":"informational","title":"My Favourite Food","text":"My favourite food is pizza. Pizza has cheese and tomato. I eat pizza on Fridays. My mum makes it. It is delicious.","questions":[{"type":"detail","question":"When does the child eat pizza?","options":["Mondays","Saturdays","Fridays","Sundays"],"correctIndex":2},{"type":"detail","question":"Who makes the pizza?","options":["The child","The dad","The teacher","The mum"],"correctIndex":3}]},{"id":"RD-MO3RGJTM-9A8","level":"Pre-A1","textType":"descriptive","title":"The Classroom","text":"Our classroom is bright. There are twenty desks. The teacher's desk is at the front. There are big windows. The walls are yellow.","questions":[{"type":"detail","question":"How many desks are there?","options":["Ten","Fifteen","Twenty","Twenty-five"],"correctIndex":2},{"type":"detail","question":"Where is the teacher's desk?","options":["At the back","At the side","At the front","Near the window"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-NCH","level":"A1","textType":"informational","title":"My Hobby","text":"My name is Lisa. My hobby is painting. I paint pictures of animals and flowers. I use many colours. I paint every weekend. My parents like my paintings.","questions":[{"type":"detail","question":"What is Lisa's hobby?","options":["Reading","Dancing","Painting","Swimming"],"correctIndex":2},{"type":"detail","question":"When does Lisa paint?","options":["Every day","After school","Every weekend","On holidays"],"correctIndex":2},{"type":"detail","question":"Who likes Lisa's paintings?","options":["Her friends","Her teachers","Her parents","Her class"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-TQP","level":"A1","textType":"narrative","title":"A Visit to the Zoo","text":"Last Saturday, my class visited the city zoo. We saw lions, elephants and monkeys. The monkeys were very funny. We had lunch near the lake. It was a great day.","questions":[{"type":"detail","question":"When did the class visit the zoo?","options":["Last Sunday","Last Friday","Last Saturday","Last Monday"],"correctIndex":2},{"type":"detail","question":"What animals did they see?","options":["Tigers, bears, snakes","Lions, elephants, monkeys","Dogs, cats, birds","Horses, frogs, fish"],"correctIndex":1},{"type":"detail","question":"Where did they have lunch?","options":["At the entrance","Near the café","Near the lake","By the monkey cage"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-DNX","level":"A1","textType":"informational","title":"A Healthy Lifestyle","text":"Eating well and exercising helps you stay healthy. You should eat fruit and vegetables every day. Drink lots of water. Try to sleep eight hours. Avoid too much sugar.","questions":[{"type":"detail","question":"What should you eat every day?","options":["Sweets and chocolate","Fruit and vegetables","Fried food","Bread and butter"],"correctIndex":1},{"type":"detail","question":"How many hours of sleep is recommended?","options":["Six","Seven","Eight","Nine"],"correctIndex":2},{"type":"detail","question":"What should you avoid too much of?","options":["Water","Vegetables","Sugar","Fruit"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-UUE","level":"A1","textType":"descriptive","title":"My Town","text":"I live in a small town near the mountains. There is a market, a school and a hospital. On weekends, people go to the market for fresh food. There is also a small river where children swim in summer.","questions":[{"type":"detail","question":"Where is the town?","options":["By the sea","Near the mountains","In a forest","On an island"],"correctIndex":1},{"type":"detail","question":"What happens at the market?","options":["Children play","People get fresh food","Students study","Doctors work"],"correctIndex":1},{"type":"detail","question":"When do children swim in the river?","options":["In winter","In spring","In summer","In autumn"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-ABC","level":"A1","textType":"narrative","title":"The Lost Dog","text":"One day, my dog Sam ran away from home. I looked everywhere but could not find him. The next day, a woman called me. She had found Sam in the park. I was very happy.","questions":[{"type":"detail","question":"What was the dog's name?","options":["Max","Rex","Sam","Buster"],"correctIndex":2},{"type":"detail","question":"Where did the woman find the dog?","options":["In the street","Near the school","In the park","By the river"],"correctIndex":2},{"type":"detail","question":"How did the writer feel at the end?","options":["Sad","Worried","Angry","Happy"],"correctIndex":3}]},{"id":"RD-MO3RGJTM-L1V","level":"A1","textType":"informational","title":"Using the Internet Safely","text":"The internet is useful but you must be careful. Never share your personal details with strangers online. Ask an adult if you are not sure. Only visit safe websites. Report anything that makes you feel uncomfortable.","questions":[{"type":"main idea","question":"What is the main message?","options":["The internet is boring","The internet is dangerous","Use the internet safely","Children should avoid the internet"],"correctIndex":2},{"type":"detail","question":"What should you do if something online makes you uncomfortable?","options":["Ignore it","Delete it","Report it","Forget it"],"correctIndex":2},{"type":"detail","question":"Who should you ask if you are unsure?","options":["A friend","A stranger","An adult","A classmate"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-4X4","level":"A1","textType":"narrative","title":"First Day at School","text":"On my first day at school, I was nervous. I didn't know anyone. My teacher, Ms Park, was kind. She introduced me to the class. By lunchtime, I had two new friends. It wasn't as bad as I thought.","questions":[{"type":"detail","question":"How did the student feel at the start?","options":["Happy","Excited","Nervous","Bored"],"correctIndex":2},{"type":"detail","question":"Who introduced the student to the class?","options":["A classmate","Ms Park","The head teacher","A parent"],"correctIndex":1},{"type":"detail","question":"When did the student make new friends?","options":["In the morning","At break","At lunchtime","After school"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-A65","level":"A2","textType":"informational","title":"Working from Home","text":"Remote working has become increasingly popular in recent years. Many companies now allow employees to work from home either full-time or part-time. Supporters argue it improves work-life balance and reduces commuting time. However, some employees find it isolating and miss social interaction.","questions":[{"type":"main idea","question":"What is the main topic?","options":["Office design","Remote working","Employee benefits","Technology at work"],"correctIndex":1},{"type":"detail","question":"What do supporters say about working from home?","options":["It is more productive","It improves work-life balance","It is cheaper","It reduces all stress"],"correctIndex":1},{"type":"detail","question":"What is one disadvantage mentioned?","options":["It costs more","It is tiring","It can be isolating","It is harder to focus"],"correctIndex":2},{"type":"inference","question":"What can we infer about remote working?","options":["All workers prefer it","It has both advantages and disadvantages","Companies oppose it","It is only for managers"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-IFC","level":"A2","textType":"narrative","title":"A Chance Meeting","text":"I was waiting for my train when I noticed an elderly woman struggling with her luggage. I offered to help. It turned out she was a retired professor who had written a book I loved. We talked for an hour. As I got on the train, she gave me her business card and said, 'Stay curious.'","questions":[{"type":"detail","question":"Where did the meeting take place?","options":["A bookshop","A train station","A university","A café"],"correctIndex":1},{"type":"detail","question":"Who was the woman?","options":["A journalist","A teacher","A retired professor","An author"],"correctIndex":2},{"type":"inference","question":"What does 'Stay curious' suggest?","options":["She values learning","She dislikes reading","She prefers quiet","She is suspicious"],"correctIndex":0}]},{"id":"RD-MO3RGJTM-LBF","level":"A2","textType":"argumentative","title":"Should Zoos Be Banned?","text":"Some people argue that zoos are cruel because they keep animals in captivity. Others believe zoos are essential for conservation and education. Modern zoos work hard to create natural environments. They also help endangered species survive. The debate continues.","questions":[{"type":"detail","question":"What do critics of zoos argue?","options":["Zoos are too expensive","Animals are treated well","Zoos keep animals in captivity unfairly","Zoos do not help conservation"],"correctIndex":2},{"type":"detail","question":"What do modern zoos try to do?","options":["Keep animals in small cages","Create natural environments","Sell animals to the public","Train animals to perform"],"correctIndex":1},{"type":"main idea","question":"What is the purpose of this text?","options":["To close all zoos","To show both sides","To prove that zoos are cruel","To explain zoo history"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-C90","level":"A2","textType":"informational","title":"The Benefits of Reading","text":"Reading regularly has many benefits. It improves vocabulary, concentration and knowledge. Fiction allows readers to experience different perspectives. Non-fiction expands understanding of the world. Research shows that people who read often perform better academically and professionally.","questions":[{"type":"detail","question":"What does fiction help readers do?","options":["Improve grammar","Experience different perspectives","Learn new skills","Become better writers"],"correctIndex":1},{"type":"detail","question":"How do regular readers perform?","options":["The same way","Worse","Better academically and professionally","Slower but more accurately"],"correctIndex":2},{"type":"inference","question":"What is the writer's attitude towards reading?","options":["Neutral","Negative","Positive","Uncertain"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-7R1","level":"A2","textType":"descriptive","title":"Life in a Megacity","text":"Megacities — cities with over ten million inhabitants — are growing rapidly. They offer employment, cultural life and world-class facilities. However, they also face serious problems: traffic congestion, air pollution, overcrowding and rising living costs. Urban planners are working hard to make megacities more sustainable.","questions":[{"type":"main idea","question":"What is a megacity?","options":["A city with a long history","A city with over ten million people","A city with excellent transport","A capital city"],"correctIndex":1},{"type":"detail","question":"Name two problems megacities face.","options":["Floods and drought","Crime and poverty","Traffic and air pollution","Earthquakes and fires"],"correctIndex":2},{"type":"inference","question":"Why are urban planners important for megacities?","options":["They design tourist attractions","They help solve complex urban problems","They control immigration","They manage finances"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-A8Y","level":"A2","textType":"informational","title":"Social Media and Mental Health","text":"Studies suggest that excessive social media use can negatively affect mental health, particularly among teenagers. Constant comparison with others can lead to anxiety and low self-esteem. However, social media can also provide support networks for people who feel isolated. Balance is key.","questions":[{"type":"detail","question":"Who is particularly affected?","options":["Adults","Young children","Teenagers","Teachers"],"correctIndex":2},{"type":"detail","question":"What negative effect is mentioned?","options":["Physical tiredness","Poor grades","Anxiety and low self-esteem","Sleep problems"],"correctIndex":2},{"type":"inference","question":"What does the author suggest as a solution?","options":["Delete all accounts","Use social media in a balanced way","Only use social media for education","Avoid online communities"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-882","level":"B1","textType":"argumentative","title":"The Case for Universal Basic Income","text":"Universal Basic Income (UBI) is a proposal under which every citizen receives a regular, unconditional payment from the government. Proponents argue it would eliminate poverty, simplify the welfare system and provide security in an era of increasing automation. Critics warn that it would be prohibitively expensive and could reduce the incentive to work. Several pilot programmes have produced mixed results.","questions":[{"type":"main idea","question":"What is Universal Basic Income?","options":["A targeted payment for the unemployed","A regular unconditional payment to all citizens","A system of tax credits","A technology fund"],"correctIndex":1},{"type":"detail","question":"What do critics worry about?","options":["That it is too simple","That it would reduce work incentives","That it would cause inflation","That it would help only the rich"],"correctIndex":1},{"type":"inference","question":"What is suggested by 'mixed results'?","options":["UBI has clearly failed","UBI is widely supported","The evidence is inconclusive","UBI should be abandoned"],"correctIndex":2},{"type":"vocabulary","question":"'Proponents' means ___.","options":["opponents","critics","supporters","researchers"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-FMW","level":"B1","textType":"informational","title":"Artificial Intelligence in Healthcare","text":"Artificial intelligence is transforming healthcare by enabling faster diagnoses, personalised treatment plans and more efficient administrative processes. AI algorithms can analyse thousands of medical images in seconds, often outperforming human specialists in detecting certain conditions. Despite this, experts stress that AI should complement — not replace — the human doctor-patient relationship.","questions":[{"type":"detail","question":"What can AI algorithms do with medical images?","options":["Store them securely","Analyse them rapidly","Create them","Send them to specialists"],"correctIndex":1},{"type":"vocabulary","question":"'Complement' means ___.","options":["replace","compete with","work alongside","contradict"],"correctIndex":2},{"type":"inference","question":"What is the author's likely view of AI in healthcare?","options":["It should be banned","It is unreliable","It offers benefits but must be used carefully","It will replace doctors"],"correctIndex":2},{"type":"detail","question":"What does AI enable beyond diagnosis?","options":["Better hospital buildings","Personalised treatment and efficient administration","Lower salaries","More medical schools"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-EGX","level":"B1","textType":"argumentative","title":"Is Tourism Harmful to Local Cultures?","text":"Mass tourism has brought economic prosperity to many regions, yet it also poses significant risks to local cultures. The commercialisation of traditions, rising property prices that displace residents and environmental degradation are among the most cited concerns. Some argue that with responsible management, tourism can be a force for cultural preservation rather than destruction.","questions":[{"type":"main idea","question":"What is the central debate?","options":["How to attract more tourists","Whether tourism harms or helps local cultures","Why tourists prefer certain destinations","How local governments manage tourism"],"correctIndex":1},{"type":"detail","question":"What are two problems mentioned?","options":["Poor transport and crime","Noise and litter","Commercialisation and environmental damage","Language barriers and poor food"],"correctIndex":2},{"type":"inference","question":"What does the final sentence suggest?","options":["Tourism is always harmful","Responsible tourism can protect culture","Local people should ban tourists","Economic growth is more important"],"correctIndex":1},{"type":"vocabulary","question":"'Degradation' most nearly means ___.","options":["improvement","restoration","deterioration","development"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-GZ9","level":"B1","textType":"informational","title":"Renewable Energy: Opportunities and Challenges","text":"The global shift towards renewable energy sources such as wind, solar and hydroelectric power represents one of the most significant transitions in modern history. While renewables offer a sustainable alternative to fossil fuels, challenges remain. Energy storage technology has not yet kept pace with generation capacity, and the initial infrastructure investment can be enormous. Nonetheless, the long-term economic and environmental case for renewables is compelling.","questions":[{"type":"detail","question":"Name three renewable energy types mentioned.","options":["Oil, gas, coal","Wind, solar, hydroelectric","Nuclear, tidal, geothermal","Biomass, wood, petrol"],"correctIndex":1},{"type":"vocabulary","question":"'Compelling' means ___.","options":["controversial","convincing","confusing","costly"],"correctIndex":1},{"type":"detail","question":"What challenge remains regarding energy storage?","options":["Too expensive for individuals","Has not kept up with generation capacity","Produces too much waste","Relies on old technology"],"correctIndex":1},{"type":"inference","question":"What is the author's overall stance?","options":["Strongly opposed","Cautiously optimistic","Deeply sceptical","Completely neutral"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-L3S","level":"B1","textType":"narrative","title":"The Morning After","text":"When the floods receded, what remained was silence — and the outline of a life. Maria picked through the mud, salvaging photographs and a waterlogged journal. Her house was gone, but she was alive. Neighbours began to appear, carrying shovels and food. No words were necessary. By evening, the foundations were already being cleared.","questions":[{"type":"inference","question":"What has happened before this scene?","options":["A fire","A flood","An earthquake","A storm"],"correctIndex":1},{"type":"vocabulary","question":"'Salvaging' means ___.","options":["destroying","hiding","rescuing","examining"],"correctIndex":2},{"type":"detail","question":"What did the neighbours bring?","options":["Money and clothes","Shovels and food","Blankets and medicine","Water and tools"],"correctIndex":1},{"type":"inference","question":"What does the final sentence suggest?","options":["The community has given up","Recovery has already begun","Maria is leaving the town","Help has not yet arrived"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-6O5","level":"B1","textType":"argumentative","title":"Should Homework Be Abolished?","text":"The debate over homework is longstanding. Those in favour argue it reinforces classroom learning and teaches self-discipline. Opponents counter that excessive homework leads to stress, reduces family time and may actually impede learning if students are not adequately supported at home. Research findings are divided: some studies show moderate homework improves outcomes; others find no significant benefit.","questions":[{"type":"detail","question":"What do supporters say homework teaches?","options":["Social skills and teamwork","Self-discipline and reinforces learning","Critical thinking and creativity","Exam technique and memory"],"correctIndex":1},{"type":"detail","question":"What does research show?","options":["It always improves results","It is clearly harmful","The results are mixed","It has no effect whatsoever"],"correctIndex":2},{"type":"inference","question":"What can we conclude?","options":["Homework should be abolished immediately","The debate continues — evidence is complex","Homework has no clear negative effects","Most researchers agree it is beneficial"],"correctIndex":1},{"type":"vocabulary","question":"'Impede' most nearly means ___.","options":["assist","ignore","hinder","promote"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-RSN","level":"B1","textType":"informational","title":"The Gig Economy","text":"The gig economy refers to a labour market characterised by short-term contracts and freelance work rather than permanent employment. Technology platforms such as ride-sharing and delivery apps have accelerated its growth. Workers gain flexibility but often lack job security, benefits such as sick pay, and legal protections afforded to full-time employees.","questions":[{"type":"main idea","question":"What is the gig economy?","options":["A market for entertainment workers","A system based on short-term contracts and freelancing","A new technology company","A form of permanent employment"],"correctIndex":1},{"type":"detail","question":"What do gig workers often lack?","options":["Computers and phones","Job security and benefits","Language skills and training","Management support"],"correctIndex":1},{"type":"vocabulary","question":"'Afforded' here means ___.","options":["taken away","given or provided","borrowed","earned"],"correctIndex":1},{"type":"inference","question":"What is likely to happen to labour law?","options":["It will be simplified","It will be abolished","It will need to be updated","It will not change"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-OKE","level":"B1","textType":"descriptive","title":"Antarctica: The Final Frontier","text":"Antarctica is the coldest, driest and windiest continent on Earth. It holds around 70% of the world's fresh water in the form of ice. Despite its extreme conditions, it supports a remarkable ecosystem of penguins, seals and microscopic organisms. Scientists from around the world conduct research there year-round. The Antarctic Treaty of 1959 designates the continent as a zone of peace and science.","questions":[{"type":"detail","question":"What percentage of fresh water does Antarctica hold?","options":["50%","60%","70%","80%"],"correctIndex":2},{"type":"detail","question":"What does the Antarctic Treaty say?","options":["Any country can claim it","It is a zone of peace and science","It is open for mining","It belongs to the UN"],"correctIndex":1},{"type":"detail","question":"Name two animals found in Antarctica.","options":["Bears and wolves","Eagles and foxes","Penguins and seals","Sharks and whales"],"correctIndex":2},{"type":"inference","question":"Why do scientists conduct year-round research there?","options":["It is cheap and convenient","It offers a unique valuable environment","The weather is pleasant","It is closer to other continents"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-WR1","level":"B2","textType":"argumentative","title":"The Ethics of Artificial Intelligence","text":"As artificial intelligence systems become more deeply embedded in consequential decision-making processes — from criminal justice to medical diagnosis — the ethical stakes have never been higher. Critics argue that opaque algorithmic systems reproduce and even amplify existing societal biases, raising fundamental questions of accountability. Proponents, however, contend that AI, properly designed and audited, can make more consistent and impartial decisions than humans, who are subject to fatigue, prejudice and inconsistency.","questions":[{"type":"vocabulary","question":"'Opaque' means ___.","options":["transparent and clear","difficult to understand or examine","highly technical","frequently updated"],"correctIndex":1},{"type":"detail","question":"What do critics argue about algorithmic systems?","options":["They are too expensive","They reproduce and amplify biases","They replace human creativity","They are perfectly impartial"],"correctIndex":1},{"type":"inference","question":"What does 'properly designed and audited' imply?","options":["AI is already perfect","AI needs ongoing oversight","AI should replace human judges","AI is too complex to regulate"],"correctIndex":1},{"type":"main idea","question":"What is the central tension?","options":["The cost of AI","Risks and potential of AI in high-stakes decisions","The speed of technological change","The training of AI researchers"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-Z2B","level":"B2","textType":"informational","title":"Behavioural Economics and Public Policy","text":"Traditional economic models assumed that individuals make rational decisions in their own best interests. Behavioural economics challenges this, drawing on insights from psychology to show that human decision-making is frequently irrational. Governments have increasingly adopted 'nudge' policies — subtle interventions designed to guide citizens towards better choices without coercion. Critics, however, question whether this approach is paternalistic and undermines individual autonomy.","questions":[{"type":"vocabulary","question":"'Paternalistic' means ___.","options":["restricting economic growth","treating people as incapable of choosing for themselves","encouraging civic participation","reducing government spending"],"correctIndex":1},{"type":"detail","question":"What does traditional economic theory assume?","options":["Individuals act irrationally","They are heavily influenced by others","They make rational decisions","They respond to emotional appeals"],"correctIndex":2},{"type":"inference","question":"What concern do critics raise about nudge policies?","options":["They are ineffective","They cost too much","They undermine individual freedom","They are based on flawed research"],"correctIndex":2},{"type":"detail","question":"What does behavioural economics draw upon beyond economics?","options":["Sociology and philosophy","Psychology","History and politics","Mathematics and statistics"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-75U","level":"B2","textType":"argumentative","title":"Globalisation: Friend or Foe?","text":"The globalisation debate remains polarising. Advocates point to unprecedented reductions in global poverty, the free flow of ideas and capital, and the cultural richness that emerges from interconnectedness. Detractors counter that globalisation has exacerbated inequality within nations, facilitated the offshoring of jobs and accelerated environmental destruction. The COVID-19 pandemic exposed the fragility of global supply chains.","questions":[{"type":"vocabulary","question":"'Exacerbated' means ___.","options":["reduced","solved","made worse","prevented"],"correctIndex":2},{"type":"inference","question":"What did the pandemic reveal about globalisation?","options":["It had been entirely beneficial","Global supply chains are resilient","There are risks in excessive interdependence","Nations were well-prepared"],"correctIndex":2},{"type":"main idea","question":"What is the structure of this passage?","options":["A one-sided argument against globalisation","A balanced presentation of both sides","A historical overview","A description of how globalisation works"],"correctIndex":1},{"type":"detail","question":"What do advocates highlight?","options":["Increased military cooperation","Reductions in poverty and cultural richness","Lower immigration levels","Stronger national identity"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-1Y5","level":"B2","textType":"informational","title":"The Science of Memory","text":"Memory is not a single system but a complex set of processes involving encoding, storage and retrieval. Short-term memory holds limited information for brief periods, whereas long-term memory can store vast quantities of information indefinitely. Research suggests that sleep plays a critical role in memory consolidation, as the brain processes and organises information during rest. Stress has been shown to impair memory formation.","questions":[{"type":"vocabulary","question":"'Consolidation' refers to ___.","options":["removing unnecessary information","strengthening and organising memories","testing memory accuracy","creating new memories"],"correctIndex":1},{"type":"detail","question":"What role does sleep play in memory?","options":["It reduces what we remember","It interferes with encoding","It aids consolidation of memories","It only helps short-term memory"],"correctIndex":2},{"type":"inference","question":"What can be inferred about stress and learning?","options":["Stress has no effect","Moderate stress improves memory","Reducing stress could improve cognitive performance","Stress only affects short-term memory"],"correctIndex":2},{"type":"detail","question":"How does long-term memory differ from short-term?","options":["It holds less information","It stores information indefinitely","It is less reliable","It is formed more quickly"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-AWC","level":"B2","textType":"argumentative","title":"Urban Green Spaces: A Luxury or a Necessity?","text":"As cities grow denser, the fate of urban green spaces has become increasingly contested. Proponents of development argue that land is a scarce resource that should be used for housing and infrastructure. Conservationists counter that green spaces provide mental health benefits, reduce the urban heat island effect and support biodiversity. An integrated planning approach may offer the most viable path forward.","questions":[{"type":"vocabulary","question":"'Contested' means ___.","options":["agreed upon","debated or disputed","well-researched","clearly defined"],"correctIndex":1},{"type":"inference","question":"Why is an 'integrated planning approach' recommended?","options":["It prioritises conservation","It balances development needs with green space","It removes the need for urban planning","It reduces construction costs"],"correctIndex":1},{"type":"detail","question":"What environmental benefit is mentioned?","options":["Reducing air pollution","Absorbing rainfall","Reducing the urban heat island effect","Providing clean water"],"correctIndex":2},{"type":"main idea","question":"What do conservationists argue?","options":["Green spaces should be sold","Urban development must stop","Green spaces are essential for urban wellbeing","Cities should focus only on green infrastructure"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-Y9C","level":"C1","textType":"argumentative","title":"The Crisis of Democratic Legitimacy","text":"Contemporary liberal democracies face a legitimacy crisis of unprecedented depth. Voter turnout has declined precipitously, trust in institutions has eroded, and the rise of populist movements on both ends of the political spectrum reflects a profound alienation from mainstream governance. Scholars disagree about the root causes: some attribute the crisis to economic inequality and the perceived indifference of elites; others point to the epistemic fragmentation wrought by social media, which makes consensus increasingly difficult to achieve.","questions":[{"type":"vocabulary","question":"'Precipitously' most nearly means ___.","options":["gradually","sharply and steeply","unexpectedly","intermittently"],"correctIndex":1},{"type":"inference","question":"What does 'both ends of the political spectrum' suggest?","options":["Populism is only right-wing","Democratic dissatisfaction is widespread","Mainstream parties are growing stronger","Social media has unified political views"],"correctIndex":1},{"type":"detail","question":"What explanation do some scholars give?","options":["Decline of religious institutions","Economic inequality and elite indifference","Rise of international organisations","Technological unemployment"],"correctIndex":1},{"type":"main idea","question":"What is this passage primarily about?","options":["The history of democratic institutions","Current threats to democratic legitimacy","The differences between political parties","Why social media should be regulated"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-FAT","level":"C1","textType":"informational","title":"The Neuroscience of Creativity","text":"For decades, the popular notion that creativity resides exclusively in the right hemisphere of the brain has been perpetuated in self-help literature. Neuroscientific research has thoroughly debunked this myth. Creativity, as demonstrated by functional MRI studies, involves the coordinated activity of multiple large-scale neural networks, including the default mode network — associated with mind-wandering and imagination — and the executive control network, which governs goal-directed thought.","questions":[{"type":"vocabulary","question":"'Debunked' means ___.","options":["confirmed","established","exposed as false","celebrated"],"correctIndex":2},{"type":"inference","question":"What does the research suggest about the right-brain model?","options":["It is partially correct","It has some scientific merit","It is fundamentally mistaken","It needs more investigation"],"correctIndex":2},{"type":"detail","question":"Which two neural networks are mentioned?","options":["The sensory and motor networks","The default mode and executive control networks","The limbic and prefrontal networks","The visual and auditory networks"],"correctIndex":1},{"type":"main idea","question":"What is the central claim?","options":["Creative people have larger brains","Creativity is a single, localised brain function","Creativity involves multiple interacting neural networks","The right hemisphere controls all creative thought"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-HVI","level":"C1","textType":"argumentative","title":"Post-Truth Politics and Epistemic Authority","text":"The concept of 'post-truth' — a political culture in which emotional appeals and tribal loyalties routinely override factual evidence — presents profound challenges to democratic discourse. The proliferation of digital misinformation, amplified by algorithmic content curation, has contributed to the fragmentation of shared reality. Some theorists argue that the very notion of objective truth is a contested construct wielded by those with institutional power; others insist that the abandonment of epistemic norms portends the unravelling of rational public debate.","questions":[{"type":"vocabulary","question":"'Epistemic' relates to ___.","options":["political institutions","knowledge and its foundations","economic development","social inequality"],"correctIndex":1},{"type":"inference","question":"What is implied by 'fragmentation of shared reality'?","options":["People increasingly disagree on what is true","Technology has become too advanced","Governments have lost all credibility","Democracy is no longer viable"],"correctIndex":0},{"type":"detail","question":"What do some theorists argue about objective truth?","options":["It is universally accepted","It is constantly improving","It is a construct tied to institutional power","It is irrelevant to politics"],"correctIndex":2},{"type":"main idea","question":"What is the central challenge?","options":["Regulating technology companies","Rebuilding shared epistemic foundations in democracies","Reforming electoral systems","Improving educational standards"],"correctIndex":1}]},{"id":"RD-MO3RGJTM-610","level":"C1","textType":"informational","title":"Climate Tipping Points","text":"The concept of climate tipping points refers to critical thresholds in the Earth's climate system beyond which self-reinforcing feedback loops may drive further change independently of human action. Examples include the collapse of the West Antarctic Ice Sheet, the dieback of the Amazon rainforest and the thawing of Siberian permafrost — all of which could release vast quantities of greenhouse gases, further accelerating warming. What makes tipping points particularly alarming is their potential irreversibility.","questions":[{"type":"vocabulary","question":"'Self-reinforcing feedback loops' are processes that ___.","options":["cancel each other out","slow down over time","amplify their own effects","operate independently of climate"],"correctIndex":2},{"type":"inference","question":"Why are tipping points described as 'alarming'?","options":["They happen very slowly","Their effects may be irreversible","Scientists are unsure they exist","They occur in remote areas"],"correctIndex":1},{"type":"detail","question":"Name one example of a climate tipping point.","options":["Melting of Arctic sea ice","Collapse of the West Antarctic Ice Sheet","Disappearance of coral reefs","Drying of the Sahara"],"correctIndex":1},{"type":"main idea","question":"What is the author's implicit argument?","options":["Current commitments are adequate","The scientific evidence is uncertain","More ambitious emission reductions are urgently needed","Climate tipping points are inevitable"],"correctIndex":2}]},{"id":"RD-MO3RGJTM-SLD","level":"C1","textType":"argumentative","title":"The Philosophy of Punishment","text":"The justification of punishment has long been a central preoccupation of moral and political philosophy. Retributivist theories hold that punishment is intrinsically deserved as a response to wrongdoing. Consequentialist theories justify punishment instrumentally: detention or fines are legitimate insofar as they deter crime, rehabilitate offenders or protect the public. A third framework — restorative justice — shifts the focus from punishment to repair, seeking to address harm done to victims and communities through dialogue and reconciliation.","questions":[{"type":"vocabulary","question":"'Instrumentally' means ___.","options":["based on emotion","based on principle","as a means to an end","based on tradition"],"correctIndex":2},{"type":"inference","question":"What is the key difference between retributivism and consequentialism?","options":["One is based on law, the other on religion","One focuses on desert, the other on outcomes","One applies to individuals, the other to communities","One is modern, the other outdated"],"correctIndex":1},{"type":"detail","question":"What does restorative justice focus on?","options":["Harsh penalties","Public humiliation","Repair of harm through dialogue","Strict application of the law"],"correctIndex":2},{"type":"main idea","question":"What is the passage primarily doing?","options":["Arguing for abolition of prisons","Describing three philosophical frameworks for punishment","Showing that punishment is never justified","Reviewing the history of criminal law"],"correctIndex":1}]},{"id":"RD-NEW-B1-001","level":"B1","title":"The Midnight Bakery","context":"Read this short story about an unexpected experience.","text":"When Priya moved to Edinburgh for her university degree, she expected to spend her evenings studying. She had not expected to discover a bakery that opened only at midnight. 'It started as a joke,' the owner, a retired teacher named Donald, told her one evening. 'I couldn't sleep, so I baked bread. Then my neighbours started appearing at the door.' Now, six nights a week, a small group of locals gathers in his warm kitchen. There is no menu — Donald bakes whatever he feels like, and customers pay whatever they can afford. Priya initially came for the bread, but she kept returning for the conversation. 'People talk more honestly at midnight,' she wrote in her university journal. 'The usual rules seem suspended.' By the end of her first year, she had decided to write her dissertation on informal community spaces — and Donald had become one of her closest friends in the city.","questions":[{"id":"Q1","type":"detail","question":"Why did Donald originally start baking at night?","options":["He wanted to earn extra money","He couldn't sleep and decided to bake","His neighbours requested it","He had retired from baking professionally"],"correctIndex":1},{"id":"Q2","type":"inference","question":"What does Priya mean when she writes that 'the usual rules seem suspended'?","options":["People break the law at night","People are more open and informal late at night","The bakery has no rules about behaviour","Donald does not charge standard prices"],"correctIndex":1},{"id":"Q3","type":"detail","question":"How did the bakery affect Priya's academic work?","options":["It distracted her from her studies","It inspired the topic of her university dissertation","It gave her a part-time job to pay for her studies","It introduced her to her university supervisor"],"correctIndex":1},{"id":"Q4","type":"vocab","question":"What does the word 'suspended' most nearly mean in this context?","options":["Punished","Elevated","Temporarily set aside","Strictly enforced"],"correctIndex":2}]},{"id":"RD-NEW-B1-002","level":"B1","title":"The Language Exchange","context":"Read this notice posted at a university.","text":"FREE LANGUAGE EXCHANGE — Every Tuesday, 18:00–20:00\nLocation: Room 14B, Student Union Building\n\nDo you want to practise a foreign language with a native speaker? Our weekly language exchange is open to all students and staff.\n\nHow it works:\n• Pairs are matched by language level and interest\n• Each session is divided into two equal parts — 30 minutes in each language\n• A volunteer coordinator is always present to help\n\nLanguages currently available: Korean, Japanese, Mandarin, Spanish, Arabic, French, German\n\nParticipants say:\n'My Korean improved more in three months than in two years of classes.' — Ahmad, Engineering student\n'I made my best friend through this programme.' — Liu Wei, International Business\n\nTo sign up, email language.exchange@university.ac.uk with your name, native language, and the language you wish to practise. Bring your own materials. Refreshments provided.\n\nNote: This is a social learning environment. It is not a replacement for formal language classes.","questions":[{"id":"Q1","type":"detail","question":"How long does each language get in a typical session?","options":["20 minutes","30 minutes","40 minutes","60 minutes"],"correctIndex":1},{"id":"Q2","type":"detail","question":"What should participants bring with them?","options":["Their own refreshments","Their own learning materials","A language textbook","A completed registration form"],"correctIndex":1},{"id":"Q3","type":"inference","question":"Why does the notice say this is 'not a replacement for formal language classes'?","options":["The sessions are too short to be useful","The programme is only for advanced speakers","It is a social activity and not a structured lesson","The coordinator is not a qualified teacher"],"correctIndex":2},{"id":"Q4","type":"main_idea","question":"What is the main purpose of this notice?","options":["To advertise paid language tutoring","To recruit volunteer language teachers","To invite people to join a free speaking practice programme","To explain why formal language classes are important"],"correctIndex":2}]},{"id":"RD-NEW-B1-003","level":"B1","title":"Digital Detox","context":"Read this article from a student magazine.","text":"Last summer, journalist and blogger Sara Chen challenged herself to spend one week without her smartphone. She expected boredom. What she did not expect was how much she noticed about the world around her. 'On the first day, I kept reaching for my pocket,' she wrote. 'By the third day, I had started talking to strangers on buses.' Sara observed that without the constant pull of notifications, she felt less anxious but also less informed. 'I missed real news but not the endless scroll of social media,' she admitted. She completed the week but did not make the change permanent. 'Total disconnection isn't the answer for most people,' she concluded. 'But even reducing screen time by 20 percent can make a real difference to your wellbeing.' Her article was widely shared — ironically, mostly on social media platforms.","questions":[{"id":"Q1","type":"detail","question":"What surprised Sara most about her digital detox?","options":["She felt bored very quickly","She became more observant of her surroundings","She missed her social media more than she expected","She found it easy to stop using her phone"],"correctIndex":1},{"id":"Q2","type":"inference","question":"What does Sara mean by 'the endless scroll of social media'?","options":["A technical error in social media apps","The habit of continuously browsing social media","A specific type of social media content","A new feature on smartphone screens"],"correctIndex":1},{"id":"Q3","type":"detail","question":"What was Sara's final conclusion about digital detox?","options":["Everyone should give up smartphones permanently","Reducing screen time moderately is more realistic than total disconnection","Digital devices have no positive benefits","Social media should be avoided completely"],"correctIndex":1},{"id":"Q4","type":"inference","question":"Why does the writer call it 'ironic' that Sara's article was shared on social media?","options":["Sara wrote the article to criticise social media, yet people used it to share her work","Sara had never used social media before writing the article","The article was too long to be read on a mobile screen","Social media platforms paid Sara to write the article"],"correctIndex":0}]},{"id":"RD-NEW-B1-004","level":"B1","title":"Working the Night Shift","context":"Read this email from a student to her tutor.","text":"Subject: Request to Change Seminar Group\n\nDear Dr Patterson,\n\nI am writing to ask whether it might be possible to transfer to the Thursday morning seminar group for your Critical Thinking module.\n\nI am currently in the Tuesday evening group, which runs from 6pm to 8pm. However, I recently accepted a part-time job at a local hotel, where I work Tuesday and Wednesday evenings. I took the job to help cover my living costs this year. I realise I should have checked for scheduling conflicts before accepting the position, and I apologise for not doing so.\n\nI have already spoken to two students in the Thursday group who have agreed to swap with me if you give your permission. I understand if this is not possible due to group size limits.\n\nI have not missed any sessions so far and have submitted all assignments on time. I hope this demonstrates my commitment to the course.\n\nThank you for considering my request.\n\nBest regards,\nAmelia Johansson","questions":[{"id":"Q1","type":"detail","question":"Why does Amelia want to change seminar groups?","options":["She dislikes the other students in her current group","Her part-time work hours conflict with her current seminar time","She finds the Tuesday group too large","Her current tutor has been changed"],"correctIndex":1},{"id":"Q2","type":"inference","question":"Why does Amelia say she 'should have checked for scheduling conflicts'?","options":["She is admitting she made a mistake when accepting the job","She is asking the tutor to check the timetable for her","She is explaining that the university made a scheduling error","She is criticising the company she works for"],"correctIndex":0},{"id":"Q3","type":"detail","question":"What arrangements has Amelia already made to facilitate the transfer?","options":["She has found other students willing to swap places with her","She has already attended the Thursday group unofficially","She has asked the university administration for approval","She has reduced her working hours at the hotel"],"correctIndex":0},{"id":"Q4","type":"inference","question":"What is the purpose of Amelia's final paragraph before signing off?","options":["To apologise again for the inconvenience","To prove she is a responsible and committed student","To threaten to complain if her request is refused","To remind the tutor that she has not been absent"],"correctIndex":1}]}
