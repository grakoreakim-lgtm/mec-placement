r countries waited","Failure of international organisations to coordinate","Higher vaccine hesitancy in lower-income countries"],"correctIndex":1},{"id":"Q3","type":"inference","question":"What does grotesquely visible imply about inequity during the pandemic?","options":["It revealed inequity in a way that was stark and impossible to ignore","The pandemic recorded inequity accurately for the first time","International media reported on it in an exaggerated way","Deaths in wealthy nations overshadowed problems elsewhere"],"correctIndex":0}]}],"writing":[{"id":"WT-001","level":"Pre-A1","taskType":"Sentence Completion","instruction":"Complete the sentences about yourself. Fill in each blank with a word or phrase.","context":"The teacher reads the sentences aloud. Students fill in blanks.","wordRange":"10–20","sentenceFrames":"My name is ___.\nI am ___ years old.\nI am from ___.\nMy favourite colour is ___.\nI have ___ in my family.","audience":"both"},{"id":"WT-002","level":"Pre-A1","taskType":"Label and Draw","instruction":"Look at the picture. Write the name of each item. (Items shown: table, chair, book, pen, bag)","context":"Image provided with numbered arrows pointing to classroom objects.","wordRange":"10–20","sentenceFrames":"1=table  2=chair  3=book  4=pen  5=bag","audience":"both"},{"id":"WT-003","level":"A1","taskType":"Short Personal Description","instruction":"Write about yourself. Tell us your name, where you are from, your age, and one thing you like.","context":"—","wordRange":"25–40","sentenceFrames":"My name is ___. I am from ___. I am ___ years old. I like ___.","audience":"both"},{"id":"WT-004","level":"A1","taskType":"Simple Postcard","instruction":"Write a postcard to a friend. Tell them where you are, what the place is like, and what you are doing.","context":"Imagine you are on holiday in a city you know.","wordRange":"25–40","sentenceFrames":"Hi ___! I am in ___. It is ___. I am ___. The weather is ___. See you soon! ___","audience":"both"},{"id":"WT-005","level":"A2","taskType":"Informal Text Message","instruction":"Write a text message to a friend inviting them to your birthday party. Include: the date, time, place, and what you will eat and do.","context":"Your friend lives in the same city. You know each other well.","wordRange":"40–60","sentenceFrames":"—","audience":"both"},{"id":"WT-006","level":"A2","taskType":"Short Email — Making Arrangements","instruction":"Write an email to an English-speaking friend. Suggest going to the cinema together. Give a day, time, and the film you want to see. Ask if they are free.","context":"—","wordRange":"40–60","sentenceFrames":"—","audience":"both"},{"id":"WT-007","level":"B1","taskType":"Informal Email","instruction":"You recently visited a new restaurant. Write an email to a friend recommending (or not recommending) it. Describe the food, atmosphere, and service.","context":"Your friend is looking for a good restaurant to take their family.","wordRange":"70–100","sentenceFrames":"—","audience":"both"},{"id":"WT-008","level":"B1","taskType":"Opinion Paragraph","instruction":"Some people think that young people spend too much time on social media. Do you agree? Write a paragraph giving your opinion with two reasons.","context":"—","wordRange":"70–100","sentenceFrames":"—","audience":"both"},{"id":"WT-009","level":"B2","taskType":"Semi-formal Email","instruction":"You saw an advertisement for a part-time teaching assistant position at an English language school. Write an email applying for the position. Explain your experience and why you are suitable.","context":"The advertisement says: Experience with children preferred. English proficiency required.","wordRange":"100–130","sentenceFrames":"—","audience":"junior"},{"id":"WT-010","level":"B2","taskType":"Discursive Paragraph","instruction":"Write a paragraph discussing the advantages AND disadvantages of living and working in a foreign country.","context":"Write for an educated adult audience.","wordRange":"100–130","sentenceFrames":"—","audience":"adult"},{"id":"WT-011","level":"C1","taskType":"Formal Letter","instruction":"You have read a newspaper article claiming that literature should be removed from school curricula in favour of more practical subjects. Write a formal letter to the editor responding to this argument.","context":"Address the arguments raised in the article and present a counter-argument.","wordRange":"140–170","sentenceFrames":"—","audience":"junior"},{"id":"WT-012","level":"C1","taskType":"Report Introduction","instruction":"You have been asked to write the introduction to a report on the impact of artificial intelligence on employment in your country.","context":"The report is for a government policy committee.","wordRange":"140–170","sentenceFrames":"—","audience":"adult"},{"id":"WT-013","level":"B2","taskType":"Formal email — complaint","instruction":"Write a formal email of complaint to the manager of a hotel where you recently stayed. Explain two specific problems you encountered and request appropriate compensation.","context":"You stayed at the Grand Palace Hotel for three nights. You had booked a sea-view room and requested early check-in.","wordRange":"100–130","sentenceFrames":"","audience":"adult"},{"id":"WT-014","level":"B2","taskType":"Opinion essay paragraph","instruction":"Write a well-structured paragraph presenting your opinion on the following statement: 'Universities should require all students to study a second language, regardless of their field of study.' Include your position, two supporting reasons, and a counter-argument.","context":"","wordRange":"100–130","sentenceFrames":"","audience":"junior"},{"id":"WT-015","level":"B2","taskType":"Report — advantages and disadvantages","instruction":"Your company is considering introducing a hot-desking policy (no assigned desks — employees sit wherever there is space each day). Write a short report for your manager outlining the advantages and disadvantages of this policy.","context":"Write in a semi-formal report style. Use appropriate headings.","wordRange":"100–130","sentenceFrames":"","audience":"adult"},{"id":"WT-016","level":"B2","taskType":"Informal letter — sharing news and advice","instruction":"You recently moved to a new city for work. Write a letter to a friend who is considering making the same move. Share your experiences and give two pieces of advice.","context":"Your friend has been offered a similar job in the same city and has asked for your honest opinion.","wordRange":"100–130","sentenceFrames":"","audience":"junior"},{"id":"WT-017","level":"C1","taskType":"Formal letter — response to proposal","instruction":"You are a senior employee at a technology firm. The board has proposed replacing the entire customer service team with an AI chatbot system. Write a formal letter to the Board of Directors arguing against this proposal.","context":"Your letter should address the board's likely motivations (cost reduction, efficiency) and present a structured counter-argument.","wordRange":"140–170","sentenceFrames":"","audience":"adult"},{"id":"WT-018","level":"C1","taskType":"Discursive essay introduction","instruction":"Write an introduction for a discursive essay on the following topic: 'The pursuit of economic growth is incompatible with meaningful action on climate change.' Your introduction should present the issue, outline both perspectives, and state your own position clearly.","context":"This is the opening section of a longer essay for an academic audience.","wordRange":"140–170","sentenceFrames":"","audience":"adult"},{"id":"WT-019","level":"C1","taskType":"Report — evaluating a proposal","instruction":"Your organisation has been asked to evaluate a proposal to relocate its headquarters to another city. Write a report for senior management assessing the advantages and disadvantages, and making a recommendation.","context":"Consider: cost, employee impact, operational continuity, and long-term strategic benefit.","wordRange":"140–170","sentenceFrames":"","audience":"adult"},{"id":"WT-020","level":"C1","taskType":"Formal essay — presenting a nuanced argument","instruction":"Write a response to the following essay question: 'To what extent do social media platforms bear responsibility for the mental health crisis among young people?' Present a balanced argument and reach a reasoned conclusion.","context":"This is a response for a university-level critical thinking course.","wordRange":"140–170","sentenceFrames":"","audience":"adult"},{"id":"WT-MO3MHW3S-DE5","level":"Pre-A1","taskType":"Draw and Label","instruction":"Draw a picture of your family. Write a name label under each person.","context":"Your family","wordRange":"10–20","sentenceFrames":"This is my ___.","audience":"both"},{"id":"WT-MO3MHW3S-B41","level":"Pre-A1","taskType":"Word Match","instruction":"Match the words to the pictures and write the correct word under each picture: cat, car, house, tree, book.","context":"Vocabulary items","wordRange":"10–20","sentenceFrames":"","audience":"both"},{"id":"WT-MO3MHW3S-Z1S","level":"Pre-A1","taskType":"Short Sentence Write","instruction":"Look at the picture. Write one sentence about what you see.","context":"A picture of a park","wordRange":"10–20","sentenceFrames":"I can see a ___.","audience":"both"},{"id":"WT-MO3MHW3S-7PT","level":"A1","taskType":"About Me Paragraph","instruction":"Write about yourself. Include your name, age, country, family, and one thing you like to do.","context":"","wordRange":"25–40","sentenceFrames":"My name is ___. I am ___ years old. I come from ___. I have ___.","audience":"both"},{"id":"WT-MO3MHW3S-YOZ","level":"A1","taskType":"Simple Description","instruction":"Look at the picture of a bedroom. Write sentences describing what is in the room.","context":"A bedroom picture","wordRange":"25–40","sentenceFrames":"There is a ___. There are ___. The ___ is ___.","audience":"both"},{"id":"WT-MO3MHW3S-4AZ","level":"A1","taskType":"Short Note","instruction":"Write a   const l=$('pb-lbl');  if(l) l.textContent=lbl;
  updateSidebar();
}
function updateSidebar(){
  const pm={welcome:0,intake:1,grammar:2,reading:3,writing:4,listening:5,speaking:6,results:7};
  const cur=pm[S.phase]||0;
  for(let i=0;i<=7;i++){
    const el=$('sb-'+i); if(!el) continue;
    el.className='sb-step'+(i<cur?' done':i===cur?' active':'');
  }
  // CSS @media handles visibility — no inline style override
  const sb=$('sidebar');
  if(sb) sb.style.display='';
}
function showLoad(msg,sub){
  $('app').innerHTML='<div class="qcard"><div class="loading-wrap">'
    +'<div class="ld-ring"></div>'
    +'<p class="ld-title">'+msg+'</p>'
    +(sub?'<p class="ld-sub">'+sub+'</p>':'')
    +'</div></div>';
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function stopTTS(){
  _playId++; // invalidate all pending callbacks
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  // Stop any Audio() elements that may be playing
  document.querySelectorAll('audio[data-lst]').forEach(a=>{ a.pause(); a.remove(); });
  _ttsOn=false; S.lstPlaying=false; stopWaveAnim();
}
function backBtn(label){
  return '<button class="btn btn-s btn-sm back-btn" '+A('goBack')+'>&#8592; '+(label||'Back')+'</button>';
}

async function initFromToken(){
  const params = new URLSearchParams(window.location.search);
  S_TOKEN = params.get('token');
  const prefName = params.get('name');
  const prefDob  = params.get('dob');
  const prefNat  = params.get('nat');

  if(prefName){
    S.prefilled = {
      name: decodeURIComponent(prefName),
      dob:  decodeURIComponent(prefDob||''),
      nat:  decodeURIComponent(prefNat||'')
    };
  }

  // ── Session lock (instant check before Firebase) ──────────
  if(S_TOKEN){
    const sessionKey = 'mec_completed_' + S_TOKEN;
    if(sessionStorage.getItem(sessionKey) === '1'){
      setTimeout(()=>{
        $('app').innerHTML='<div class="complete-screen">'
          +'<div class="cs-icon">&#9989;</div>'
          +'<div class="cs-title">Test Already Completed</div>'
          +'<div class="cs-sub">You have already submitted this placement test.<br><br>'
          +'Your results have been sent to MEC Academy.<br>'
          +'This link can only be used once and is now closed.</div>'
          +'</div>';
      },100);
      return;
    }
  }

  if(!S_TOKEN || !FB_ENABLED) return;

  try{
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
    const { getFirestore, doc, getDoc, updateDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const { getStorage, ref, uploadBytes }  = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js');

    const fbApp = initializeApp(FB_CONFIG);
    db_firebase      = getFirestore(fbApp);
    storage_firebase = getStorage(fbApp);

    window._fb = { doc, getDoc, getDocs:null, setDoc, updateDoc, ref, uploadBytes,
      collection:(db,col)=>null };

    const snap = await getDoc(doc(db_firebase,'students',S_TOKEN));
    if(!snap.exists()){
      $('app').innerHTML='<div class="complete-screen"><div class="cs-icon">&#128274;</div>'
        +'<div class="cs-title">Invalid Link</div>'
        +'<div class="cs-sub">This test link is invalid or has expired.<br>Please contact MEC Academy.</div></div>';
      return;
    }
    const data = snap.data();
    S_STUDENT_ID = S_TOKEN;

    if(data.status === 'completed'){
      try{ sessionStorage.setItem('mec_completed_'+S_TOKEN,'1'); }catch(e){}
      $('app').innerHTML='<div class="complete-screen">'
        +'<div class="cs-icon">&#9989;</div>'
        +'<div class="cs-title">Test Already Completed</div>'
        +'<div class="cs-sub">You have already submitted this placement test.<br><br>'
        +'Your results have been sent to MEC Academy.<br>'
        +'This link can only be used once and is now closed.</div>'
        +'</div>';
      return;
    }

    S.prefilled = {name:data.name||'', dob:data.dob||'', nat:data.nationality||''};
    await updateDoc(doc(db_firebase,'students',S_STUDENT_ID),{status:'in_progress'});
  }catch(e){
    console.error('Firebase init error:',e);
  }
}

// ── Reading & Listening CEFR from adaptive history ────────────────
function rdCEFR(){
  if(!S.rdPasses.length) return testLevel();
  const totalScore = rdTotal();
  const rawLevel  = S.rdLevel || testLevel();
  const li = LI(rawLevel);
  // ── Score-gate: percentage must justify the band ──────────────
  // < 30% on a level → drop 2 bands (clearly cannot read at this level)
  // 30–49%           → drop 1 band  (struggling at this level)
  // ≥ 50%            → confirm level (sufficient evidence)
  if (totalScore < 30) return LEVELS[Math.max(0, li - 2)] || LEVELS[0];
  if (totalScore < 50) return LEVELS[Math.max(0, li - 1)] || LEVELS[0];
  // Two passages: if student moved UP and still scored ≥50% → use higher level
  if(S.rdPasses.length===1) return rawLevel;
  const l1=S.rdLevelHist[0]||testLevel(), l2=S.rdLevel||l1;
  const score2=rdScore(1);
  if(l2!==l1 && score2>=50) return l2;
  return l1;
}
function lstCEFR(){
  if(!S.lstTasks.length) return testLevel();
  const totalScore = lstTotal();
  const rawLevel   = S.lstLevel || testLevel();
  const li = LI(rawLevel);
  // ── Score-gate: percentage must justify the band ──────────────
  // < 30% → drop 2 bands | 30–49% → drop 1 band | ≥50% → confirm
  if (totalScore < 30) return LEVELS[Math.max(0, li - 2)] || LEVELS[0];
  if (totalScore < 50) return LEVELS[Math.max(0, li - 1)] || LEVELS[0];
  if(S.lstTasks.length===1) return rawLevel;
  const l1=S.lstLevelHist[0]||testLevel(), l2=S.lstLevel||l1;
  const score2=lstTaskScore(1);
  if(l2!==l1 && score2>=50) return l2;
  return l1;
}

async function saveResultsToFirebase(){
  if(!db_firebase) return;

  if(!S_STUDENT_ID){
    const selfId='direct_'+Date.now().toString(36)+'_'+(S.name||'student').replace(/\s+/g,'_').slice(0,20);
    S_STUDENT_ID=selfId;
    try{
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getFirestore, doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      const fbApp = initializeApp(FB_CONFIG);
      db_firebase = getFirestore(fbApp);
      await setDoc(doc(db_firebase,'students',selfId),{
        name:S.name||'Unknown',dob:S.dob||'',nationality:S.nat||'',
        email:'(direct)',token:'direct',status:'in_progress',
        createdAt:{seconds:Date.now()/1000},selfTest:true
      });
    }catch(e){ console.warn('Direct student create failed:',e); return; }
  }

  try{
    const { doc, setDoc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const { ref, uploadBytes } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js');

    const lv=testLevel(), gSc=gmScore(), rdSc=rdTotal(), lSc=lstTotal();
    const ar=S.adminReport||{};
    const wrResponses=(S.wrTasks||[]).map((t,i)=>({
      task:t.taskType||t.level, instruction:t.instruction,
      text:(S.wrTexts&&S.wrTexts[i])||'',
      wordCount:((S.wrTexts&&S.wrTexts[i])||'').split(/\s+/).filter(Boolean).length
    }));

    await setDoc(doc(db_firebase,'results',S_STUDENT_ID),{
      studentId:S_STUDENT_ID, level:lv, gmScore:gSc, rdScore:rdSc, lstScore:lSc,
      rdLevelHistory:S.rdLevelHist||[], lstLevelHistory:S.lstLevelHist||[],
      gmHistory:S.gmHist||[],
      skillLevels:ar.skillLevels||{grammar:lv,reading:rdCEFR(),listening:lstCEFR(),writing:lv,speaking:lv},
      recommendedCourse:ar.recommendedCourse||'MEC General English ('+lv+')',
      writingResponses:wrResponses, speakingCount:S.audioBlobs.length,
      adminReport:ar, createdAt:{seconds:Date.now()/1000}
    });

    if(storage_firebase&&S.audioBlobs.length>0){
      for(let i=0;i<S.audioBlobs.length;i++){
        const storRef=ref(storage_firebase,'audio/'+S_STUDENT_ID+'/task_'+i+'.webm');
        await uploadBytes(storRef,S.audioBlobs[i]);
      }
    }

    await updateDoc(doc(db_firebase,'students',S_STUDENT_ID),{
      status:'completed', completedAt:{seconds:Date.now()/1000},
      level:lv, gmScore:gSc, rdScore:rdSc, lstScore:lSc
    });

    // Write session lock
    if(S_TOKEN){ try{ sessionStorage.setItem('mec_completed_'+S_TOKEN,'1'); }catch(e){} }
  }catch(e){
    console.error('Firebase save error:',e);
  }
}

const ADMIN_REPORT_SYS='You are a senior EFL/ESL placement specialist with 20+ years experience in CEFR assessment, Cambridge ESOL, and IELTS diagnostic methodology. Analyse the test data STRICTLY and return ONLY valid JSON. CRITICAL RULES you MUST follow: (1) A CEFR band can ONLY be awarded if the student scored >=50% at that level. If reading score <50%, the reading band must be at least 1 level below the raw adaptive level. If score <30%, drop 2 levels. NEVER assign C1 reading/listening if score is below 50%. (2) finalCEFR must be defensible to parents: if receptive skills (reading/listening) are significantly below grammar, explain the discrepancy in profileSummary and set finalCEFR to the LOWER of the two composite scores. (3) In writingDiagnostic, provide genuine rubric scores 1-5 based on the actual writing samples provided. Score 0 is only for absent writing. Quote specific phrases from the writing as evidence. (4) finalComments MUST be 8-10 sentences covering: (a) overall placement rationale WITH specific score evidence, (b) strongest section with concrete examples, (c) weakest section with specific improvement advice, (d) receptive vs productive skill balance analysis, (e) 2-3 personalised learning recommendations with examples, (f) motivating closing. (5) NEVER output a band that contradicts the percentage: 0% = no evidence of that level. Keys required: finalCEFR, levelName, confidenceNote (cite actual scores), profileSummary (3-4 sentences with specific scores and evidence), skillLevels (grammar/vocabulary/reading/listening/writing/speaking each score-validated CEFR), grammarDiagnostic (cefrBand, percentage, cefrDescriptor [official CEFR can-do], evidenceSummary [2-3 sentences citing pass/fail at each level from adaptive path], strengths [2-3 specific with examples], developmentAreas [2-3 specific gaps with examples], adaptivePath), readingDiagnostic (same - cefrBand MUST reflect score: <30% drops 2 levels, 30-49% drops 1 level), listeningDiagnostic (same - same score-gate rule), writingDiagnostic (overallBand, overallPercentage [estimate 0-100 based on writing quality], summaryComment [2-3 sentences evaluating both tasks], rubric [taskAchievement{score:1-5,band,comment with specific evidence from text}, coherenceCohesion{score:1-5,band,comment}, lexicalResource{score:1-5,band,comment with quoted vocabulary}, grammaticalRangeAccuracy{score:1-5,band,comment}], taskAnnotations [per task: {taskNum, overallTaskComment, errorHighlights:[{phrase,errorType,correction,comment}], positiveHighlights:[{phrase,comment}]}]), speakingDiagnostic (overallBand, pending[bool], summaryComment), skillBalance (strongest, weakest, balanceComment [2 sentences], recommendedFocus[3 areas with rationale]), studyPriorities (3 objects: area/rationale/suggestedActivity/timeframe), finalComments (string: 8-10 sentences as specified in rule 4 above — detailed, professional, specific), teacherNotes (2-3 sentences: recommended class level, specific focus for this student, notable patterns), strongAreas (3 objects: area/evidence with specific examples from test), weakAreas (3 objects: area/evidence/suggestion), recommendedCourse (string), recommendedLevel (string). Return ONLY valid JSON. All text in professional English.';

async function generateAdminReport(){
  const lv=testLevel(), gSc=gmScore(), rdSc=rdTotal(), lSc=lstTotal();
  const wrSummary=(S.wrTasks||[]).map((t,i)=>{
    const txt=(S.wrTexts&&S.wrTexts[i])||'(no response)';
    return 'Task '+(i+1)+' ('+t.taskType+'): ['+txt.split(/\s+/).filter(Boolean).length+' words] '+txt;
  }).join('\n\n');
  const gmHistStr=(()=>{
    const c={};LEVELS.forEach(l=>{c[l]={ok:0,tot:0};});
    S.gmHist.forEach(h=>{c[h.lv].tot++;if(h.ok)c[h.lv].ok++;});
    return LEVELS.map(l=>c[l].tot>0?l+': '+c[l].ok+'/'+c[l].tot:null).filter(Boolean).join(' | ');
  })();
  const wrongItems=S.gmHist.filter(h=>!h.ok).map(h=>h.lv+' '+( h.q||'')).slice(0,6).join(' | ')||'none';
  const prompt='CANDIDATE: '+S.name+' | DOB: '+(S.dob||'n/a')+' | Nat: '+(S.nat||'n/a')
    +'\nSCORES: Grammar '+gSc+'% | Reading '+rdSc+'% | Listening '+lSc+'%'
    +'\nADAPTIVE: '+gmHistStr+' | RD: '+(S.rdLevelHist||[]).join('→')+' | LS: '+(S.lstLevelHist||[]).join('→')
    +'\nFINAL LEVEL: '+lv
    +'\nSECTION CEFR (score-gated): Grammar='+lv+' ('+gSc+'%) | Reading='+rdCEFR()+' ('+rdSc+'%) | Listening='+lstCEFR()+' ('+lSc+'%)'
    +'\nNOTE: Reading/Listening CEFR bands have been score-gated: <30%=drop 2 levels, 30-49%=drop 1 level, >=50%=confirm level.'
    +'\nWRONG ITEMS: '+wrongItems
    +'\nWRITING:\n'+wrSummary
    +'\n\nProvide detailed diagnostic. Return ONLY valid JSON.';
  try{
    // Read API key from multiple sources: localStorage (admin-set), config, session
    let key = '';
    try { key = localStorage.getItem('mec_api_key') || ''; } catch(e) {}
    if(!key) key = API_KEY_CONFIG || S.apiKey || '';
    if(!key) throw new Error('No API key configured — using fallback report');
    const hdrs = {
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    };
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:hdrs,
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:ADMIN_REPORT_SYS,messages:[{role:'user',content:prompt}]})
    });
    const d=await r.json();
    if(d.error) throw new Error(d.error.message || 'API error');
    const t=(d.content&&d.content[0]&&d.content[0].text)||'{}';
    S.adminReport=JSON.parse(t.replace(/```json\n?|```\n?/g,'').trim());
  }catch(e){
    console.warn('AI report failed:',e);
    // ── Fallback: populate from test data even without AI ──
    const gmPct=gmScore(), rdPct=rdTotal(), lsPct=lstTotal();
    const lv_rd=rdCEFR?rdCEFR():lv, lv_ls=lstCEFR?lstCEFR():lv;
    const gmPathStr=(S.gmLevelHist||S.gmHist?.map(h=>h.lv)||[lv]).filter((v,i,a)=>i===0||v!==a[i-1]).join('→')||lv;
    S.adminReport={
      finalCEFR: lv,
      levelName: LV_NAMES[lv]||lv,
      confidenceNote: 'Placement based on adaptive test performance across all sections.',
      profileSummary: S.name+' has been placed at '+lv+' ('+( LV_NAMES[lv]||lv)+') based on adaptive placement test results. Grammar score: '+gmPct+'%. Reading score: '+rdPct+'%. Listening score: '+lsPct+'%. Writing and Speaking assessments are pending teacher review.',
      skillLevels:{grammar:lv,vocabulary:lv,reading:lv_rd,listening:lv_ls,writing:lv,speaking:lv},
      grammarDiagnostic:{
        cefrBand:lv, percentage:gmPct,
        cefrDescriptor: 'Assessed at '+lv+' level through adaptive grammar and vocabulary items.',
        evidenceSummary: 'Adaptive path: '+gmPathStr+'. Score: '+gmPct+'%. Performance indicates '+lv+'-level grammar and vocabulary knowledge.',
        strengths:['Completed adaptive grammar/vocabulary section','Score consistent with '+lv+' CEFR band'],
        developmentAreas:['AI analysis unavailable — full diagnostic pending teacher review'],
        adaptivePath: gmPathStr
      },
      readingDiagnostic:{
        cefrBand:lv_rd, percentage:rdPct,
        cefrDescriptor:'Assessed at '+lv_rd+' level through adaptive reading passages.',
        evidenceSummary:'Reading score: '+rdPct+'%. Passage level history: '+(S.rdLevelHist||[lv]).join('→')+'.',
        strengths:['Completed reading comprehension section'],
        developmentAreas:['Detailed reading analysis pending AI review'],
        adaptivePath:(S.rdLevelHist||[lv]).join('→')
      },
      listeningDiagnostic:{
        cefrBand:lv_ls, percentage:lsPct,
        cefrDescriptor:'Assessed at '+lv_ls+' level through adaptive listening tasks.',
        evidenceSummary:'Listening score: '+lsPct+'%. Task level history: '+(S.lstLevelHist||[lv]).join('→')+'.',
        strengths:['Completed listening comprehension section'],
        developmentAreas:['Detailed listening analysis pending AI review'],
        adaptivePath:(S.lstLevelHist||[lv]).join('→')
      },
      writingDiagnostic:{
        overallBand:lv,
        summaryComment:'Writing response submitted. Full rubric assessment pending teacher and AI review.',
        rubric:{
          taskAchievement:{score:0,band:lv,comment:'Pending teacher review'},
          coherenceCohesion:{score:0,band:lv,comment:'Pending teacher review'},
          lexicalResource:{score:0,band:lv,comment:'Pending teacher review'},
          grammaticalRangeAccuracy:{score:0,band:lv,comment:'Pending teacher review'}
        },
        taskAnnotations:[]
      },
      speakingDiagnostic:{overallBand:lv,pending:true,summaryComment:'Speaking assessment pending teacher review.'},
      skillBalance:{strongest:'Grammar',weakest:'Speaking',balanceComment:'Full skill balance analysis unavailable — AI analysis failed. Please regenerate the report from the Admin Dashboard.'},
      studyPriorities:[
        {area:'Review AI Analysis',rationale:'AI analysis was unavailable at time of test',suggestedActivity:'Admin: regenerate report from dashboard',timeframe:'Before first lesson'}
      ],
      finalComments:'Placement: '+lv+' ('+( LV_NAMES[lv]||lv)+'). Grammar '+gmPct+'% · Reading '+rdPct+'% · Listening '+lsPct+'%. Writing and speaking will be assessed by the teacher. For a full diagnostic AI report, please use the Regenerate button in the Admin Dashboard.',
      teacherNotes:'AI analysis was unavailable at time of test completion. Core scores: Grammar '+gmPct+'%, Reading '+rdPct+'%, Listening '+lsPct+'%. Please regenerate the AI report from the admin dashboard for full diagnostic detail.',
      strongAreas:[{area:'Test Completion',evidence:'Student completed all sections of the placement test'}],
      weakAreas:[{area:'AI Analysis Pending',evidence:'Full diagnostic pending',suggestion:'Regenerate report from Admin Dashboard'}],
      recommendedCourse:'MEC General English ('+lv+')',
      recommendedLevel: LV_NAMES[lv]||lv
    };
  }
  // ── AI 리포트를 Firebase에 재저장 ─────────────────────────
  try {
    if(db_firebase && S_STUDENT_ID) {
      const { doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      await updateDoc(doc(db_firebase,'results',S_STUDENT_ID), {
        adminReport: S.adminReport,
        level: S.adminReport?.finalCEFR || testLevel(),
        skillLevels: S.adminReport?.skillLevels || {},
        updatedAt: {seconds: Date.now()/1000}
      });
    }
  } catch(e) { console.warn('Admin report save failed:', e); }

  sendResultsEmail();

function sendResultsEmail(){
  try{
    const lv=testLevel(), ar=S.adminReport||{};
    const now=new Date().toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const gSc=gmScore(), rdSc=rdTotal(), lSc=lstTotal();
    const sk=ar.skillLevels||{};
    const wrBlock=(S.wrTasks||[]).map((t,i)=>{
      const txt=(S.wrTexts&&S.wrTexts[i])||'(no response)';
      return '--- Task '+(i+1)+': '+t.taskType+' ---\nInstruction: '+t.instruction+'\nResponse: '+txt;
    }).join('\n\n');
    const msg='MEC LANGUAGE ACADEMY — ENGLISH PLACEMENT TEST\n'
      +'================================================\n'
      +'Test: '+now+'\n\n'
      +'CANDIDATE\nName: '+S.name+'\nDOB: '+(S.dob||'n/a')+'\nNationality: '+(S.nat||'n/a')+'\n\n'
      +'AI PLACEMENT RESULT\n'
      +'Final CEFR: '+(ar.finalCEFR||lv)+' — '+(ar.levelName||LV_NAMES[lv]||lv)+'\n'
      +'Profile: '+(ar.profileSummary||'')+'\n\n'
      +'SCORES\nGrammar: '+gSc+'% ('+(sk.grammar||lv)+')\n'
      +'Reading: '+rdSc+'% ('+(sk.reading||lv)+')\n'
      +'Listening: '+lSc+'% ('+(sk.listening||lv)+')\n'
      +'Writing: PENDING REVIEW\nSpeaking: PENDING REVIEW\n\n'
      +'WRITING RESPONSES\n'+wrBlock+'\n\n'
      +'SPEAKING: '+(S.audioBlobs.length>0?S.audioBlobs.length+' recording(s)':'Teacher interview needed');
    if(EMAILJS_PUBLIC_KEY&&EMAILJS_PUBLIC_KEY.length>5&&window.emailjs){
      window.emailjs.init(EMAILJS_PUBLIC_KEY);
      window.emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
        to_email:REPORT_EMAIL,subject:'[MEC] '+S.name+' | '+(ar.finalCEFR||lv)+' | '+now,
        message:msg,student_name:S.name,level:ar.finalCEFR||lv,date:now
      }).then(()=>{
        showFinalComments(ar);
        toast('Results sent to teacher');
      }).catch(err=>{ showFinalComments(ar); });

      showFinalComments(ar);
      // Report saved to Firebase — admin will download from dashboard

      const ns=$('aiStatusNote');
      if(ns) ns.innerHTML='<span class="ai-done">&#10003; Analysis complete. Your report is ready for collection at MEC Academy on your first day.</span>';
    }
  }catch(e){ console.error('sendResultsEmail:',e); }
}

   opts:['I know no English at all','A few words and simple phrases','Basic sentences in familiar situations','Everyday conversations and simple topics','Most topics with some difficulty','Complex topics with ease and accuracy'],
   score:[0,1,2,3,4,5]},

   score:[0,1,2,3,4]},
  {q:'Which tasks can you do in English right now?',
   opts:['Nothing yet','Read simple words and answer basic questions','Introduce myself and talk about familiar topics','Hold conversations about daily topics','Discuss news, opinions and work topics','Communicate with full fluency and accuracy'],
   score:[0,1,2,3,4,5]},
  {q:'Have you taken any international English exam?',
   opts:['No exams at all','In-school tests only','IELTS 4.0–5.0 / TOEIC 400–600','IELTS 5.5–6.5 / TOEIC 600–850','IELTS 7.0+ / TOEFL 100+ / Cambridge C1/C2'],
   score:[0,0,1,2,3]}

function calcIntake(){
  let t=0;
  S.intake.forEach((a,i)=>{if(a!==null)t+=INTAKE[i].score[a];});
  if(t<=2)return 'Pre-A1';if(t<=5)return 'A1';if(t<=8)return 'A2';
  if(t<=12)return 'B1';if(t<=15)return 'B2';return 'C1';
}

// ══════════════════════════════════════════════════════════════
// GRAMMAR
// ══════════════════════════════════════════════════════════════
function pickGV(lv){
  let pool=QBANK.grammarVocab.filter(q=>q.level===lv&&!S.usedGv.has(q.id));
  if(!pool.length){
    for(const d of[1,-1,2,-2,3,-3]){
      const a=LEVELS[LI(lv)+d]; if(!a) continue;
      pool=QBANK.grammarVocab.filter(q=>q.level===a&&!S.usedGv.has(q.id));
      if(pool.length) break;
    }
  }
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function loadGV(){
  const q=pickGV(S.gmDiff); if(!q){doReading();return;}
  S.usedGv.add(q.id); S.gmQs.push(q); S.gmSel=null; render();
}
function gmCEFR(){
  if(!S.gmHist.length) return S.estLv;
  const c={};LEVELS.forEach(l=>{c[l]={ok:0,tot:0};});
  S.gmHist.forEach(h=>{c[h.lv].tot++;if(h.ok)c[h.lv].ok++;});
  // Tiered confidence thresholds (ETS/Cambridge-inspired):
  // ≥3 items at level: 50% pass threshold (standard)
  // 2 items:           67% pass threshold (higher bar for small sample)
  // 1 item:            100% required AND adjacent level must also pass
  for(let i=LEVELS.length-1;i>=0;i--){
    const l=LEVELS[i];
    if(c[l].tot<=0) continue;
    const pct = c[l].ok / c[l].tot;
    if(c[l].tot>=3 && pct>=0.50) return l;           // standard
    if(c[l].tot>=2 && pct>=0.67) return l;           // elevated threshold
    if(c[l].tot>=1 && pct>=1.00){                    // single item: need corroboration
      const prevL=LEVELS[i-1];
      if(prevL && c[prevL].tot>0 && c[prevL].ok/c[prevL].tot>=0.50) return l;
    }
  }
  // Fallback: find highest level with any passing evidence
  for(let i=LEVELS.length-1;i>=0;i--){
    const l=LEVELS[i];
    if(c[l].tot>0 && c[l].ok/c[l].tot>=0.50) return l;
  }
  return LEVELS[0];
}
function gmScore(){ return Math.round(S.gmAnswers.filter(a=>a.ok).length/Math.max(S.gmTotal,1)*100); }
function confirmGV(){
  if(S.gmSel===null) return;
  const q=S.gmQs[S.gmIdx];
  const ok=(S.gmSel===q.correctIndex);
  S.gmAnswers.push({ok,lv:q.level});
  S.gmHist.push({lv:q.level,ok});
  const li=LI(S.gmDiff);
  // 1-up/2-down adaptive rule:
  // Wrong → immediate 1-level drop (wrong answers are strong downward signal)
  // Correct → requires 2 consecutive correct to move up (prevents lucky-guess inflation)
  if(ok){
    S.gmConsecutiveCorrect=(S.gmConsecutiveCorrect||0)+1;
    S.gmConsecutiveWrong=0;
    if(S.gmConsecutiveCorrect>=2 && li<LEVELS.length-1){
      S.gmDiff=LEVELS[li+1];
      S.gmConsecutiveCorrect=0;
    }
  } else {
    S.gmConsecutiveCorrect=0;
    S.gmConsecutiveWrong=(S.gmConsecutiveWrong||0)+1;
    if(li>0) S.gmDiff=LEVELS[li-1];
  }
  S.gmIdx++;
  if(S.gmIdx>=S.gmTotal){ determineFinalLevel(); doReading(); }
  else loadGV();
}
function gSel(i){
  // Record response time on first selection of this question
  if(S.rtStart && S.gmSel===null){
    S.responseTimes.gm.push({elapsed:Date.now()-S.rtStart, level:S.gmQs[S.gmIdx]?.level||'?', qIdx:S.gmIdx, type:S.gmQs[S.gmIdx]?.type||'MCQ'});
    S.rtStart=0; S.rtQId=null;
  }
  S.gmSel=i; render();
}
function determineFinalLevel(){
  // No automatic bonus level — Grammar CAT result stands as-is
  // Cross-validation with receptive skills happens in testLevel()
  S.finalTestLevel = gmCEFR();
  return S.finalTestLevel;
}
function testLevel(){
  if(S.finalTestLevel) return S.finalTestLevel;
  const gmLv = gmCEFR();
  // If all sections have enough data, cross-validate
  const rdLv = rdCEFR(), lsLv = lstCEFR();
  const gmI  = LI(gmLv), rdI = LI(rdLv), lsI = LI(lsLv);
  const rdSc = rdTotal(), lsSc = lstTotal();
  // If reading OR listening scored below 30% AND they have data → cap the final level
  const hasRd = S.rdPasses.length > 0;
  const hasLs = S.lstTasks.length > 0;
  // A student cannot be placed higher than their reading/listening warrants
  // (grammar alone is insufficient if receptive skills are very low)
  let finalI = gmI;
  if(hasRd && rdSc < 40 && rdI < finalI) finalI = Math.min(finalI, rdI + 1);
  if(hasLs && lsSc < 40 && lsI < finalI) finalI = Math.min(finalI, lsI + 1);
  return LEVELS[Math.max(0, Math.min(finalI, LEVELS.length-1))] || gmLv;
}

// ══════════════════════════════════════════════════════════════
// READING
// ══════════════════════════════════════════════════════════════
function pickRD(lv,excl){
  let pool=QBANK.reading.filter(p=>p.level===lv&&!excl.includes(p.id));
  if(!pool.length){
    for(const d of[1,-1,2,-2]){
      const a=LEVELS[LI(lv)+d]; if(!a) continue;
      pool=QBANK.reading.filter(p=>p.level===a&&!excl.includes(p.id));
      if(pool.length) break;
    }
  }
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function doReading(){
  S.phase='reading'; S.rdIdx=0;
  // Reading typically lags grammar by ~0.5-1 level (CEFR research evidence).
  // Start 1 level below grammar for B1+ students to get accurate measurement.
  const gmLv=gmCEFR(), gmLi=LI(gmLv);
  S.rdLevel = (gmLi>=3) ? LEVELS[gmLi-1] : gmLv; // B1+ → start 1 below; Pre-A1~A2 → same
  S.rdLevelHist=[S.rdLevel];
  const p=pickRD(S.rdLevel,[]); if(!p){doListening();return;}
  S.rdPasses=[p]; S.rdAnswers=[[...Array(p.questions.length)].map(()=>null)];
  S.rdDone=[false]; S.rdQIdx=[0]; render();
}
function advanceReading(){
  const lastScore=rdScore(S.rdIdx), li=LI(S.rdLevel);
  if(lastScore>=75&&li<LEVELS.length-1) S.rdLevel=LEVELS[li+1];
  else if(lastScore<50&&li>0)           S.rdLevel=LEVELS[li-1];
  S.rdLevelHist.push(S.rdLevel); // Branching: ≥75% → up, <50% → down
  const excl=S.rdPasses.map(p=>p.id);
  let p=pickRD(S.rdLevel,excl);
  if(!p){ for(let d=1;d<=4&&!p;d++){ const l=LEVELS[LI(S.rdLevel)-d]; if(l) p=pickRD(l,excl); } }
  if(!p){doListening();return;}
  S.rdIdx=1; S.rdPasses.push(p);
  S.rdAnswers.push([...Array(p.questions.length)].map(()=>null));
  S.rdDone.push(false); S.rdQIdx.push(0); render();
}
function rdScore(i){
  const p=S.rdPasses[i]; if(!p) return 0;
  return Math.round(S.rdAnswers[i].filter((a,qi)=>a===p.questions[qi]?.correctIndex).length/p.questions.length*100);
}
function rdTotal(){
  if(!S.rdPasses.length) return 0;
  if(S.rdPasses.length===1) return rdScore(0);
  return Math.round((rdScore(0)+rdScore(1))/2); // simple average — no arbitrary weighting
}
function setRdAns(pi,qi,i){
  if(S.rtStart && S.rdAnswers[pi][qi]===null){
    S.responseTimes.rd.push({elapsed:Date.now()-S.rtStart, pi:pi, qi:qi, level:S.rdPasses[pi]?.level||'?'});
    S.rtStart=0; S.rtQId=null;
  }
  S.rdAnswers[pi][qi]=i; render();
}
function prevRd(pi){ if(S.rdQIdx[pi]>0){S.rdQIdx[pi]--;render();} }
function nextRd(pi){
  const p=S.rdPasses[pi];
  if(S.rdQIdx[pi]<p.questions.length-1){S.rdQIdx[pi]++;render();}
  else{S.rdDone[pi]=true;render();}
}

function doWriting(){
  S.phase='writing';
  const lv=testLevel();
  const count=WR_TASKS(lv)||1;
  const tasks=QBANK.writing.filter(t=>t.level===lv&&(!t.audience||t.audience==='both'||t.audience===S.audience));
  const pool=tasks.length?tasks:[QBANK.writing[0]];
  // Pick 'count' unique random tasks
  const selected=[];
  const available=[...pool];
  for(let i=0;i<count&&available.length>0;i++){
    const idx=Math.floor(Math.random()*available.length);
    selected.push(available.splice(idx,1)[0]);
  }
  S.wrTasks=selected.filter(Boolean);
  S.wrTaskIdx=0; S.wrTask=S.wrTasks[0];
  S.wrTexts=S.wrTasks.map(()=>''); S.wrText='';
  S.phase='writing'; // ensure phase is writing
  render();
}

function submitWriting(){
  S.phase='writing';
  const ta=$('wrArea'); if(!ta){ toast('Text area not found.'); return; }
  const text=ta.value.trim();
  const lv_wr = testLevel();
  const minWC = {'Pre-A1':5,'A1':10,'A2':20,'B1':40,'B2':60,'C1':80}[lv_wr] || 10;
  const wordCount = text.split(/\s+/).filter(Boolean).length;
  if(wordCount < minWC){
    if(!S.wrShortWarned){
      S.wrShortWarned=true;
      showWrShortWarning(wordCount, minWC);
      return;
    }
    S.wrShortResponse=true;
  }
  S.wrTexts[S.wrTaskIdx]=text; S.wrText=text;
  if(S.wrTasks&&S.wrTasks.length>1&&S.wrTaskIdx===0){
    S.wrTaskIdx=1; S.wrTask=S.wrTasks[1]; S.wrText=S.wrTexts[1]||'';
    render(); return;
  }
  S.wrText=S.wrTexts.filter(Boolean).join('\n\n---\n\n');
  try {
    doSpeaking();
  } catch(err) {
    console.error('doSpeaking error:', err);
    // Fallback: force phase to speaking and re-render
    S.phase='speaking';
    if(!S.spkTasks||!S.spkTasks.length){
      const lv=testLevel();
      const tasks=QBANK.speaking.filter(t=>t.level===lv);
      const t1=tasks[0]||QBANK.speaking[0];
      S.spkTasks=[t1];
      S.spkPicture=(t1&&t1.taskType==='picture-description')?pickPicture(lv):null;
    }
    render();
  }
}

// ══════════════════════════════════════════════════════════════
function pickLS(lv,excl){
  let pool=QBANK.listening.filter(t=>t.level===lv&&!excl.includes(t.id));
  if(!pool.length){
    for(const d of[1,-1,2]){
      const a=LEVELS[LI(lv)+d]; if(!a) continue;
      pool=QBANK.listening.filter(t=>t.level===a&&!excl.includes(t.id));
      if(pool.length) break;
    }
  }
  return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function doListening(){
  S.phase='listening'; S.lstIdx=0; S.lstTasks=[]; S.lstDone=false;
  S.lstLevel=testLevel(); S.lstLevelHist=[S.lstLevel];
  const t=pickLS(S.lstLevel,[]); if(!t){doSpeaking();return;}
  S.lstTasks=[t];
  S.lstAnswers=[[...Array(t.questions.length)].map(()=>null)];
  S.lstQIdx=[0]; S.lstPlayed=[false]; render();
}
function lstTaskScore(ti){
  const t=S.lstTasks[ti]; if(!t) return 0;
  const ans=S.lstAnswers[ti];
  return Math.round(ans.filter((a,qi)=>a===t.questions[qi]?.correctIndex).length/t.questions.length*100);
}
function loadNextLST(){
  const lastScore=lstTaskScore(S.lstIdx), li=LI(S.lstLevel);
  if(lastScore>=75&&li<LEVELS.length-1) S.lstLevel=LEVELS[li+1];
  else if(lastScore<50&&li>0)           S.lstLevel=LEVELS[li-1];
  S.lstLevelHist.push(S.lstLevel); // Branching: ≥75% → up, <50% → down
  const excl=S.lstTasks.map(t=>t.id);
  const t=pickLS(S.lstLevel,excl);
  if(!t){S.lstDone=true;render();return;}
  const i=S.lstIdx+1; S.lstIdx=i;
  S.lstTasks.push(t);
  S.lstAnswers.push([...Array(t.questions.length)].map(()=>null));
  S.lstQIdx.push(0); S.lstPlayed.push(false); render();
}
function skipListening(){ stopTTS(); S.lstDone=true; doWriting(); }
function lstTotal(){
  let tot=0,max=0;
  S.lstAnswers.forEach((ans,ti)=>{
    const t=S.lstTasks[ti]; if(!t) return;
    ans.forEach((a,qi)=>{if(a===t.questions[qi]?.correctIndex)tot++;});
    max+=t.questions.length;
  });
  return max>0?Math.round(tot/max*100):0;
}
function setLstAns(ti,qi,i){
  if(S.rtStart && S.lstAnswers[ti][qi]===null){
    S.responseTimes.lst.push({elapsed:Date.now()-S.rtStart, ti:ti, qi:qi, level:S.lstTasks[ti]?.level||'?'});
    S.rtStart=0; S.rtQId=null;
  }
  S.lstAnswers[ti][qi]=i; render();
}
function prevLstQ(ti){ if((S.lstQIdx[ti]||0)>0){S.lstQIdx[ti]--;render();} }
function nextLstQ(ti,qi,total,totalT){
  // All-questions-at-once mode: qi is always 0, just proceed to next script
  if(ti+1<totalT){stopTTS();loadNextLST();}
  else{stopTTS();S.lstDone=true;render();}
}

// TTS
function playLST(){
  const task=S.lstTasks[S.lstIdx]; if(!task) return;
  if(!window.speechSynthesis&&!task.turns[0]?.audioB64){
    toast('Audio not available in this browser.'); return;
  }

  window.speechSynthesis?.cancel();
  _ttsOn=false; S.lstPlaying=false; stopWaveAnim();

  const playId = ++_playId;
  _ttsOn=true; S.lstPlaying=true;
  const btn=$('lstPlayBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span>&#9836; Playing...</span>';}
  startWaveAnim();

  const spd=LST_SPD[S.lstLevel]||0.9;

  // ── Check if pre-generated ElevenLabs audio is available ──
  const hasEL = task.turns.some(t=>t.audioB64 || t.audioUrl);

  if(hasEL){
    // ── ElevenLabs MP3 재생 ──────────────────────────────
    playELAudio(task, playId, spd);
  } else {
    // ── Web Speech API 폴백 ──────────────────────────────
    playTTS(task, playId, spd);
  }
}

// ── ElevenLabs Audio Playback ─────────────────────────────
function playELAudio(task, playId, spd){
  const turns = task.turns;

  function playTurn(i){
    if(!_ttsOn || _playId!==playId) return;

    if(i>=turns.length){
      // All done
      _ttsOn=false; S.lstPlaying=false;
      S.lstPlayed[S.lstIdx]=true;
      stopWaveAnim(); render(); return;
    }

    const turn = turns[i];
    updateStage(i, task); // highlight speaker

    if(!turn.audioB64 && !turn.audioUrl){
      // This turn has no audio — skip with 200ms pause
      setTimeout(()=>playTurn(i+1), 200);
      return;
    }

    // Prefer URL (smaller payload), fallback to Base64
    const src = turn.audioUrl
      ? turn.audioUrl
      : 'data:audio/mpeg;base64,' + turn.audioB64;
    const audio = new Audio(src);
    audio.crossOrigin = 'anonymous';  // For Firebase Storage URLs
    audio.playbackRate = spd;

    audio.onended = () => {
      if(!_ttsOn || _playId!==playId) return;
      // 150ms natural pause between turns
      setTimeout(()=>playTurn(i+1), 150);
    };
    audio.onerror = (e) => {
      console.warn('Audio error turn', i, e);
      if(!_ttsOn || _playId!==playId) return;
      setTimeout(()=>playTurn(i+1), 200);
    };

    audio.play().catch(e=>{
      console.warn('Audio play failed:', e);
      playTurn(i+1);
    });
  }

  playTurn(0);
}

// ── Web Speech API TTS (fallback) ─────────────────────────
function playTTS(task, playId, spd){
  function getVoices(){ return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en-')); }

  function pickVoice(si){
    const eng=getVoices();
    if(!eng.length) return null;
    const female=eng.filter(v=>/female|woman|girl|zira|samantha|karen|moira/i.test(v.name));
    const male  =eng.filter(v=>/male|man|boy|david|mark|daniel|alex|bruce/i.test(v.name));
    if(si===0) return female[0]||eng[0]||null;
    return male[0]||eng[Math.min(1,eng.length-1)]||null;
  }

  function spk(i){
    if(!_ttsOn || _playId!==playId) return;

    if(i>=task.turns.length){
      _ttsOn=false; S.lstPlaying=false;
      S.lstPlayed[S.lstIdx]=true;
      stopWaveAnim(); render(); return;
    }

    const turn=task.turns[i];
    const si=(turn.speakerIndex||0)%2;
    updateStage(i, task);

    const u=new SpeechSynthesisUtterance(turn.text);
    u.rate=spd; u.lang='en-US';
    u.pitch=si===0?1.15:0.85;
    const v=pickVoice(si); if(v) u.voice=v;

    let ended=false;
    const startedAt=Date.now();
    const minWait=Math.max(600, turn.text.length*55/spd);
    const maxWait=Math.max(2000, turn.text.length*95/spd);

    function advance(){
      if(ended||!_ttsOn||_playId!==playId) return;
      ended=true;
      setTimeout(()=>spk(i+1), 100);
    }
    u.onend=()=>{ const el=Date.now()-startedAt; if(el<minWait) setTimeout(advance,minWait-el); else advance(); };
    u.onerror=e=>{ if(e.error==='interrupted')return; advance(); };
    window.speechSynthesis.speak(u);
    setTimeout(()=>{ if(!ended&&_ttsOn&&_playId===playId) advance(); }, maxWait);
  }

  let _started=false;
  function startWhenReady(){
    if(_started) return;
    const voices=window.speechSynthesis.getVoices();
    if(voices.length>0){ _started=true; spk(0); }
    else{
      const onVC=()=>{ window.speechSynthesis.onvoiceschanged=null; if(_started||!_ttsOn||_playId!==playId)return; _started=true; spk(0); };
      window.speechSynthesis.onvoiceschanged=onVC;
      setTimeout(()=>{ if(_started||!_ttsOn||_playId!==playId)return; window.speechSynthesis.onvoiceschanged=null; _started=true; spk(0); },800);
    }
  }
  startWhenReady();
}

async function startRec(){
  S.audioChunks=[];
  const maxSec=S.spkTasks[S.spkIdx]?.recSec||40;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.stream=stream;
    S.recorder=new MediaRecorder(stream);
    S.recorder.ondataavailable=e=>{if(e.data.size>0)S.audioChunks.push(e.data);};
    S.recorder.onstop=()=>{
      const blob=new Blob(S.audioChunks,{type:'audio/webm'});
      S.audioBlobs[S.spkIdx]=blob;
      S.audioURLs[S.spkIdx]=URL.createObjectURL(blob);
      S.stream?.getTracks().forEach(t=>t.stop());
      S.recording=false; clearInterval(S.recInt);
      S.spkPhase='done'; render();
    };
    S.recorder.start(250);
    S.recording=true; S.recSec=0; render();
    S.recInt=setInterval(()=>{
      S.recSec++;
      const el=$('recTime'); if(el) el.textContent=fmtTime(S.recSec);
      const bar=$('recBar'); if(bar) bar.style.width=Math.min(100,(S.recSec/maxSec)*100)+'%';
      if(S.recSec>=maxSec) stopRec();
    },1000);
  }catch(e){ S.micOk=false; S.spkPhase='done'; render(); }
}
function stopRec(){ clearInterval(S.recInt); if(S.recorder?.state!=='inactive') S.recorder.stop(); }

function sysPlayAudio(){
  if(!('speechSynthesis' in window)){
    S.sysAudio='pending-confirm'; render(); return;
  }
  const text='This is an audio test. If you can hear this sentence clearly, your audio is working correctly. Please click the button below to confirm.';
  const toPending=()=>{ if(S.sysAudio==='playing'){ S.sysAudio='pending-confirm'; render(); } };
  const speakNow=()=>{
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='en-GB'; utt.rate=0.88; utt.volume=1; utt.pitch=1;
    const voices=window.speechSynthesis.getVoices()||[];
    const pick=voices.find(v=>/^en-GB/i.test(v.lang))
             ||voices.find(v=>/^en[-_]/i.test(v.lang))
             ||voices.find(v=>/^en/i.test(v.lang));
    if(pick) utt.voice=pick;
    let started=false;
    utt.onstart=()=>{ started=true; };
    utt.onend=()=>{ toPending(); };
    utt.onerror=(e)=>{ console.warn('TTS error',e); toPending(); };
    try{ window.speechSynthesis.speak(utt); }catch(e){ console.warn('speak threw',e); toPending(); return; }
    // If onstart never fires within 1.8s → silent fail, show confirm immediately
    setTimeout(()=>{ if(!started) toPending(); },1800);
    // Safety: move to pending after 8s regardless
    setTimeout(toPending,8000);
  };
  S.sysAudio='playing';
  const voices=window.speechSynthesis.getVoices()||[];
  if(voices.length===0){
    let fired=false;
    const onVC=()=>{ if(fired) return; fired=true; window.speechSynthesis.onvoiceschanged=null; speakNow(); };
    window.speechSynthesis.onvoiceschanged=onVC;
    setTimeout(()=>{ if(fired) return; fired=true; window.speechSynthesis.onvoiceschanged=null; speakNow(); },600);
  } else {
    speakNow();
  }
  render();
}

async function sysMicRecord(){
  const btn=$('scMicBtn'), status=$('scMicStatus');
  if(!navigator.mediaDevices?.getUserMedia){
    S.sysMic=false; render(); return;
  }
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    if(btn) btn.disabled=true;
    if(status) status.textContent='Recording... (3 seconds)';
    const rec=new MediaRecorder(stream);
    const chunks=[];
    rec.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    rec.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(chunks.length===0){ S.sysMic=false; render(); return; }
      const blob=new Blob(chunks,{type:'audio/webm'});
      S.sysMicBlob=blob;
      const url=URL.createObjectURL(blob);
      const a=new Audio();
      a.src=url; a.volume=1.0; a.preload='auto'; a.style.display='none';
      document.body.appendChild(a);
      const st=$('scMicStatus'); if(st) st.textContent='Playing back your recording...';
      let settled=false;
      const cleanup=()=>{ try{ a.remove(); URL.revokeObjectURL(url); }catch(_){} };
      const finish=()=>{ if(settled) return; settled=true; cleanup(); S.sysMic='pending-confirm'; render(); };
      a.onended=finish;
      a.onerror=(e)=>{ console.warn('Mic playback error',e); finish(); };
      const p=a.play();
      if(p && typeof p.catch==='function'){
        p.catch(err=>{ console.warn('Mic playback failed',err); finish(); });
      }
      // Safety: if neither onended nor error fires within 8s, show confirm anyway
      setTimeout(finish,8000);
    };
    rec.start();
    let countdown=3;
    const ct=setInterval(()=>{
      countdown--;
      if(status) status.textContent='Recording... ('+countdown+'s)';
      if(countdown<=0){ clearInterval(ct); rec.stop(); }
    },1000);
  } catch(err) {
    console.warn('Mic error:',err);
    S.sysMic=false; render();
  }
}

function confirmAndStart(){
  if(!S.prefilled) return;
  S.name=S.prefilled.name||''; S.dob=S.prefilled.dob||''; S.nat=S.prefilled.nat||'';
  if(!S.name){toast('Name missing. Please contact your teacher.');return;}
  S.sysAudio=null;S.sysMic=null;S.sysMicBlob=null;
  S.phase='systemcheck'; render();
}
function editBeforeStart(){
  const saved=S_TOKEN; S_TOKEN=null; rWelcome(); S_TOKEN=saved;
  const ni=$('nameIn'); if(ni) ni.value=S.prefilled?.name||'';
  const ni2=$('natIn');  if(ni2) ni2.value=S.prefilled?.nat||'';
  if(S.prefilled?.dob){
    const[d,m,y]=(S.prefilled.dob||'').split('/');
    const dd=$('dobD');if(dd)dd.value=d||'';
    const dm=$('dobM');if(dm)dm.value=m||'';
    const dy=$('dobY');if(dy)dy.value=y||'';
  }
  const card=document.querySelector('.welcome-form-card');
  if(card){
    const notice=document.createElement('div');
    notice.className='welcome-notice';notice.style.marginTop='0';notice.style.marginBottom='14px';
    notice.textContent='Editing your pre-filled details. Press Start Test when ready.';
    card.insertBefore(notice,card.firstChild);
  }
}
function startTest(){
  const n=($('nameIn')?.value||'').trim();
  const d=$('dobD')?.value||'',m=$('dobM')?.value||'',y=$('dobY')?.value||'';
  if(!n){toast('Please enter your full name.');$('nameIn')?.classList.add('err');setTimeout(()=>$('nameIn')?.classList.remove('err'),2000);return;}
  if(!d||!m||!y){toast('Please enter your date of birth.');return;}
  S.name=n; S.dob=d+'/'+m+'/'+y; S.nat=($('natIn')?.value||'').trim();
  S.sysAudio=null;S.sysMic=null;S.sysMicBlob=null;
  S.phase='systemcheck'; render();
}

// ── rIntake ───────────────────────────────────────────────────
function rIntake(){

  const allDone=S.intake.every(a=>a!==null);
  let qs='';
  INTAKE.forEach((q,qi)=>{
    qs+='<div class="iq-block"><div class="iq-hd"><div class="iq-num">'+(qi+1)+'</div><div class="iq-txt">'+H(q.q)+'</div></div><div class="iq-opts">';

      qs+='<div class="iq-opt'+(S.intake[qi]===oi?' sel':'')+'\" '+A('setIntake','data-v="'+qi+'" data-v2="'+oi+'"')+'><div class="iq-radio"></div>'+H(o)+'</div>';
    });
    qs+='</div></div>';
  });

    '<div class="sec-hd-row"><span></span><span class="sec-badge">Step 1 of 6 &middot; Self-Assessment</span>'

}
function setIntake(qi,oi){ S.intake[qi]=oi; rIntake(); }
function submitIntake(){
  S.estLv=calcIntake(); S.gmDiff=S.estLv; S.gmTotal=GM_TOTALS[S.estLv]||10;
  S.gmConsecutiveCorrect=0; S.gmConsecutiveWrong=0; // reset CAT streaks
  S.phase='grammar'; loadGV();
}

// ── rGrammar ──────────────────────────────────────────────────
function rGrammar(){
  setProg(12+Math.round(S.gmIdx/S.gmTotal*22),'Grammar & Vocabulary');
  const q=S.gmQs[S.gmIdx]; if(!q) return;
  const L=['A','B','C','D'];
  const isPre=q.level==='Pre-A1'||q.level==='A1';
  const isImg=isPre&&['VOCAB-VIS','PHONICS','VOCAB-ANIMAL','VOCAB-SHAP','VOCAB-NUM'].includes(q.type);
  const emojis=q.stimulus?[...(q.stimulus.match(/\p{Emoji_Presentation}|\p{Emoji}\uFE0F/gu)||[])]:[];
  const hasVis=emojis.length>0;
  const dots=[...Array(Math.min(S.gmTotal,18))].map((_,i)=>'<div class="qc-dot'+(i<S.gmIdx?' done':i===S.gmIdx?' cur':'')+'"></div>').join('');
  let visHTML='';
  if(hasVis) visHTML='<div class="vis-stim"><span style="font-size:'+(emojis.length>1?'56px':'88px')+';line-height:1.3;letter-spacing:'+(emojis.length>1?'10px':'0')+'">'+emojis.join(' ')+'</span></div>';
  let optsHTML='';
  if(q.type==='ERROR-ID' && q.stimulus && q.stimulus.includes('[')){
    // Transform stimulus: replace [part] with labeled underline spans
    let si=0;
    const stim=H(q.stimulus).replace(/\[([^\]]+)\]/g,function(m,part){
      var lbl=L[si++];
      return '<u style="text-decoration-color:var(--cu);text-underline-offset:3px"><sup style="color:var(--cu);font-size:9px;font-weight:800;margin-right:1px">'+lbl+'</sup>'+part+'</u>';
    });
    // Show the labeled sentence as stimulus, then render options normally
    optsHTML='<div class="err-sentence-wrap"><div class="err-sentence">'+stim+'</div>'
      +'<div class="err-hint">&#128073; Which underlined part (A–D) contains the grammatical error?</div>'
      +'</div>';
    optsHTML+='<div class="opts">';
    q.options.forEach(function(o,i){
      optsHTML+='<div class="opt'+(S.gmSel===i?' sel':'')+'" '+A('gSel','data-v="'+i+'"')+'>'
        +'<div class="opt-k">'+L[i]+'</div><div class="opt-txt">'+H(o)+'</div></div>';
    });
    optsHTML+='</div>';
  }else if(isImg){
    optsHTML='<div class="img-grid">';
    q.options.forEach((o,i)=>{optsHTML+='<div class="img-opt'+(S.gmSel===i?' sel':'')+'\" '+A('gSel','data-v="'+i+'"')+'><span class="img-opt-emoji">'+o+'</span><span class="img-opt-lbl">'+L[i]+'</span></div>';});
    optsHTML+='</div>';
  }else{
    optsHTML='<div class="opts">';
    q.options.forEach((o,i)=>{optsHTML+='<div class="opt'+(S.gmSel===i?' sel':'')+(isPre?' big':'')+'\" '+A('gSel','data-v="'+i+'"')+'><div class="opt-k">'+L[i]+'</div><div class="opt-txt">'+H(o)+'</div></div>';});
    optsHTML+='</div>';
  }
  // Start response time timer for this question
  const _rtQId_gm='gm-'+S.gmIdx;
  if(S.rtQId!==_rtQId_gm){S.rtStart=Date.now();S.rtQId=_rtQId_gm;}
  $('app').innerHTML=
    '<div class="sec-hd-row">'+(S.gmIdx>0?backBtn():'<span></span>')+'<span class="sec-badge">Step 2 of 6 &middot; '+(q.type&&q.type.startsWith('VOCAB')?'Vocabulary':'Grammar')+'</span></div>'
    +'<div class="qcard'+(isPre?' prea1':'')+'">'
      +'<div class="qcard-meta"><span class="qc-num">Question '+(S.gmIdx+1)+' of '+S.gmTotal+'</span>'
        +'<div style="display:flex;align-items:center;gap:10px"><div class="qc-dots">'+dots+'</div><span class="qc-badge">'+q.level+'</span></div></div>'
      +'<div class="qcard-body">'
        +(q.stimulus&&!hasVis?'<div class="q-stimulus">'+H(q.stimulus)+'</div>':'')
        +visHTML
        +'<div class="q-text'+(isPre?' big':'')+'">'+H(q.question)+'</div>'
        +optsHTML
      +'</div>'
      +'<div class="qcard-footer"><span class="text-sm">Select your answer</span>'
        +'<button class="btn btn-p" '+A('confirmGV')+(S.gmSel===null?' disabled':'')+'>'+(S.gmIdx+1<S.gmTotal?'Next':'Continue')+' '+SVG_NEXT+'</button>'
      +'</div>'
    +'</div>';
}

// ── rReading ──────────────────────────────────────────────────
function rReading(){
  const pi=S.rdIdx, lv=S.rdLevel||testLevel(), totalP=RD_PASS(lv);
  setProg(34+pi*7,'Reading');
  const p=S.rdPasses[pi]; if(!p) return;
  if(S.rdDone[pi]){
    const isLast=pi+1>=totalP;
    $('app').innerHTML=
      '<div class="complete-screen">'
      +'<div class="cs-icon">&#128218;</div>'
      +'<div class="cs-title">Passage '+(pi+1)+' Complete</div>'
      +'<div class="cs-sub">'+(isLast?'Moving to Listening.':'Ready for the next passage?')+'</div>'
      +'<button class="btn btn-p btn-lg" '+A(isLast?'doListening':'advRd')+'>'
        +(isLast?'Continue to Listening':'Next Passage')+' '+SVG_NEXT_LG
      +'</button>'
      +'</div>';
    return;
  }
  const qi=S.rdQIdx[pi], q=p.questions[qi], L=['A','B','C','D'];
  const isSmall=LI(lv)<=1;
  let opts='';
  q.options.forEach((o,i)=>{
    opts+='<div class="opt'+(S.rdAnswers[pi][qi]===i?' sel':'')+'\" '+A('setRdAns','data-v="'+pi+'" data-v2="'+qi+'" data-v3="'+i+'"')+'>'
      +'<div class="opt-k">'+L[i]+'</div><div class="opt-txt">'+H(o)+'</div></div>';
  });
  $('app').innerHTML=
    '<div class="sec-hd">'
    +'<span class="sec-badge">Step 3 of 6 &middot; Reading'+(totalP>1?' &mdash; Passage '+(pi+1)+' of '+totalP:'')+'</span>'
    +'<div class="sec-desc">Read the passage, then answer each question.</div></div>'
    +'<div class="read-layout">'
      +'<div class="passage-panel">'
        +'<div class="passage-head" onclick="togglePassage()" style="cursor:pointer">'
          +'<div style="display:flex;align-items:center;justify-content:space-between">'
            +'<div class="passage-head-title">'+H(p.title)+'</div>'
            +'<span id="passageToggleIcon" style="color:rgba(255,255,255,.7);font-size:13px;flex-shrink:0;margin-left:8px">▼ Hide</span>'
          +'</div>'
          +'<div class="passage-head-type">'+H(p.textType||'reading passage')+'</div>'
        +'</div>'
        +'<div class="passage-body'+(isSmall?' big':'')+'" id="passageText">'+H(p.text)+'</div>'
      +'</div>'
      +'<div class="q-panel">'
        +'<div class="q-panel-meta">'
          +'<span class="text-sm">Question '+(qi+1)+' of '+p.questions.length+'</span>'
          +(q.type?'<span class="qc-badge">'+H(q.type)+'</span>':'')
        +'</div>'
        +'<div class="qcard-body">'
          +'<div class="q-text" style="font-size:16px">'+H(q.question)+'</div>'
          +'<div class="opts">'+opts+'</div>'
        +'</div>'
        +'<div class="qcard-footer">'
          +(qi>0?'<button class="btn btn-s btn-sm" '+A('prevRd','data-v="'+pi+'"')+'>&#8592; Back</button>':'<span></span>')
          +'<button class="btn btn-p" '+A('nextRd','data-v="'+pi+'"')+(S.rdAnswers[pi][qi]===null?' disabled':'')+'>'
            +(qi<p.questions.length-1?'Next Question':'Submit Passage')+' '+SVG_NEXT
          +'</button>'
        +'</div>'
      +'</div>'
    +'</div>';
}

// ── rWriting ──────────────────────────────────────────────────
function togglePassage(){
  const body = document.getElementById('passageText');
  const icon = document.getElementById('passageToggleIcon');
  if(!body || !icon) return;
  if(body.style.display === 'none'){
    body.style.display = '';
    icon.textContent = '▼ Hide';
  } else {
    body.style.display = 'none';
    icon.textContent = '▶ Show passage';
  }
}

function rWriting(){
  S.phase='writing';
  setProg(70,'Writing');
  const t=S.wrTask; if(!t) return;
  const wc=S.wrText.trim()?S.wrText.trim().split(/\s+/).length:0;
  const frames=t.sentenceFrames?t.sentenceFrames.split('\n').filter(l=>l.trim()):[];
  let framesHTML='';
  if(frames.length){framesHTML='<div class="writing-frames">';frames.forEach(f=>{framesHTML+='<div class="frame-line">'+H(f)+'</div>';});framesHTML+='</div>';}
  $('app').innerHTML=
    '<div class="sec-hd-row">'+backBtn()+'<span class="sec-badge">Step 5 of 6 &middot; Writing'+(S.wrTasks&&S.wrTasks.length>1?' &mdash; Task '+(S.wrTaskIdx+1)+' of 2':'')+'</span>'
    +'<div class="sec-desc">Write your response below. No time limit.</div></div>'
    +'<div class="writing-card">'
      +'<div class="writing-hd"><div class="writing-hd-eye">Writing Task &middot; '+H(t.taskType||'')+'</div>'
        +'<div class="writing-hd-inst">'+H(t.instruction)+'</div>'
        +(t.context?'<div class="writing-hd-ctx">'+H(t.context)+'</div>':'')
        +'<div class="writing-hd-tags"><span class="writing-tag">Target: '+H(t.wordRange||'')+'</span></div>'
      +'</div>'
      +framesHTML
      +'<div class="writing-ta-wrap"><textarea class="writing-ta" id="wrArea" oninput="updateWC()" placeholder="Write your response here...">'+H(S.wrTexts&&S.wrTexts[S.wrTaskIdx]||'')+'</textarea></div>'
      +'<div class="writing-footer"><div class="wc-txt"><strong id="wcN">'+wc+'</strong> words</div>'
        +'<button class="btn btn-p" '+A('submitWriting')+'>'
        +(S.wrTasks&&S.wrTasks.length>1&&S.wrTaskIdx===0?'Next Task '+SVG_NEXT:'Submit Writing '+SVG_NEXT)
        +'</button>'
      +'</div>'
    +'</div>';
}

// ── rListening ────────────────────────────────────────────────
function rListening(){
  const ti=S.lstIdx, lv=S.lstLevel||testLevel(), totalT=LS_TASKS(lv);
  setProg(50+ti*6,'Listening');
  if(S.lstDone){
    $('app').innerHTML=
      '<div class="complete-screen"><div class="cs-icon">&#127911;</div>'
      +'<div class="cs-title">Listening Complete</div>'
      +'<div class="cs-sub">Moving to Writing.</div>'
      +'<button class="btn btn-p btn-lg" '+A('doWriting')+'>Continue to Writing '+SVG_NEXT_LG+'</button>'
      +'</div>';
    return;
  }
  const task=S.lstTasks[ti]; if(!task) return;
  const played=S.lstPlayed[ti];
  const chars=task.characters||[{name:'Narrator',role:'',side:'left',emoji:'&#127897;'}];
  const isDlg=task.format==='dialogue'&&chars.length>=2;
  const speakerStage=buildSpeakerStage(chars,isDlg);
  const qi=S.lstQIdx[ti]||0, qArr=task.questions, q=qArr[qi], L=['A','B','C','D'];
  let qHTML='';
  // Show ALL questions at once - Cambridge/IELTS standard
  // Students read ALL questions before/during audio, answer all, then proceed
  if(qArr && qArr.length > 0){
    const allAnswered = played && S.lstAnswers[ti].every(a => a !== null);
    const anyAnswered = S.lstAnswers[ti].some(a => a !== null);
    // Start timer when questions are first displayed
    const _rtQId_lst='lst-'+ti+'-'+(S.lstAnswers[ti].join(','));
    if(S.rtQId!==_rtQId_lst&&!played){S.rtStart=Date.now();S.rtQId=_rtQId_lst;}
    qHTML='<div class="lst-q-section">';
    // Header
    qHTML+='<div class="q-panel-meta" style="margin-bottom:14px">'
      +'<span class="text-sm"><strong>'+qArr.length+' Question'+(qArr.length>1?'s':'')+' — read before listening</strong></span>'
      +(!played?'<span class="lst-q-hint">&#128250; Listen, then answer</span>':'')
    +'</div>';
    // All questions
    qArr.forEach(function(qItem, qi2){
      const selAns = S.lstAnswers[ti][qi2];
      let opts2='';
      qItem.options.forEach(function(o,i){
        opts2+='<div class="opt'+(selAns===i?' sel':'')+' lst-opt-all" '+A('setLstAns','data-v="'+ti+'" data-v2="'+qi2+'" data-v3="'+i+'"')+'>'
          +'<div class="opt-k">'+L[i]+'</div><div class="opt-txt">'+H(o)+'</div></div>';
      });
      qHTML+='<div class="lst-q-item'+(qi2>0?' lst-q-item-sep':'')+'" id="lstQ'+qi2+'">'
        +'<div class="lst-q-num">Q'+(qi2+1)+(qItem.type?'<span class="qc-badge" style="margin-left:6px">'+H(qItem.type)+'</span>':'')+' <span class="lst-q-answered">'+(selAns!==null?'<span style="color:var(--green);font-size:11px;font-weight:600">&#10003; Answered</span>':'<span style="color:var(--txl);font-size:11px">Not answered</span>')+'</span></div>'
        +'<div class="lst-q-text">'+H(qItem.question)+'</div>'
        +'<div class="opts lst-opts-compact">'+opts2+'</div>'
      +'</div>';
    });
    // Single proceed button
    qHTML+='<div class="flex-e mt-4">'
      +'<button class="btn btn-p" '+A('nextLstQ','data-v="'+ti+'" data-v2="0" data-v3="'+qArr.length+'" data-v4="'+totalT+'"')
      +(!allAnswered?' disabled':'')+'>'
      +(ti+1<totalT?'Next Listening':'Finish Listening')+' '+SVG_NEXT
    +'</button>'
    +'</div>';
    qHTML+='</div>';
  }
  $('app').innerHTML=
    '<div class="sec-hd">'
    +'<span class="sec-badge">Step 4 of 6 &middot; Listening'+(totalT>1?' &mdash; Script '+(ti+1)+' of '+totalT:'')+'</span>'
    +'<div class="sec-desc">Listen carefully, then answer the questions.</div></div>'
    +'<div class="lst-card">'
      +'<div class="lst-player">'
        +'<div class="lst-player-title">'+H(task.title||'Listening Task')+'</div>'
        +'<div class="lst-player-ctx">'+H(task.taskContext||'')+'</div>'
        +'<div class="lst-controls">'
          +(played?''  // No replay — one listen only (international testing standard)
            :'<button class="lst-play-btn" id="lstPlayBtn" '+A('playLST')+(S.lstPlaying?' disabled':'')+'>'
              +'&#9836; Play Audio</button>')
          +'<div class="lst-wave off" id="lstWave">'
            +'<span></span><span></span><span></span><span></span><span></span>'
            +'<span></span><span></span><span></span><span></span><span></span></div>'
          +'<span class="lst-spd">Speed: '+Math.round((LST_SPD[lv]||0.9)*100)+'%</span>'
          
        +'</div>'
      +'</div>'
      +'<div>'+speakerStage+'</div>'
      +qHTML
    +'</div>';
}

// ── rSpeaking ─────────────────────────────────────────────────
function rSpeaking(){
  const lv=gmCEFR(), totalT=SP_TASKS(lv), ti=S.spkIdx;
  // Check task BEFORE setProg — prevents progress bar showing "Speaking"
  // while writing content is still displayed (task missing = don't update UI)
  const task=S.spkTasks[ti];
  if(!task) return; // should not happen in normal flow — doSpeaking always sets spkTasks
  setProg(80+ti*5,'Speaking');
  // Picture description: show image if task is picture-description (Task 1)
  const isPicTask = task.taskType==='picture-description';
  const pic = (isPicTask && S.spkPicture) ? S.spkPicture : null;
  let picHTML = '';
  if(pic){
    picHTML = '<div class="spk-picture-wrap">'
      +'<div class="spk-picture-label">&#128247; Describe this picture</div>'
      +'<img src="'+H(pic.url)+'" alt="Speaking picture" class="spk-picture-img" id="spkPicImg">'
      +'</div>';
  }
  const taskBadge = isPicTask
    ? 'Task '+(ti+1)+(totalT>1?' of '+totalT:'')+' &bull; Picture Description'
    : 'Task '+(ti+1)+(totalT>1?' of '+totalT:'')+' &bull; Extended Speaking';
  const taskHTML='<div class="spk-task-section">'
    +'<div class="spk-task-eye">'+taskBadge+'</div>'
    +picHTML
    +'<div class="spk-task-txt">'+H(task.instruction)+'</div>'
    +(task.assessmentNote
      ?'<div class="spk-assessment-note">'+task.assessmentNote.split('\n').map(line=>line.startsWith('•')?'<div class="spk-criteria-item">'+H(line)+'</div>':line.startsWith('📊')||line.startsWith('💡')?'<div class="spk-criteria-hd">'+H(line)+'</div>':'<div style="font-size:12px;color:var(--txl);margin-bottom:2px">'+H(line)+'</div>').join('')+'</div>'
      :'')
    +'</div>';

  if(S.spkPhase==='topic'){
    const autoSec=60-(S.topicAutoSec||0);
    $('app').innerHTML=
      '<div class="sec-hd"><span class="sec-badge">Step 6 of 6 &middot; Speaking &mdash; Task '+(ti+1)+(totalT>1?' of '+totalT:'')+'</span></div>'
      +'<div class="spk-card">'
        +'<div class="spk-instructions">'
          +'<div class="spk-inst-title">&#127897; Speaking Instructions</div>'
          +'<div class="spk-inst-steps">'
            +'<div class="spk-inst-step"><span class="spk-inst-num">1</span><span>Read the topic below carefully.</span></div>'
            +'<div class="spk-inst-step"><span class="spk-inst-num">2</span><span>Take 30&ndash;60 seconds to prepare your response.</span></div>'
            +'<div class="spk-inst-step"><span class="spk-inst-num">3</span><span>Press <strong>Start&nbsp;Recording</strong> when ready.</span></div>'
            +'<div class="spk-inst-step"><span class="spk-inst-num">4</span><span>Auto-starts in <strong><span id="topicCount">'+autoSec+'</span>&nbsp;seconds</strong>.</span></div>'
          +'</div>'
        +'</div>'
        +taskHTML
        +'<div class="spk-action">'
          +'<div class="topic-timer">'
            +'<div class="topic-timer-bar-bg"><div class="topic-timer-bar" id="topicTimerBar" style="width:'+Math.round((S.topicAutoSec||0)/60*100)+'%"></div></div>'
            +'<span class="topic-timer-lbl">Auto-start in <strong><span id="topicCount2">'+autoSec+'</span>s</strong></span>'
          +'</div>'
          +'<button class="btn btn-p btn-lg" '+A('startRec2')+'>&#9673; Start Recording</button>'
        +'</div>'
      +'</div>';
    if(!S.topicAutoInt){
      S.topicAutoSec=0;
      S.topicAutoInt=setInterval(()=>{
        S.topicAutoSec++;
        const rem=60-S.topicAutoSec;
        const c1=document.getElementById('topicCount'), c2=document.getElementById('topicCount2');
        const bar=document.getElementById('topicTimerBar');
        if(c1) c1.textContent=rem; if(c2) c2.textContent=rem;
        if(bar) bar.style.width=Math.round((S.topicAutoSec/60)*100)+'%';
        if(S.topicAutoSec>=60){
          clearInterval(S.topicAutoInt);S.topicAutoInt=null;S.topicAutoSec=0;
          S.spkPhase='recording';render();startRec();
        }
      },1000);
    }
  }else if(S.spkPhase==='prep'){
    $('app').innerHTML=
      '<div class="sec-hd"><span class="sec-badge">Preparation Time</span>'
      +'<div class="sec-desc">Recording starts when countdown ends.</div></div>'
      +'<div class="spk-card">'+taskHTML
      +'<div class="spk-action"><div class="prep-box"><div class="prep-count" id="prepCount">'+S.prepSec+'</div>'
      +'<div class="prep-lbl">seconds remaining</div></div></div></div>';
  }else if(S.spkPhase==='recording'){
    const maxSec=task.recSec||40;
    $('app').innerHTML=
      '<div class="sec-hd"><span class="sec-badge">Recording</span>'
      +'<div class="sec-desc">Speak clearly. Press Stop when finished.</div></div>'
      +'<div class="spk-card">'+taskHTML
      +'<div class="spk-action"><div class="rec-box rec"><div class="rec-ico">&#128308;</div>'
      +'<div class="rec-time" id="recTime">00:00</div>'
      +'<div class="rec-prog-bg"><div class="rec-prog-f" id="recBar" style="width:0%"></div></div>'
      +'<div class="rec-lbl">Recording &mdash; max '+maxSec+'s</div></div>'
      +'<div class="flex-e"><button class="btn btn-red" '+A('stopRec')+'>&#9632; Stop</button></div>'
      +'</div></div>';
  }else{
    const url=S.audioURLs[ti], isLast=ti+1>=totalT;
    $('app').innerHTML=
      '<div class="sec-hd"><span class="sec-badge">Review Recording</span></div>'
      +'<div class="spk-card">'+taskHTML
      +'<div class="spk-action">'
      +(!S.micOk?'<div class="mic-warn">&#9888; Microphone unavailable. Teacher will assess separately.</div>':'')
      +(url?'<div class="rec-box done"><div class="rec-ico">&#9989;</div><div class="rec-lbl">Recording saved</div><audio controls src="'+url+'"></audio></div>':'')
      +'<div class="flex-sb">'
        +'<button class="btn btn-s btn-sm" '+A('reRec')+'>&#8634; Re-record</button>'
        +'<button class="btn btn-p" '+A('nextSpk')+'>'+(isLast?'View My Results':'Next Task')+' '+SVG_NEXT+'</button>'
      +'</div>'
      +'</div></div>';
  }
}

  $('app').innerHTML=
    '<div class="completion-wrap">'
    +'<div class="completion-card">'
      +'<div class="completion-check">&#10003;</div>'
      +'<div class="completion-title">Well done!</div>'
      +'<div class="completion-title-en">Test Complete</div>'
      +'<div class="completion-msg">Your results will be analysed by your teacher and AI.<br>The results will be used for <strong>class placement</strong>.<br><br>A <strong>printed results report</strong> will be provided on your first day at MEC Academy.</div>'
